<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-31 Create Squad Challenge</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:240px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
  @keyframes fadeSlideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
</style>
</head><body>
<div class="stage">
  <div class="label">S-31 · Create Squad Challenge</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Free tier</label><input type="checkbox" id="tw-free" checked/></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}

const GOAL_TYPES=[
  {id:'steps',label:'Steps',unit:'steps',placeholder:'e.g. 50000',desc:'Total steps as a team',color:WW.teal,gradient:'linear-gradient(145deg,#1A6B7C 0%,#4BB8CC 100%)',
    icon:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 17l4-10 3 4 3-7" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="17" cy="7" r="2" fill={c}/></svg>},
  {id:'distance',label:'Distance',unit:'km',placeholder:'e.g. 100',desc:'Total kilometres covered',color:'#22C55E',gradient:'linear-gradient(145deg,#166534 0%,#22C55E 100%)',
    icon:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="14" cy="5" r="2" fill={c}/><path d="M10 9l2 4 3-2 2 5M7 14l2-4" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>},
  {id:'time',label:'Active Time',unit:'min',placeholder:'e.g. 500',desc:'Total active minutes',color:WW.primary,gradient:'linear-gradient(145deg,#2D3A8C 0%,#6C7EE8 100%)',
    icon:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.6"/><path d="M12 7v5l3 3" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>},
  {id:'sessions',label:'Gym Sessions',unit:'sessions',placeholder:'e.g. 20',desc:'Total gym sessions logged',color:WW.lavender,gradient:'linear-gradient(145deg,#5B3F9E 0%,#9B84E8 100%)',
    icon:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="7" y="10" width="10" height="4" rx="2" stroke={c} strokeWidth="1.5"/><rect x="3" y="8" width="4" height="8" rx="2" stroke={c} strokeWidth="1.5"/><rect x="17" y="8" width="4" height="8" rx="2" stroke={c} strokeWidth="1.5"/></svg>},
];

const ACTIVITIES=['Running','Walking','Cycling','Swimming','Hiking','Gym','HIIT','Yoga','Rowing','Other'];

const FRIENDS=[
  {id:1,initials:'AK',color:'#F59E0B',name:'Alex Koh',mutual:true},
  {id:2,initials:'JT',color:'#4BB8CC',name:'Jamie Tan',mutual:true},
  {id:3,initials:'SL',color:'#9B84E8',name:'Sarah Lim',mutual:false},
  {id:4,initials:'BW',color:'#10B981',name:'Ben Wong',mutual:true},
  {id:5,initials:'PW',color:'#6C7EE8',name:'Priya Wong',mutual:false},
];

const STEP_LABELS=['Name','Activities','Goal Type','Target','Duration','Invite','Preview'];
const TOTAL=7;

function HexBadge({color,goalType,size=72}){
  const s=size;
  const cx=s/2,cy=s/2,r=s/2*0.88;
  const pts=Array.from({length:6},(_,i)=>{const a=(i*60-90)*Math.PI/180;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
  const g=GOAL_TYPES.find(g=>g.id===goalType)||GOAL_TYPES[0];
  return(
    <div style={{background:g.gradient,borderRadius:s*.2,width:s,height:s,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{position:'absolute',inset:0}}>
        <polygon points={pts} fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5"/>
      </svg>
      <div style={{position:'relative',zIndex:1}}>
        {g.icon('#fff')}
      </div>
    </div>
  );
}

function App(){
  const [step,setStep]=React.useState(1);
  const [animKey,setAnimKey]=React.useState(0);
  const [isFree,setIsFree]=React.useState(true);
  const [showUpgrade,setShowUpgrade]=React.useState(false);

  // Form state
  const [name,setName]=React.useState('');
  const [desc,setDesc]=React.useState('');
  const [activities,setActivities]=React.useState([]);
  const [goalType,setGoalType]=React.useState('steps');
  const [target,setTarget]=React.useState('');
  const [teamVsPersonal,setTeamVsPersonal]=React.useState('team');
  const [startDate,setStartDate]=React.useState('2026-05-20');
  const [endDate,setEndDate]=React.useState('2026-05-27');
  const [invited,setInvited]=React.useState([]);
  const [isPublic,setIsPublic]=React.useState(false);

  React.useEffect(()=>{
    const cb=()=>setIsFree(document.getElementById('tw-free')?.checked??true);
    document.querySelectorAll('#tweaks input').forEach(el=>el.addEventListener('change',cb));
    cb();
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  const goNext=()=>{setAnimKey(k=>k+1);setStep(s=>Math.min(TOTAL,s+1));};
  const goBack=()=>{setAnimKey(k=>k+1);setStep(s=>Math.max(1,s-1));};
  const toggleActivity=(a)=>setActivities(arr=>arr.includes(a)?arr.filter(x=>x!==a):[...arr,a]);
  const toggleInvite=(id)=>{
    if(isFree&&!invited.includes(id)&&invited.length>=2){setShowUpgrade(true);return;}
    setInvited(arr=>arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);
  };

  const goal=GOAL_TYPES.find(g=>g.id===goalType)||GOAL_TYPES[0];
  const isSquad=invited.length>=3;
  const daysCount=startDate&&endDate?Math.max(1,Math.round((new Date(endDate)-new Date(startDate))/(1000*60*60*24))):'—';

  const canAdvance=()=>{
    if(step===1)return name.trim().length>0;
    if(step===2)return activities.length>0;
    if(step===3)return true;
    if(step===4)return target.trim().length>0;
    if(step===5)return startDate&&endDate&&new Date(endDate)>new Date(startDate);
    return true;
  };

  const SectionLabel=({text,required})=>(
    <div style={{fontSize:12,fontWeight:700,color:WW.textSec,letterSpacing:.4,textTransform:'uppercase',marginBottom:10}}>
      {text}{required&&<span style={{color:'#EF4444',marginLeft:3}}>*</span>}
    </div>
  );

  function StepContent(){
    // Step 1: Name + Description
    if(step===1) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Name your challenge</div>
          <div style={{fontSize:13,color:WW.textSec,lineHeight:1.5}}>Give it a catchy name your squad will remember.</div>
        </div>
        <SectionLabel text="Challenge name" required/>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Weekend Warriors"
          style={{width:'100%',height:50,borderRadius:13,border:`1.5px solid ${name?WW.primary:WW.border}`,padding:'0 14px',fontSize:16,fontWeight:700,color:WW.text,outline:'none',boxSizing:'border-box',background:WW.card,fontFamily:'inherit',marginBottom:14}}/>
        <SectionLabel text="Description (optional)"/>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What's this challenge about? Add a motivating message for your squad."
          style={{width:'100%',height:90,borderRadius:13,border:`1.5px solid ${WW.border}`,padding:'12px 14px',fontSize:14,color:WW.text,outline:'none',boxSizing:'border-box',background:WW.card,fontFamily:'inherit',resize:'none',lineHeight:1.5}}/>
      </div>
    );

    // Step 2: Activity types
    if(step===2) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Which activities count?</div>
          <div style={{fontSize:13,color:WW.textSec}}>Select all that apply. Mix cardio and gym!</div>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {ACTIVITIES.map(a=>{
            const sel=activities.includes(a);
            return(
              <button key={a} onClick={()=>toggleActivity(a)}
                style={{padding:'9px 16px',borderRadius:22,border:`2px solid ${sel?WW.primary:WW.border}`,background:sel?WW.chipBg:WW.card,color:sel?WW.primaryDark:WW.text,fontSize:14,fontWeight:sel?800:600,cursor:'pointer',transition:'all .15s',boxShadow:sel?WW.shadow:'none'}}>
                {a}
              </button>
            );
          })}
        </div>
        {activities.length>0&&(
          <div style={{marginTop:14,padding:'10px 12px',borderRadius:12,background:WW.tealBg,border:`0.5px solid rgba(75,184,204,.3)`}}>
            <div style={{fontSize:12,color:'#1A7A8C',fontWeight:700}}>{activities.length} activity type{activities.length>1?'s':''} selected — contributions from these count toward the goal.</div>
          </div>
        )}
      </div>
    );

    // Step 3: Goal type
    if(step===3) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Choose a goal type</div>
          <div style={{fontSize:13,color:WW.textSec}}>What does your squad need to achieve together?</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {GOAL_TYPES.map(g=>{
            const sel=goalType===g.id;
            return(
              <button key={g.id} onClick={()=>setGoalType(g.id)}
                style={{padding:'18px 12px 14px',borderRadius:16,border:`2px solid ${sel?g.color:WW.border}`,background:sel?`${g.color}12`:WW.card,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:10,textAlign:'center',transition:'all .15s',boxShadow:sel?`0 4px 14px ${g.color}25`:WW.shadow}}>
                <div style={{width:48,height:48,borderRadius:14,background:sel?g.gradient:WW.elevated,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}>
                  {g.icon(sel?'#fff':WW.textSec)}
                </div>
                <div style={{fontSize:14,fontWeight:800,color:sel?g.color:WW.text}}>{g.label}</div>
                <div style={{fontSize:11,color:WW.textSec,lineHeight:1.3}}>{g.desc}</div>
              </button>
            );
          })}
        </div>
      </div>
    );

    // Step 4: Target value
    if(step===4) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Set the target</div>
          <div style={{fontSize:13,color:WW.textSec}}>How much does the team need to hit together?</div>
        </div>
        {/* Goal type reminder */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:13,background:WW.card,border:`0.5px solid ${WW.border}`,marginBottom:16,boxShadow:WW.shadow}}>
          <div style={{width:36,height:36,borderRadius:10,background:goal.gradient,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {goal.icon('#fff')}
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:WW.text}}>{goal.label} Challenge</div>
            <div style={{fontSize:11,color:WW.textSec}}>{goal.desc}</div>
          </div>
        </div>
        <SectionLabel text={`Target (${goal.unit})`} required/>
        <div style={{position:'relative',marginBottom:14}}>
          <input type="number" value={target} onChange={e=>setTarget(e.target.value)} placeholder={goal.placeholder}
            style={{width:'100%',height:54,borderRadius:13,border:`1.5px solid ${target?goal.color:WW.border}`,padding:'0 60px 0 14px',fontSize:20,fontWeight:900,color:WW.primaryDark,outline:'none',boxSizing:'border-box',background:WW.card,fontFamily:'inherit'}}/>
          <div style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:13,fontWeight:700,color:WW.textSec}}>{goal.unit}</div>
        </div>
        {/* Team vs per-person toggle */}
        <SectionLabel text="Counting method"/>
        <div style={{display:'flex',background:WW.elevated,borderRadius:12,padding:3,gap:3,marginBottom:14}}>
          {[{id:'team',label:'Combined total',desc:'All contributions added'},{id:'personal',label:'Per person',desc:'Each person hits the target'}].map(opt=>{
            const sel=teamVsPersonal===opt.id;
            return(
              <button key={opt.id} onClick={()=>setTeamVsPersonal(opt.id)}
                style={{flex:1,padding:'10px 8px',borderRadius:9,background:sel?WW.card:'transparent',border:'none',cursor:'pointer',boxShadow:sel?WW.shadow:'none',transition:'all .15s',textAlign:'center'}}>
                <div style={{fontSize:12,fontWeight:800,color:sel?WW.primaryDark:WW.textSec}}>{opt.label}</div>
                <div style={{fontSize:10,color:WW.textSec,marginTop:2}}>{opt.desc}</div>
              </button>
            );
          })}
        </div>
        {target&&<div style={{padding:'10px 14px',borderRadius:12,background:`${goal.color}12`,border:`0.5px solid ${goal.color}33`}}>
          <div style={{fontSize:13,color:goal.color,fontWeight:700}}>
            {teamVsPersonal==='team'
              ?`Team needs ${Number(target).toLocaleString()} ${goal.unit} combined`
              :`Each person needs ${Number(target).toLocaleString()} ${goal.unit}`}
          </div>
        </div>}
      </div>
    );

    // Step 5: Duration
    if(step===5) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Set the duration</div>
          <div style={{fontSize:13,color:WW.textSec}}>When does the challenge start and end?</div>
        </div>
        {/* Duration options */}
        <SectionLabel text="Quick select"/>
        <div style={{display:'flex',gap:7,marginBottom:16,flexWrap:'wrap'}}>
          {[['7 days',7],['14 days',14],['30 days',30],['Custom',null]].map(([label,days])=>{
            const calcEnd=()=>{if(!days)return;const s=new Date(startDate);s.setDate(s.getDate()+days);return s.toISOString().slice(0,10);};
            const isActive=days&&daysCount===days;
            return(
              <button key={label} onClick={()=>{if(days){const e=calcEnd();if(e)setEndDate(e);}}}
                style={{padding:'8px 16px',borderRadius:20,border:`1.5px solid ${isActive?WW.primary:WW.border}`,background:isActive?WW.chipBg:WW.card,color:isActive?WW.primary:WW.text,fontSize:13,fontWeight:700,cursor:'pointer'}}>
                {label}
              </button>
            );
          })}
        </div>
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <div style={{flex:1}}>
            <SectionLabel text="Start date" required/>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
              style={{width:'100%',height:46,borderRadius:12,border:`1.5px solid ${WW.border}`,padding:'0 10px',fontSize:13,color:WW.text,outline:'none',boxSizing:'border-box',background:WW.card}}/>
          </div>
          <div style={{flex:1}}>
            <SectionLabel text="End date" required/>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
              style={{width:'100%',height:46,borderRadius:12,border:`1.5px solid ${WW.border}`,padding:'0 10px',fontSize:13,color:WW.text,outline:'none',boxSizing:'border-box',background:WW.card}}/>
          </div>
        </div>
        {startDate&&endDate&&new Date(endDate)>new Date(startDate)&&(
          <div style={{padding:'12px 14px',borderRadius:13,background:WW.chipBg,border:`0.5px solid rgba(108,126,232,.2)`,textAlign:'center'}}>
            <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px'}}>{daysCount}</div>
            <div style={{fontSize:12,color:WW.textSec,fontWeight:600}}>day challenge</div>
          </div>
        )}
      </div>
    );

    // Step 6: Invite friends
    if(step===6) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Invite your squad</div>
          <div style={{fontSize:13,color:WW.textSec}}>3+ members = auto Squad challenge with shared badge!</div>
        </div>
        {/* Auto-squad indicator */}
        <div style={{padding:'10px 14px',borderRadius:13,marginBottom:14,background:isSquad?'linear-gradient(135deg,#1A6B7C,#4BB8CC)':WW.elevated,border:isSquad?'none':`1.5px dashed ${WW.border}`,transition:'all .3s'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontSize:20}}>{isSquad?<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle'}}><path d="M13 2L5 14h5l-1 8 10-14h-5l1-6z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle'}}><circle cx="8" cy="9" r="3" stroke="currentColor" strokeWidth="1.7"/><circle cx="16" cy="8" r="2.5" stroke="currentColor" strokeWidth="1.7"/><path d="M3 19c0-3 2.6-5 5.5-5S14 16 14 19" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M14 19c0-2.3 1.8-4 4-4 1.2 0 2.3.4 3 1.2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>}</div>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:isSquad?'#fff':WW.text}}>
                {isSquad?<><span>Squad unlocked! </span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'-2px'}}><path d="M12 3v6M12 15v6M3 12h6M15 12h6M5.6 5.6l4.2 4.2M14.2 14.2l4.2 4.2M18.4 5.6l-4.2 4.2M9.8 14.2l-4.2 4.2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg></>: 'Add 1 more for Squad mode'}
              </div>
              <div style={{fontSize:11,color:isSquad?'rgba(255,255,255,0.8)':WW.textSec}}>
                {isSquad?`${invited.length} members invited — team badge unlocked`:`${invited.length}/3 invited · Squad at 3+ members`}
              </div>
            </div>
          </div>
        </div>
        {isFree&&(
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#FEF3C7',borderRadius:12,border:'0.5px solid rgba(245,158,11,.35)',marginBottom:12}}>
            <span style={{fontSize:14}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle'}}><path d="M4 18l2-10 6 5 6-5 2 10H4z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/><path d="M8 18v2h8v-2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><circle cx="6" cy="8" r="1.2" fill="currentColor"/><circle cx="12" cy="13" r="1.2" fill="currentColor"/><circle cx="18" cy="8" r="1.2" fill="currentColor"/></svg></span>
            <div style={{flex:1,fontSize:11,color:'#92400E',fontWeight:600}}>Free plan: invite up to 2 friends. <button onClick={()=>setShowUpgrade(true)} style={{background:'none',border:'none',color:WW.gold,fontWeight:700,cursor:'pointer',padding:0,fontSize:11}}>Upgrade</button> for unlimited.</div>
          </div>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {FRIENDS.map(f=>{
            const sel=invited.includes(f.id);
            const locked=isFree&&!sel&&invited.length>=2;
            return(
              <div key={f.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:13,border:`1.5px solid ${sel?WW.primary:WW.border}`,background:sel?WW.chipBg:WW.card,opacity:locked?.45:1,transition:'all .15s'}}>
                <div style={{width:40,height:40,borderRadius:20,background:f.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:14,fontWeight:800,color:'#fff'}}>{f.initials}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:WW.text}}>{f.name}</div>
                  {f.mutual&&<div style={{fontSize:11,color:WW.textSec}}>Mutual friend</div>}
                </div>
                <button onClick={()=>toggleInvite(f.id)}
                  style={{padding:'7px 13px',borderRadius:10,background:sel?WW.primary:WW.elevated,color:sel?'#fff':WW.textSec,border:`1px solid ${sel?WW.primary:WW.border}`,fontSize:12,fontWeight:700,cursor:locked?'default':'pointer',transition:'all .15s'}}>
                  {sel?'✓ Invited':'+ Invite'}
                </button>
              </div>
            );
          })}
        </div>
      </div>
    );

    // Step 7: Preview & Create
    if(step===7) return(
      <div style={{animation:'fadeSlideIn .25s ease both'}} key={animKey}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:22,fontWeight:900,color:WW.primaryDark,letterSpacing:'-0.4px',marginBottom:6}}>Looking good!</div>
          <div style={{fontSize:13,color:WW.textSec}}>Review your challenge before creating.</div>
        </div>
        {/* Badge preview */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 16px',background:goal.gradient,borderRadius:18,marginBottom:14,position:'relative',overflow:'hidden'}}>
          {isSquad&&<div style={{position:'absolute',top:10,right:12,background:'rgba(245,158,11,.25)',borderRadius:20,padding:'3px 9px',fontSize:11,fontWeight:700,color:'#F59E0B',border:'1px solid rgba(245,158,11,.4)'}}>Squad</div>}
          <HexBadge goalType={goalType} size={80}/>
          <div style={{fontSize:19,fontWeight:900,color:'#fff',marginTop:10,textAlign:'center',letterSpacing:'-0.3px'}}>{name||'Your Challenge'}</div>
          {desc&&<div style={{fontSize:12,color:'rgba(255,255,255,0.75)',textAlign:'center',marginTop:4,lineHeight:1.4,maxWidth:260}}>{desc}</div>}
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',justifyContent:'center'}}>
            {[`${daysCount} days`,`${goal.label}`,target?`${Number(target).toLocaleString()} ${goal.unit} goal`:null].filter(Boolean).map(t=>(
              <span key={t} style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.9)',background:'rgba(255,255,255,0.18)',padding:'3px 10px',borderRadius:20}}>{t}</span>
            ))}
          </div>
        </div>
        {/* Summary card */}
        <div style={{background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden',marginBottom:14}}>
          {[
            ['Activities',activities.length>0?activities.join(', '):'All activities'],
            ['Target',target?`${Number(target).toLocaleString()} ${goal.unit} (${teamVsPersonal})`:'—'],
            ['Duration',`${startDate} → ${endDate} (${daysCount} days)`],
            ['Invited',invited.length>0?`${invited.length} friend${invited.length>1?'s':''}`:'Just you (solo)'],
          ].map(([k,v],i,arr)=>(
            <div key={k} style={{display:'flex',gap:10,padding:'11px 14px',borderBottom:i<arr.length-1?`0.5px solid ${WW.border}`:''}}>
              <div style={{fontSize:13,color:WW.textSec,width:80,flexShrink:0,fontWeight:600}}>{k}</div>
              <div style={{fontSize:13,color:WW.text,fontWeight:700,flex:1}}>{v}</div>
            </div>
          ))}
        </div>
        {/* Privacy toggle */}
        <div style={{background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,padding:'13px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:WW.shadow,marginBottom:14}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:WW.text}}>Public challenge</div>
            <div style={{fontSize:11,color:WW.textSec,marginTop:2}}>Anyone can discover and join</div>
          </div>
          <button onClick={()=>setIsPublic(p=>!p)}
            style={{width:46,height:26,borderRadius:13,background:isPublic?WW.primary:WW.border,border:'none',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
            <div style={{position:'absolute',top:3,left:isPublic?23:3,width:20,height:20,borderRadius:10,background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
          </button>
        </div>
      </div>
    );

    return null;
  }

  const handleCreate=()=>{
    window.location.href='S-30-Challenge-Detail.html';
  };

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,position:'relative'}}>
      <StatusBar/>

      {/* Top bar with back + step indicator */}
      <div style={{padding:'6px 16px 0',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          {step>1?(
            <button onClick={goBack} style={{width:34,height:34,borderRadius:10,background:WW.elevated,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={WW.primaryDark} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          ):(
            <a href="S-28-Club-Tab.html" style={{width:34,height:34,borderRadius:10,background:WW.elevated,textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke={WW.primaryDark} strokeWidth="2" strokeLinecap="round"/></svg>
            </a>
          )}
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
              <div style={{fontSize:12,fontWeight:700,color:WW.textSec}}>Step {step}/{TOTAL} · {STEP_LABELS[step-1]}</div>
              <div style={{display:'flex',gap:3}}>
                {Array.from({length:TOTAL},(_,i)=>(
                  <div key={i} style={{width:i===step-1?16:5,height:5,borderRadius:3,background:i<step?WW.primary:WW.elevated,transition:'all .3s'}}/>
                ))}
              </div>
            </div>
            <div style={{height:4,borderRadius:2,background:WW.elevated,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(step/TOTAL)*100}%`,borderRadius:2,background:WW.primary,transition:'width .3s'}}/>
            </div>
          </div>
        </div>
      </div>

      {/* Step content */}
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px',paddingBottom:90}}>
        <StepContent/>
      </div>

      {/* Next / Create button */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 16px 28px',background:WW.card,borderTop:`0.5px solid ${WW.border}`,zIndex:25}}>
        <button
          onClick={step===TOTAL?handleCreate:goNext}
          disabled={!canAdvance()}
          style={{width:'100%',height:52,borderRadius:14,background:canAdvance()?WW.primary:'#C8C8D8',color:canAdvance()?'#fff':'#8A8A9E',border:'none',fontSize:15,fontWeight:800,cursor:canAdvance()?'pointer':'default',boxShadow:canAdvance()?'0 4px 14px rgba(108,126,232,.35)':'none',transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {step===TOTAL?(
            <><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="#fff"/></svg>Create Challenge</>
          ):(`Next: ${STEP_LABELS[step]}`)}
        </button>
      </div>

      {/* Upgrade gate */}
      {showUpgrade&&(
        <div style={{position:'absolute',inset:0,background:'rgba(10,10,18,.5)',zIndex:50,display:'flex',alignItems:'flex-end'}}>
          <div style={{width:'100%',background:WW.card,borderRadius:'22px 22px 0 0',padding:'20px 20px 40px',boxShadow:'0 -8px 40px rgba(20,25,60,.2)',textAlign:'center'}}>
            <div style={{width:36,height:4,borderRadius:2,background:WW.border,margin:'0 auto 20px'}}/>
            <div style={{width:60,height:60,borderRadius:30,background:'#FEF3C7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',fontSize:28}}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle'}}><path d="M4 18l2-10 6 5 6-5 2 10H4z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/><path d="M8 18v2h8v-2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><circle cx="6" cy="8" r="1.2" fill="currentColor"/><circle cx="12" cy="13" r="1.2" fill="currentColor"/><circle cx="18" cy="8" r="1.2" fill="currentColor"/></svg></div>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Invite unlimited friends</div>
            <div style={{fontSize:13,color:WW.textSec,lineHeight:1.6,marginBottom:20,maxWidth:280,margin:'0 auto 20px'}}>Upgrade to Premium to invite up to 8 squad members and create unlimited challenges.</div>
            <button onClick={()=>setShowUpgrade(false)} style={{width:'100%',height:50,borderRadius:14,background:WW.gold,color:'#fff',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:10,boxShadow:'0 4px 14px rgba(245,158,11,.35)'}}>Upgrade to Premium</button>
            <button onClick={()=>setShowUpgrade(false)} style={{background:'none',border:'none',fontSize:13,color:WW.textSec,cursor:'pointer',padding:'8px'}}>Continue free</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
