<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-25 Coach Chat</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:240px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes typingDot{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head><body>
<div class="stage">
  <div class="label">S-25 · Coach Chat</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Is Premium</label><input type="checkbox" id="tw-premium"/></div>
  <div class="tweak-row"><label>Typing indicator</label><input type="checkbox" id="tw-typing"/></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',lavenderDark:'#7B5CB8',lavenderText:'#5B3F9E',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const Ico={
  home:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a.5.5 0 01-.5.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A.5.5 0 013 21V10.5z" fill={c}/></svg>,
  plans:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c}/></svg>,
  coach:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  progress:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

const NAV=[
  {id:'home',label:'Home',icon:Ico.home,href:'S-09-Home.html'},
  {id:'plans',label:'Plans',icon:Ico.plans,href:'S-10-Plans-Hub.html'},
  {id:'coach',label:'Coach',icon:Ico.coach,href:'S-25-Coach-Chat.html'},
  {id:'club',label:'Club',icon:Ico.club,href:'S-28-Club-Tab.html'},
  {id:'progress',label:'Progress',icon:Ico.progress,href:'S-32-Progress-Tab.html'},
];

function StatusBar(){
  return(
    <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}>
      <div style={{paddingTop:10}}>9:41</div>
      <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
      </div>
    </div>
  );
}

function BottomNav({active}){
  return(
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:84,background:WW.card,borderTop:'0.5px solid #E8EAF8',display:'flex',zIndex:30}}>
      {NAV.map(n=>{const a=n.id===active,c=a?WW.primary:WW.textSec;return(
        <a key={n.id} href={n.href} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,textDecoration:'none',paddingBottom:8}}>
          {n.icon(c)}<span style={{fontSize:10,fontWeight:600,color:c}}>{n.label}</span>
        </a>
      );})}
    </div>
  );
}

const INITIAL_MESSAGES=[
  {id:1,role:'coach',text:"Hey Marcus! Great Push A session yesterday — two new PBs on bench and overhead press. How are you feeling today?",time:'9:12 AM'},
  {id:2,role:'user',text:'Feeling good, little bit of chest soreness but nothing bad.',time:'9:14 AM'},
  {id:3,role:'coach',text:"That's normal DOMS after progressive overload. Make sure to stay hydrated and get enough protein today. You have Legs A scheduled — still planning to do it?\n\nYour squat form has been improving based on your recent sets. I'd recommend warming up with 2 sets at 60% before hitting your working weight.",time:'9:15 AM'},
];

const QUICK_REPLIES=['Yes, doing legs today','Skip today','What should I eat?','Show my stats'];

function TypingIndicator(){
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:8,padding:'4px 0',animation:'fadeUp .25s ease'}}>
      <div style={{width:28,height:28,borderRadius:14,background:WW.lavender,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill="#fff"/></svg>
      </div>
      <div style={{background:WW.lavenderBg,borderRadius:'16px 16px 16px 4px',padding:'12px 14px',display:'flex',gap:4,alignItems:'center'}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:6,height:6,borderRadius:3,background:WW.lavender,animation:`typingDot 1.4s ${i*0.2}s infinite ease-in-out`}}/>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [messages,setMessages]=React.useState(INITIAL_MESSAGES);
  const [input,setInput]=React.useState('');
  const [isPremium,setIsPremium]=React.useState(false);
  const [isTyping,setIsTyping]=React.useState(false);
  const [msgCount]=React.useState(17);
  const msgLimit=20;
  const remaining=msgLimit-msgCount;
  const scrollRef=React.useRef(null);

  React.useEffect(()=>{
    ['tw-premium','tw-typing'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el)return;
      if(id==='tw-premium')el.addEventListener('change',e=>setIsPremium(e.target.checked));
      if(id==='tw-typing')el.addEventListener('change',e=>setIsTyping(e.target.checked));
    });
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  React.useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,isTyping]);

  const send=(text)=>{
    const t=text||input.trim();
    if(!t)return;
    setInput('');
    const newMsg={id:Date.now(),role:'user',text:t,time:'Now'};
    setMessages(m=>[...m,newMsg]);
    setIsTyping(true);
    setTimeout(()=>{
      setIsTyping(false);
      setMessages(m=>[...m,{id:Date.now()+1,role:'coach',text:"Great choice! I'll keep that in mind for your plan. Is there anything else you'd like to know?",time:'Now'}]);
    },2200);
  };

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>

      {/* Top bar */}
      <div style={{background:WW.card,borderBottom:`0.5px solid ${WW.border}`,padding:'8px 16px 10px',display:'flex',alignItems:'center',gap:10,flexShrink:0,boxShadow:WW.shadow}}>
        {/* Avatar */}
        <div style={{width:36,height:36,borderRadius:18,background:WW.lavender,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill="#fff"/><circle cx="18.5" cy="5.5" r="1.5" fill="#fff"/></svg>
        </div>
        {/* Name + status */}
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:15,fontWeight:800,color:WW.primaryDark,letterSpacing:'-.1px'}}>WiseCoach</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,marginTop:1}}>
            <div style={{width:6,height:6,borderRadius:3,background:'#10B981'}}/>
            <div style={{fontSize:11,color:'#059669',fontWeight:600}}>Online</div>
          </div>
        </div>
        {/* User avatar */}
        <a href="S-34-Profile.html?ref=S-25-Coach-Chat.html" style={{width:36,height:36,borderRadius:18,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',textDecoration:'none',boxShadow:'0 2px 8px rgba(108,126,232,0.3)',flexShrink:0}}>M</a>
      </div>

      {/* Context pill */}
      <div style={{background:WW.lavenderBg,padding:'7px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,borderBottom:`0.5px solid rgba(155,132,232,.2)`}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={WW.lavenderDark} strokeWidth="1.5"/><path d="M12 8v5M12 16v.5" stroke={WW.lavenderDark} strokeWidth="2" strokeLinecap="round"/></svg>
          <span style={{fontSize:11,color:WW.lavenderDark,fontWeight:600}}>Reading: last 7 days training · current plan · injury profile</span>
        </div>
      </div>

      {/* Find a Professional link */}
      <div style={{padding:'6px 16px',display:'flex',justifyContent:'flex-end',flexShrink:0,background:WW.bg,borderBottom:`0.5px solid ${WW.border}`}}>
        <a href="S-26-Find-A-Professional.html" style={{display:'flex',alignItems:'center',gap:5,textDecoration:'none'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke={WW.primary} strokeWidth="1.5"/><path d="M3 21c0-3.9 2.7-7 6-7" stroke={WW.primary} strokeWidth="1.5" strokeLinecap="round"/><path d="M16 11v6m-3-3h6" stroke={WW.primary} strokeWidth="1.8" strokeLinecap="round"/></svg>
          <span style={{fontSize:12,fontWeight:700,color:WW.primary}}>Find a Professional</span>
        </a>
      </div>

      {/* Chat thread */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
        {/* Date separator */}
        <div style={{display:'flex',alignItems:'center',gap:8,margin:'4px 0'}}>
          <div style={{flex:1,height:'0.5px',background:WW.border}}/>
          <div style={{fontSize:10,fontWeight:700,color:WW.textSec,letterSpacing:.6}}>TODAY</div>
          <div style={{flex:1,height:'0.5px',background:WW.border}}/>
        </div>

        {messages.map((msg,idx)=>{
          const isCoach=msg.role==='coach';
          const isLast=idx===messages.length-1&&isCoach;
          return(
            <div key={msg.id} style={{display:'flex',flexDirection:'column',alignItems:isCoach?'flex-start':'flex-end',gap:4,animation:'fadeUp .25s ease'}}>
              <div style={{display:'flex',alignItems:'flex-end',gap:8,maxWidth:'82%'}}>
                {isCoach&&(
                  <div style={{width:28,height:28,borderRadius:14,background:WW.lavender,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginBottom:2}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill="#fff"/></svg>
                  </div>
                )}
                <div style={{
                  background:isCoach?WW.lavenderBg:'#6C7EE8',
                  borderRadius:isCoach?'16px 16px 16px 4px':'16px 16px 4px 16px',
                  padding:'11px 13px',
                  fontSize:13.5,
                  color:isCoach?WW.lavenderText:'#fff',
                  lineHeight:1.55,
                  fontWeight:500,
                  whiteSpace:'pre-line',
                }}>
                  {msg.text}
                </div>
              </div>
              <div style={{fontSize:10,color:WW.textSec,paddingLeft:isCoach?36:0}}>{msg.time}</div>

              {/* Quick replies below last coach message */}
              {isLast&&!isTyping&&(
                <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingLeft:36,marginTop:2}}>
                  {QUICK_REPLIES.map(r=>(
                    <button key={r} onClick={()=>send(r)} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${WW.lavender}`,background:'transparent',color:WW.lavenderDark,fontSize:12,fontWeight:600,cursor:'pointer'}}>
                      {r}
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}

        {isTyping&&<TypingIndicator/>}
      </div>

      {/* Input area */}
      <div style={{background:WW.card,borderTop:`0.5px solid ${WW.border}`,flexShrink:0,paddingBottom:84}}>
        {/* Free quota banner */}
        {!isPremium&&(
          <div style={{padding:'6px 16px',background:'#FEF3C7',borderBottom:`0.5px solid rgba(245,158,11,.3)`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,color:'#92400E',fontWeight:500}}>{remaining} messages remaining this month. Upgrade for unlimited.</span>
            <button style={{fontSize:11,fontWeight:700,color:WW.gold,background:'none',border:'none',cursor:'pointer',padding:0}}>Upgrade</button>
          </div>
        )}
        {/* Input row */}
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px'}}>
          <button style={{width:34,height:34,borderRadius:17,background:WW.elevated,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={WW.textSec} strokeWidth="2" strokeLinecap="round"/></svg>
          </button>
          <input
            value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Ask WiseCoach anything..."
            style={{flex:1,height:38,borderRadius:20,border:`1.5px solid ${WW.border}`,padding:'0 14px',fontSize:13,color:WW.text,outline:'none',background:WW.bg}}
          />
          {input?(
            <button onClick={()=>send()} style={{width:34,height:34,borderRadius:17,background:WW.primary,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,boxShadow:'0 2px 8px rgba(108,126,232,.4)'}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          ):(
            <button style={{width:34,height:34,borderRadius:17,background:WW.elevated,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="13" rx="3" stroke={WW.textSec} strokeWidth="1.5"/><path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6" stroke={WW.textSec} strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
          )}
        </div>
        {/* Disclaimer */}
        <div style={{textAlign:'center',padding:'0 16px 8px',fontSize:10,color:WW.textSec,lineHeight:1.4}}>
          WiseCoach is not a substitute for professional medical advice.
        </div>
      </div>

      <BottomNav active="coach"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
