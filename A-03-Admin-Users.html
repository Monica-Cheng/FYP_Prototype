<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout Admin · Users</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F7F8FF;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;min-height:100vh;color:#3D3D5C}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#C8C8D8;border-radius:3px}
  tr:hover td{background:#F7F8FF}
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.07)'};

const NAV_ITEMS=[
  {id:'dashboard',label:'Dashboard',href:'A-02-Admin-Dashboard.html'},
  {id:'users',label:'Users',href:'A-03-Admin-Users.html'},
  {id:'bp',label:'Business Partners',href:'A-04-Admin-BP-Queue.html'},
  {id:'content',label:'Content',href:'A-05-Admin-Content.html'},
  {id:'challenges',label:'Challenges',href:'A-06-Admin-Challenges.html'},
  {id:'analytics',label:'Analytics',href:'A-07-Admin-Analytics.html'},
  {id:'settings',label:'Settings',href:'#'},
];
const NAV_ICONS={dashboard:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/></svg>,users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="1.7"/><path d="M2 21c0-4 3.1-7 7-7s7 3 7 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M19 8v6M22 11h-6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,bp:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.7"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="1.7"/></svg>,content:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6M8 13h8M8 17h5" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,challenges:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,analytics:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,settings:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.7"/></svg>};

function Sidebar({active}){return(<div style={{width:240,minHeight:'100vh',background:WW.card,borderRight:`1px solid ${WW.border}`,display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}><div style={{padding:'24px 20px 20px',borderBottom:`1px solid ${WW.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div><div><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark,lineHeight:1}}>WiseWorkout</div><div style={{fontSize:10,fontWeight:600,color:WW.textSec,letterSpacing:.5}}>ADMIN PORTAL</div></div></div></div><nav style={{padding:'12px 12px',flex:1}}>{NAV_ITEMS.map(n=>{const a=n.id===active;return(<a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:2,textDecoration:'none',background:a?WW.chipBg:'transparent',color:a?WW.primary:WW.textSec,fontWeight:a?700:500,fontSize:14}}><span style={{color:a?WW.primary:WW.textSec}}>{NAV_ICONS[n.id]}</span>{n.label}</a>);})}</nav><div style={{padding:'16px 20px',borderTop:`1px solid ${WW.border}`}}><a href="A-01-Admin-Login.html" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#EF4444',textDecoration:'none',fontWeight:600}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17 16l4-4m0 0l-4-4m4 4H7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>Sign out</a></div></div>);}
function TopBar({title}){return(<div style={{height:64,background:WW.card,borderBottom:`1px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:WW.primaryDark}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:13,color:WW.textSec}}>admin@wiseworkout.com</div><div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:800,color:'#fff'}}>A</span></div></div></div>);}

const USERS=[
  {id:'U001',name:'Marcus Tan',email:'marcus.tan@email.com',registered:'Jan 12, 2026',lastActive:'Today',role:'End User',status:'Active',plan:'Premium',sessions:47},
  {id:'U002',name:'Sarah Lim',email:'sarah.lim@email.com',registered:'Feb 3, 2026',lastActive:'Yesterday',role:'End User',status:'Active',plan:'Free',sessions:12},
  {id:'U003',name:'Alex Koh',email:'alex.koh@email.com',registered:'Mar 18, 2026',lastActive:'3 days ago',role:'End User',status:'Active',plan:'Free',sessions:28},
  {id:'U004',name:'Jamie Tan',email:'jamie.tan@email.com',registered:'Dec 5, 2025',lastActive:'May 8',role:'Business Partner',status:'Active',plan:'Premium',sessions:5},
  {id:'U005',name:'spammer@fake.com',email:'spammer@fake.com',registered:'May 10, 2026',lastActive:'May 10',role:'End User',status:'Suspended',plan:'Free',sessions:1},
  {id:'U006',name:'Ben Wong',email:'ben.w@email.com',registered:'Apr 22, 2026',lastActive:'May 11',role:'End User',status:'Active',plan:'Free',sessions:19},
  {id:'U007',name:'Priya Nair',email:'priya.n@email.com',registered:'Mar 1, 2026',lastActive:'May 9',role:'End User',status:'Active',plan:'Premium',sessions:63},
];

function StatusPill({s}){
  const cfg={Active:{bg:'#D1FAE5',c:'#059669'},Suspended:{bg:'#FEF3C7',c:'#92400E'}};
  return <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,...(cfg[s]||{bg:'#F2F2F7',c:'#6B7280'})}}>{s}</span>;
}

function App(){
  const [search,setSearch]=React.useState('');
  const [statusF,setStatusF]=React.useState('All');
  const [roleF,setRoleF]=React.useState('All');
  const [selected,setSelected]=React.useState(null);
  const [suspendModal,setSuspendModal]=React.useState(false);
  const [suspendReason,setSuspendReason]=React.useState('');
  const [deleteModal,setDeleteModal]=React.useState(false);
  const [users,setUsers]=React.useState(USERS);

  const filtered=users.filter(u=>{
    const q=search.toLowerCase();
    const matchQ=!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)||u.id.toLowerCase().includes(q);
    const matchS=statusF==='All'||u.status===statusF;
    const matchR=roleF==='All'||u.role===roleF;
    return matchQ&&matchS&&matchR;
  });

  const handleSuspend=()=>{
    setUsers(p=>p.map(u=>u.id===selected.id?{...u,status:'Suspended'}:u));
    setSelected(p=>({...p,status:'Suspended'}));
    setSuspendModal(false);setSuspendReason('');
  };
  const handleReactivate=()=>{
    setUsers(p=>p.map(u=>u.id===selected.id?{...u,status:'Active'}:u));
    setSelected(p=>({...p,status:'Active'}));
  };
  const handleDelete=()=>{
    setUsers(p=>p.filter(u=>u.id!==selected.id));
    setSelected(null);setDeleteModal(false);
  };

  const Btn=({children,color='#6C7EE8',onClick})=>(
    <button onClick={onClick} style={{background:'none',border:'none',color,fontSize:12,fontWeight:700,cursor:'pointer',padding:'2px 0'}}>{children}</button>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active="users"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',minWidth:0}}>
        <TopBar title="User Management"/>
        <div style={{flex:1,padding:'28px 32px',display:'flex',gap:20}}>
          {/* Main table area */}
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:16,minWidth:0}}>
            {/* Filters */}
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div style={{flex:1,position:'relative'}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:WW.textSec}}><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email or user ID…"
                  style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 14px 0 38px',fontSize:14,color:WW.text,outline:'none',fontFamily:'inherit'}}/>
              </div>
              {[{label:'Status',opts:['All','Active','Suspended'],val:statusF,set:setStatusF},{label:'Role',opts:['All','End User','Business Partner'],val:roleF,set:setRoleF}].map(f=>(
                <select key={f.label} value={f.val} onChange={e=>f.set(e.target.value)}
                  style={{height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 32px 0 12px',fontSize:13,color:WW.text,outline:'none',background:WW.card,fontFamily:'inherit',cursor:'pointer'}}>
                  {f.opts.map(o=><option key={o}>{o}</option>)}
                </select>
              ))}
              <div style={{fontSize:13,color:WW.textSec}}>{filtered.length} users</div>
            </div>

            {/* Table */}
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                    {['User ID','Name','Email','Registered','Last Active','Role','Status','Actions'].map(h=>(
                      <th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((u,i)=>(
                    <tr key={u.id} onClick={()=>setSelected(u)} style={{borderBottom:i<filtered.length-1?`0.5px solid ${WW.border}`:'none',cursor:'pointer',background:selected?.id===u.id?WW.chipBg:'transparent'}}>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec,fontFamily:'monospace'}}>{u.id}</td>
                      <td style={{padding:'12px 16px',fontSize:13,fontWeight:700,color:WW.text,whiteSpace:'nowrap'}}>{u.name}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.textSec}}>{u.email}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec,whiteSpace:'nowrap'}}>{u.registered}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec,whiteSpace:'nowrap'}}>{u.lastActive}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.text}}>{u.role}</td>
                      <td style={{padding:'12px 16px'}}><StatusPill s={u.status}/></td>
                      <td style={{padding:'12px 16px'}}>
                        <div style={{display:'flex',gap:10}} onClick={e=>e.stopPropagation()}>
                          <Btn onClick={()=>setSelected(u)}>View</Btn>
                          {u.status==='Active'?<Btn color='#F59E0B' onClick={()=>{setSelected(u);setSuspendModal(true);}}>Suspend</Btn>:<Btn color='#10B981' onClick={()=>{setSelected(u);handleReactivate();}}>Reactivate</Btn>}
                          <Btn color='#EF4444' onClick={()=>{setSelected(u);setDeleteModal(true);}}>Delete</Btn>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Side panel */}
          {selected&&(
            <div style={{width:300,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,padding:'20px',flexShrink:0,alignSelf:'flex-start',position:'sticky',top:28}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div style={{fontSize:15,fontWeight:700,color:WW.primaryDark}}>User Detail</div>
                <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',color:WW.textSec,fontSize:18,lineHeight:1}}>×</button>
              </div>
              {/* Avatar */}
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,padding:'14px',background:WW.elevated,borderRadius:12}}>
                <div style={{width:44,height:44,borderRadius:22,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:18,fontWeight:800,color:'#fff'}}>{selected.name[0]}</span>
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:WW.primaryDark}}>{selected.name}</div>
                  <div style={{fontSize:11,color:WW.textSec}}>{selected.role}</div>
                </div>
              </div>
              {[['User ID',selected.id],['Email',selected.email],['Registered',selected.registered],['Last active',selected.lastActive],['Plan',selected.plan],['Sessions logged',selected.sessions],['Status',selected.status]].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`0.5px solid ${WW.border}`}}>
                  <span style={{fontSize:12,color:WW.textSec}}>{l}</span>
                  <span style={{fontSize:12,fontWeight:700,color:WW.text}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
                {selected.status==='Active'
                  ?<button onClick={()=>setSuspendModal(true)} style={{width:'100%',height:38,borderRadius:10,background:'#FEF3C7',color:'#92400E',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Suspend user</button>
                  :<button onClick={handleReactivate} style={{width:'100%',height:38,borderRadius:10,background:'#D1FAE5',color:'#059669',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Reactivate user</button>
                }
                <button onClick={()=>setDeleteModal(true)} style={{width:'100%',height:38,borderRadius:10,background:'#FEE2E2',color:'#DC2626',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Delete account</button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Suspend modal */}
      {suspendModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,10,18,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:WW.card,borderRadius:20,padding:'28px',width:420,boxShadow:'0 20px 60px rgba(20,25,60,.25)'}}>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Suspend user?</div>
            <div style={{fontSize:13,color:WW.textSec,marginBottom:16}}>Suspending <strong>{selected?.name}</strong> will prevent them from logging in. Please provide a reason.</div>
            <textarea value={suspendReason} onChange={e=>setSuspendReason(e.target.value)} placeholder="Enter suspension reason…"
              style={{width:'100%',height:80,borderRadius:12,border:`1.5px solid ${WW.border}`,padding:'10px 14px',fontSize:13,color:WW.text,outline:'none',resize:'none',fontFamily:'inherit',marginBottom:16}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setSuspendModal(false)} style={{flex:1,height:42,borderRadius:10,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Cancel</button>
              <button onClick={handleSuspend} disabled={!suspendReason} style={{flex:2,height:42,borderRadius:10,background:suspendReason?'#F59E0B':'#C8C8D8',color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:suspendReason?'pointer':'default'}}>Suspend user</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete modal */}
      {deleteModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,10,18,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:WW.card,borderRadius:20,padding:'28px',width:400,boxShadow:'0 20px 60px rgba(20,25,60,.25)',textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Delete account?</div>
            <div style={{fontSize:13,color:WW.textSec,marginBottom:20}}>This will permanently delete <strong>{selected?.name}</strong>'s account and all data. This cannot be undone.</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setDeleteModal(false)} style={{flex:1,height:42,borderRadius:10,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Cancel</button>
              <button onClick={handleDelete} style={{flex:1,height:42,borderRadius:10,background:'#EF4444',color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
