<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout Admin · Business Partners</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F7F8FF;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;min-height:100vh;color:#3D3D5C}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C8C8D8;border-radius:3px}
  tr:hover td{background:#F7F8FF}
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.07)'};
const NAV_ITEMS=[{id:'dashboard',label:'Dashboard',href:'A-02-Admin-Dashboard.html'},{id:'users',label:'Users',href:'A-03-Admin-Users.html'},{id:'bp',label:'Business Partners',href:'A-04-Admin-BP-Queue.html'},{id:'content',label:'Content',href:'A-05-Admin-Content.html'},{id:'challenges',label:'Challenges',href:'A-06-Admin-Challenges.html'},{id:'analytics',label:'Analytics',href:'A-07-Admin-Analytics.html'},{id:'settings',label:'Settings',href:'#'}];
const NAV_ICONS={dashboard:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/></svg>,users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="1.7"/><path d="M2 21c0-4 3.1-7 7-7s7 3 7 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M19 8v6M22 11h-6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,bp:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.7"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="1.7"/></svg>,content:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="1.7"/></svg>,challenges:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,analytics:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,settings:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.7"/></svg>};
function Sidebar({active}){return(<div style={{width:240,minHeight:'100vh',background:WW.card,borderRight:`1px solid ${WW.border}`,display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}><div style={{padding:'24px 20px 20px',borderBottom:`1px solid ${WW.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div><div><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark,lineHeight:1}}>WiseWorkout</div><div style={{fontSize:10,fontWeight:600,color:WW.textSec,letterSpacing:.5}}>ADMIN PORTAL</div></div></div></div><nav style={{padding:'12px 12px',flex:1}}>{NAV_ITEMS.map(n=>{const a=n.id===active;return(<a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:2,textDecoration:'none',background:a?WW.chipBg:'transparent',color:a?WW.primary:WW.textSec,fontWeight:a?700:500,fontSize:14}}><span style={{color:a?WW.primary:WW.textSec}}>{NAV_ICONS[n.id]}</span>{n.label}{n.id==='bp'&&<span style={{marginLeft:'auto',background:WW.gold,color:'#fff',fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:10}}>5</span>}</a>);})}</nav><div style={{padding:'16px 20px',borderTop:`1px solid ${WW.border}`}}><a href="A-01-Admin-Login.html" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#EF4444',textDecoration:'none',fontWeight:600}}>Sign out</a></div></div>);}
function TopBar({title}){return(<div style={{height:64,background:WW.card,borderBottom:`1px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:WW.primaryDark}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:13,color:WW.textSec}}>admin@wiseworkout.com</div><div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:800,color:'#fff'}}>A</span></div></div></div>);}

const INIT_BP=[
  {id:'BP001',biz:'FitLife Coaching',type:'Personal Trainer',name:'James Chen',email:'james@fitlife.sg',submitted:'May 10, 2026',status:'Pending',area:'Central Singapore',desc:'Certified PT with 6 years experience. Specials: weight loss, body comp.',certs:[{name:'NASM CPT',issuer:'NASM',expiry:'Mar 2028'},{name:'CPR',issuer:'Red Cross',expiry:'Aug 2026'}]},
  {id:'BP002',biz:'Run Smart SG',type:'Running Coach',name:'Lisa Ong',email:'lisa@runsmart.sg',submitted:'May 9, 2026',status:'Approved',area:'All Singapore',desc:'IAAF certified running coach, specialising in marathon preparation.',certs:[{name:'IAAF Level 2',issuer:'IAAF',expiry:'Dec 2027'}]},
  {id:'BP003',biz:'PhysioPlus',type:'Physiotherapist',name:'Dr. Kevin Yap',email:'kevin@physioplus.sg',submitted:'May 8, 2026',status:'Rejected',area:'Tampines, Bedok',desc:'Sports physio with 10 years clinical experience.',certs:[{name:'BSc Physiotherapy',issuer:'NUS',expiry:'N/A'}],rejectReason:'Certification document was not legible. Please resubmit with a clear scan.'},
  {id:'BP004',biz:'NutriWell',type:'Nutritionist',name:'Amy Tan',email:'amy@nutriwell.sg',submitted:'May 11, 2026',status:'Pending',area:'Jurong, Clementi',desc:'Registered nutritionist specialising in sports performance and weight management.',certs:[{name:'Registered Nutritionist',issuer:'SSN',expiry:'Jun 2027'}]},
  {id:'BP005',biz:'Core Strength SG',type:'Personal Trainer',name:'Marcus Wu',email:'marcus@core.sg',submitted:'May 11, 2026',status:'Pending',area:'Novena, Bishan',desc:'Strength and conditioning coach for recreational athletes.',certs:[{name:'ACE CPT',issuer:'ACE',expiry:'Jan 2028'},{name:'First Aid',issuer:'SRCS',expiry:'Oct 2026'}]},
];

function StatusPill({s}){
  const cfg={Pending:{bg:'#FEF3C7',c:'#92400E'},Approved:{bg:'#D1FAE5',c:'#059669'},Rejected:{bg:'#FEE2E2',c:'#DC2626'}};
  return <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,...cfg[s]}}>{s}</span>;
}

function App(){
  const [tab,setTab]=React.useState('Pending');
  const [selected,setSelected]=React.useState(null);
  const [rejectModal,setRejectModal]=React.useState(false);
  const [rejectReason,setRejectReason]=React.useState('');
  const [bps,setBps]=React.useState(INIT_BP);

  const tabs=['Pending','Approved','Rejected'];
  const filtered=bps.filter(b=>b.status===tab);
  const pendingCount=bps.filter(b=>b.status==='Pending').length;

  const handleApprove=()=>{
    setBps(p=>p.map(b=>b.id===selected.id?{...b,status:'Approved'}:b));
    setSelected(p=>({...p,status:'Approved'}));
  };
  const handleReject=()=>{
    setBps(p=>p.map(b=>b.id===selected.id?{...b,status:'Rejected',rejectReason}:b));
    setSelected(p=>({...p,status:'Rejected',rejectReason}));
    setRejectModal(false);setRejectReason('');
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active="bp"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',minWidth:0}}>
        <TopBar title="Business Partners"/>
        <div style={{flex:1,padding:'28px 32px',display:'flex',gap:20}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:16,minWidth:0}}>
            {/* Sub-tabs */}
            <div style={{display:'flex',gap:2,background:WW.elevated,borderRadius:12,padding:4,width:'fit-content'}}>
              {tabs.map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{padding:'8px 20px',borderRadius:9,background:tab===t?WW.card:'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:tab===t?WW.primaryDark:WW.textSec,boxShadow:tab===t?WW.shadow:'none',display:'flex',alignItems:'center',gap:6}}>
                  {t}{t==='Pending'&&<span style={{background:pendingCount>0?WW.gold:'#C8C8D8',color:'#fff',fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:10}}>{pendingCount}</span>}
                </button>
              ))}
            </div>

            {/* Table */}
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                    {['Business name','Type','Contact','Submitted','Status','Actions'].map(h=>(
                      <th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length===0&&(
                    <tr><td colSpan={6} style={{padding:'40px',textAlign:'center',color:WW.textSec,fontSize:14}}>No {tab.toLowerCase()} applications</td></tr>
                  )}
                  {filtered.map((b,i)=>(
                    <tr key={b.id} onClick={()=>setSelected(b)} style={{borderBottom:i<filtered.length-1?`0.5px solid ${WW.border}`:'none',cursor:'pointer',background:selected?.id===b.id?WW.chipBg:'transparent'}}>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,fontWeight:700,color:WW.text}}>{b.biz}</div><div style={{fontSize:11,color:WW.textSec}}>{b.id}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{b.type}</td>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,color:WW.text}}>{b.name}</div><div style={{fontSize:11,color:WW.textSec}}>{b.email}</div></td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec}}>{b.submitted}</td>
                      <td style={{padding:'12px 16px'}}><StatusPill s={b.status}/></td>
                      <td style={{padding:'12px 16px'}}>
                        <button onClick={e=>{e.stopPropagation();setSelected(b);}} style={{background:'none',border:'none',color:WW.primary,fontSize:12,fontWeight:700,cursor:'pointer'}}>Review</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Review panel */}
          {selected&&(
            <div style={{width:360,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,padding:'22px',flexShrink:0,alignSelf:'flex-start',position:'sticky',top:28,maxHeight:'calc(100vh - 120px)',overflowY:'auto'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div style={{fontSize:15,fontWeight:700,color:WW.primaryDark}}>Application Review</div>
                <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',color:WW.textSec,fontSize:18}}>×</button>
              </div>

              <div style={{background:WW.elevated,borderRadius:12,padding:'14px',marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:800,color:WW.primaryDark}}>{selected.biz}</div>
                <div style={{fontSize:13,color:WW.textSec}}>{selected.type} · {selected.name}</div>
                <div style={{fontSize:12,color:WW.textSec,marginTop:2}}>{selected.email}</div>
              </div>

              {[['Service area',selected.area],['Submitted',selected.submitted],['Status',selected.status]].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:`0.5px solid ${WW.border}`}}>
                  <span style={{fontSize:12,color:WW.textSec}}>{l}</span>
                  <span style={{fontSize:12,fontWeight:700,color:WW.text}}>{v}</span>
                </div>
              ))}

              <div style={{marginTop:14,marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:6}}>Service description</div>
                <div style={{fontSize:13,color:WW.text,lineHeight:1.5,background:'#F9FAFB',borderRadius:10,padding:'10px 12px'}}>{selected.desc}</div>
              </div>

              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:8}}>Certifications</div>
                {selected.certs.map((c,i)=>(
                  <div key={i} style={{background:WW.elevated,borderRadius:10,padding:'10px 12px',marginBottom:6}}>
                    <div style={{fontSize:13,fontWeight:700,color:WW.text}}>{c.name}</div>
                    <div style={{fontSize:11,color:WW.textSec}}>{c.issuer} · Expires {c.expiry}</div>
                    <button style={{marginTop:6,background:'none',border:`1px solid ${WW.border}`,borderRadius:6,padding:'3px 10px',fontSize:11,fontWeight:600,color:WW.primary,cursor:'pointer'}}>Preview document</button>
                  </div>
                ))}
              </div>

              {selected.rejectReason&&(
                <div style={{background:'#FEE2E2',borderRadius:10,padding:'10px 12px',marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#DC2626',textTransform:'uppercase',marginBottom:4}}>Rejection reason</div>
                  <div style={{fontSize:12,color:'#7F1D1D'}}>{selected.rejectReason}</div>
                </div>
              )}

              {selected.status==='Pending'&&(
                <div style={{display:'flex',gap:10,marginTop:8}}>
                  <button onClick={()=>setRejectModal(true)} style={{flex:1,height:40,borderRadius:10,background:'#FEE2E2',color:'#DC2626',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Reject</button>
                  <button onClick={handleApprove} style={{flex:2,height:40,borderRadius:10,background:WW.teal,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 12px rgba(75,184,204,.3)'}}>Approve</button>
                </div>
              )}
              {selected.status==='Approved'&&<div style={{background:'#D1FAE5',borderRadius:10,padding:'10px',textAlign:'center',fontSize:13,fontWeight:700,color:'#059669'}}>✓ Application approved</div>}
              {selected.status==='Rejected'&&<button onClick={()=>setRejectModal(true)} style={{width:'100%',height:40,borderRadius:10,background:WW.chipBg,color:WW.primary,border:`1px solid ${WW.primary}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Update rejection reason</button>}
            </div>
          )}
        </div>
      </div>

      {rejectModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,10,18,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:WW.card,borderRadius:20,padding:'28px',width:440,boxShadow:'0 20px 60px rgba(20,25,60,.25)'}}>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Reject application</div>
            <div style={{fontSize:13,color:WW.textSec,marginBottom:14}}>Provide a reason — this will be shown to the applicant so they can resubmit.</div>
            <textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="e.g. Certification document was not legible…" rows={4}
              style={{width:'100%',borderRadius:12,border:`1.5px solid ${WW.border}`,padding:'10px 14px',fontSize:13,color:WW.text,outline:'none',resize:'none',fontFamily:'inherit',marginBottom:16}}/>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setRejectModal(false)} style={{flex:1,height:42,borderRadius:10,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Cancel</button>
              <button onClick={handleReject} disabled={!rejectReason} style={{flex:2,height:42,borderRadius:10,background:rejectReason?'#EF4444':'#C8C8D8',color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:rejectReason?'pointer':'default'}}>Confirm rejection</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
