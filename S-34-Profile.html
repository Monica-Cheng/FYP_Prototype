<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-34 Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:light}
  html,body{margin:0;padding:0;background:#EDEEF5;font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .lbl{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
</style>
</head><body>
<div class="stage">
  <div class="lbl">S-34 · Profile</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const PATHS={
  'chevron-left':"M15 18l-6-6 6-6",
  settings:"M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
  camera:"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2zM12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
  'map-pin':"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0zM12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
  dumbbell:"M6 4v16M18 4v16M8 8h8M8 16h8M3 8h3M18 8h3M3 16h3M18 16h3",
  activity:"M22 12h-4l-3 9L9 3l-3 9H2",
  flame:"M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z",
  trophy:"M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z",
  users:"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
  lock:"M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4",
  home:"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10",
  plans:"M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM16 3H8L6 7h12l-2-4z",
  star:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
  'bar-chart':"M18 20V10M12 20V4M6 20v-6",
};
function Icon({name,size=16,color='currentColor',style:s}){
  const p=PATHS[name];if(!p)return null;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline-flex',flexShrink:0,...s}}><path d={p}/></svg>;
}
function StatusBar(){
  return <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0,background:WW.card}}>
    <span style={{paddingTop:10}}>9:41</span>
    <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
    </div>
  </div>;
}

const BADGES=[
  {label:'First Workout',icon:'dumbbell',color:'#4BB8CC'},
  {label:'7-Day Streak',icon:'flame',color:'#4BB8CC'},
  {label:'Personal Best',icon:'trophy',color:WW.primary},
  {label:'Squad Win',icon:'users',color:WW.gold},
  {label:'Locked',icon:'lock',color:'#F2F2F7',locked:true},
  {label:'Locked',icon:'lock',color:'#F2F2F7',locked:true},
];
const FRIENDS=[
  {i:'A',c:'#6C7EE8',name:'Aiden Lee',user:'@aidenlee',level:9,xp:'1,840'},
  {i:'S',c:'#4BB8CC',name:'Sarah Lim',user:'@sarahlim',level:6,xp:'1,240'},
  {i:'Z',c:'#F59E0B',name:'Zaid Malik',user:'@zaidmalik',level:4,xp:'860'},
  {i:'A',c:'#8B5CF6',name:'Audrey Ng',user:'@audreyng',level:11,xp:'2,340'},
];

function App(){
  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <StatusBar/>
      {/* Top bar */}
      <div style={{height:56,display:'flex',alignItems:'center',padding:'0 16px',background:WW.card,borderBottom:'0.5px solid #E8EAF8',flexShrink:0,position:'relative'}}>
        <button onClick={()=>{const ref=new URLSearchParams(window.location.search).get('ref');window.location.href=ref||'S-09-Home.html';}} style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,borderRadius:10,background:WW.elevated,border:'none',cursor:'pointer',padding:0,flexShrink:0}}>
          <Icon name="chevron-left" size={18} color={WW.textSec}/>
        </button>
        <span style={{position:'absolute',left:'50%',transform:'translateX(-50%)',fontSize:18,fontWeight:600,color:WW.primaryDark}}>Profile</span>
        <a href="S-35-Settings.html" style={{marginLeft:'auto',display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,borderRadius:10,background:WW.elevated,textDecoration:'none'}}>
          <Icon name="settings" size={18} color={WW.text}/>
        </a>
      </div>

      {/* Scroll body */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:24}}>

        {/* Profile header card */}
        <div style={{background:WW.card,borderRadius:16,margin:'16px 16px 12px',padding:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{position:'relative',display:'inline-flex'}}>
            <div style={{width:80,height:80,borderRadius:40,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:700,color:'#fff'}}>M</div>
            <a href="S-37-Edit-Profile.html" style={{position:'absolute',bottom:0,right:0,width:24,height:24,borderRadius:12,background:WW.card,border:`1.5px solid ${WW.primary}`,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>
              <Icon name="camera" size={12} color={WW.primary}/>
            </a>
          </div>
          <div style={{fontSize:20,fontWeight:600,color:WW.primaryDark,marginTop:8}}>Marcus Tan</div>
          <div style={{fontSize:14,color:WW.textSec}}>@marcustan</div>
          <div style={{display:'flex',alignItems:'center',gap:4,marginTop:4}}>
            <Icon name="map-pin" size={12} color={WW.textSec}/>
            <span style={{fontSize:13,color:WW.textSec}}>Singapore</span>
          </div>
          <div style={{fontSize:13,color:WW.text,textAlign:'center',lineHeight:1.5,marginTop:8,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
            Gym 4x a week. Running on weekends. Chasing PRs and consistency.
          </div>
        </div>

        {/* Stats row */}
        <div style={{display:'flex',gap:8,padding:'0 16px',marginBottom:16}}>
          {[
            {icon:'dumbbell',val:'47',lbl:'Sessions',c:WW.primary},
            {icon:'activity',val:'38.2',lbl:'km',c:WW.teal},
            {icon:'flame',val:'7',lbl:'Day streak',c:WW.teal},
          ].map((s,i)=>(
            <div key={i} style={{flex:1,background:WW.elevated,borderRadius:12,padding:12,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <Icon name={s.icon} size={16} color={s.c}/>
              <span style={{fontSize:20,fontWeight:700,color:WW.text}}>{s.val}</span>
              <span style={{fontSize:11,color:WW.textSec}}>{s.lbl}</span>
            </div>
          ))}
        </div>

        {/* Badges */}
        <div style={{padding:'0 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:16,fontWeight:600,color:WW.text}}>Badges</span>
            <span style={{fontSize:13,color:WW.primary,cursor:'pointer'}}>View all</span>
          </div>
          <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:4}}>
            {BADGES.map((b,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0}}>
                <div style={{width:56,height:56,borderRadius:28,background:b.color,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',border:b.locked?`1.5px solid ${WW.border}`:'none'}}>
                  <Icon name={b.icon} size={22} color={b.locked?'#C8C8D8':'#fff'}/>
                </div>
                <span style={{fontSize:10,color:b.locked?'#C8C8D8':WW.text,textAlign:'center',maxWidth:56,lineHeight:1.2}}>{b.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* XP Level */}
        <div style={{background:WW.card,borderRadius:16,margin:'12px 16px',padding:12,display:'flex',alignItems:'center',gap:12,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow}}>
          <span style={{fontSize:20,fontWeight:700,color:WW.primaryDark,flexShrink:0}}>Lv.7</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:500,color:WW.text,marginBottom:4}}>Iron Athlete</div>
            <div style={{height:6,borderRadius:6,background:'#E6EAFE',overflow:'hidden'}}>
              <div style={{width:'81%',height:'100%',background:WW.primary,borderRadius:6}}/>
            </div>
            <div style={{fontSize:11,color:WW.textSec,marginTop:4}}>3,240 / 4,000 XP · 760 to Level 8</div>
          </div>
        </div>

        {/* Friends */}
        <div style={{padding:'4px 16px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:16,fontWeight:600,color:WW.text}}>Friends</span>
            <a href="S-29-Add-Friends.html" style={{fontSize:13,color:WW.primary,textDecoration:'none'}}>Add friends</a>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
            <Icon name="users" size={14} color={WW.textSec}/>
            <span style={{fontSize:13,color:WW.textSec}}>8 friends</span>
          </div>
          {FRIENDS.map((f,i)=>(
            <div key={i} style={{background:WW.card,borderRadius:12,padding:'0 12px',marginBottom:6,display:'flex',alignItems:'center',gap:12,height:56,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow}}>
              <div style={{width:40,height:40,borderRadius:20,background:f.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>{f.i}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:WW.text}}>{f.name}</div>
                <div style={{fontSize:12,color:WW.textSec}}>{f.user} · Level {f.level}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,fontWeight:600,color:WW.primary}}>{f.xp} XP</div>
                <div style={{fontSize:10,color:WW.textSec}}>this week</div>
              </div>
            </div>
          ))}
          <div style={{textAlign:'center',marginTop:8,marginBottom:4}}>
            <span style={{fontSize:13,color:WW.primary,cursor:'pointer'}}>See all friends →</span>
          </div>
        </div>
        <div style={{height:16}}/>
      </div>

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
