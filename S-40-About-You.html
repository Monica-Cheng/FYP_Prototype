<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-40 About You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:light}
  html,body{margin:0;padding:0;background:#EDEEF5;font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .lbl{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite;display:inline-flex}
</style>
</head><body>
<div class="stage">
  <div class="lbl">S-40 · About You</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',shadow:'0 2px 8px rgba(45,58,140,.06)'};
const PATHS={
  'chevron-left':"M15 18l-6-6 6-6",
  check:"M20 6L9 17l-5-5",
  'loader-circle':"M21 12a9 9 0 1 1-6.22-8.56",
  info:"M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zM12 16v-4M12 8h.01",
};
function Icon({name,size=16,color='currentColor',style:s,className:cn}){
  const p=PATHS[name];if(!p)return null;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline-flex',flexShrink:0,...s}} className={cn}><path d={p}/></svg>;
}
function StatusBar(){
  return <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0,background:WW.card}}>
    <span style={{paddingTop:10}}>9:41</span>
    <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
    </div>
  </div>;
}

function Toggle({on,onChange}){
  return(
    <div onClick={()=>onChange(!on)} style={{width:44,height:26,borderRadius:13,background:on?WW.primary:'#D1D1DA',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
      <div style={{position:'absolute',top:3,left:on?21:3,width:20,height:20,borderRadius:10,background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.2)',transition:'left .2s'}}/>
    </div>
  );
}

function UnitToggle({options,value,onChange,disabled}){
  return(
    <div style={{display:'flex',background:WW.elevated,borderRadius:8,padding:2,gap:2,opacity:disabled?.4:1}}>
      {options.map(o=>(
        <button key={o} onClick={()=>!disabled&&onChange(o)} style={{padding:'4px 10px',borderRadius:6,border:'none',background:value===o?WW.card:'transparent',color:value===o?WW.primaryDark:WW.textSec,fontSize:12,fontWeight:value===o?600:400,cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',transition:'background .15s'}}>
          {o}
        </button>
      ))}
    </div>
  );
}

const ORIG={dob:'1998-04-12',heightCm:'175',heightFt:'5',heightIn:'9',weightKg:'76',weightLb:'167',sex:'male'};

function App(){
  const [dob,setDob]=React.useState(ORIG.dob);
  const [heightCm,setHeightCm]=React.useState(ORIG.heightCm);
  const [heightFt,setHeightFt]=React.useState(ORIG.heightFt);
  const [heightIn,setHeightIn]=React.useState(ORIG.heightIn);
  const [weightKg,setWeightKg]=React.useState(ORIG.weightKg);
  const [weightLb,setWeightLb]=React.useState(ORIG.weightLb);
  const [sex,setSex]=React.useState(ORIG.sex);
  const [heightUnit,setHeightUnit]=React.useState('cm');
  const [weightUnit,setWeightUnit]=React.useState('kg');
  const [useDefaults,setUseDefaults]=React.useState(false);
  const [saveS,setSaveS]=React.useState('idle');

  const disabled=useDefaults;
  const dirty=dob!==ORIG.dob||heightCm!==ORIG.heightCm||weightKg!==ORIG.weightKg||sex!==ORIG.sex||!useDefaults;
  const canSave=!useDefaults&&saveS==='idle';

  function handleSave(){
    if(!canSave)return;
    setSaveS('loading');
    setTimeout(()=>{
      setSaveS('saved');
      setTimeout(()=>window.location.href='S-35-Settings.html',700);
    },800);
  }

  const saveBg=saveS==='saved'?'#22C55E':canSave?WW.primary:'#E8EAF8';
  const saveFg=saveS==='saved'||canSave?'#fff':'#8A8A9E';
  const saveTxt=saveS==='loading'?'Saving...':saveS==='saved'?'Saved!':'Save Changes';

  const inputStyle=(dis)=>({
    flex:1,border:'none',outline:'none',fontSize:15,color:dis?WW.textSec:WW.text,
    background:'transparent',fontFamily:'inherit',minWidth:0,opacity:dis?.6:1,
  });

  const rowCard=(label,content,hint)=>(
    <div style={{background:WW.card,borderRadius:12,padding:'12px 16px',border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,opacity:disabled?.6:1}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div style={{fontSize:11,fontWeight:600,color:WW.textSec,letterSpacing:.5,textTransform:'uppercase'}}>{label}</div>
        {hint&&<div style={{fontSize:11,color:WW.textSec}}>{hint}</div>}
      </div>
      {content}
    </div>
  );

  const SEX_OPTIONS=['male','female','non-binary','prefer not to say'];

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <StatusBar/>
      <div style={{height:56,display:'flex',alignItems:'center',padding:'0 16px',background:WW.card,borderBottom:'0.5px solid #E8EAF8',flexShrink:0,position:'relative'}}>
        <a href="S-35-Settings.html" style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,borderRadius:10,background:WW.elevated,textDecoration:'none',flexShrink:0}}>
          <Icon name="chevron-left" size={18} color={WW.textSec}/>
        </a>
        <span style={{position:'absolute',left:'50%',transform:'translateX(-50%)',fontSize:18,fontWeight:600,color:WW.primaryDark}}>About You</span>
        <button onClick={handleSave} disabled={!canSave} style={{marginLeft:'auto',fontSize:15,fontWeight:500,color:canSave?WW.primary:'#C8C8D8',background:'none',border:'none',padding:0,cursor:canSave?'pointer':'not-allowed',fontFamily:'inherit'}}>Save</button>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 120px',display:'flex',flexDirection:'column',gap:12}}>

        {/* Use defaults toggle */}
        <div style={{background:WW.card,borderRadius:12,padding:'14px 16px',border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:15,fontWeight:500,color:WW.text}}>Use default values</div>
            <div style={{fontSize:12,color:WW.textSec,marginTop:2}}>Let WiseCoach estimate from your activity</div>
          </div>
          <Toggle on={useDefaults} onChange={setUseDefaults}/>
        </div>

        {/* DOB */}
        {rowCard('Date of Birth',
          <input type="date" value={dob} onChange={e=>setDob(e.target.value)} disabled={disabled}
            style={{...inputStyle(disabled),width:'100%',fontSize:15,color:disabled?WW.textSec:WW.text,cursor:disabled?'not-allowed':'auto'}}/>
        )}

        {/* Height */}
        {rowCard('Height',
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            {heightUnit==='cm'?(
              <input value={heightCm} onChange={e=>setHeightCm(e.target.value)} disabled={disabled}
                placeholder="175" type="number" style={{...inputStyle(disabled),fontSize:22,fontWeight:600}}/>
            ):(
              <div style={{display:'flex',gap:8,flex:1}}>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <input value={heightFt} onChange={e=>setHeightFt(e.target.value)} disabled={disabled}
                    placeholder="5" type="number" style={{...inputStyle(disabled),width:40,fontSize:22,fontWeight:600}}/>
                  <span style={{fontSize:13,color:WW.textSec}}>ft</span>
                </div>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <input value={heightIn} onChange={e=>setHeightIn(e.target.value)} disabled={disabled}
                    placeholder="9" type="number" style={{...inputStyle(disabled),width:40,fontSize:22,fontWeight:600}}/>
                  <span style={{fontSize:13,color:WW.textSec}}>in</span>
                </div>
              </div>
            )}
            <UnitToggle options={['cm','ft']} value={heightUnit} onChange={setHeightUnit} disabled={disabled}/>
          </div>
        )}

        {/* Weight */}
        {rowCard('Weight',
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input value={weightUnit==='kg'?weightKg:weightLb} onChange={e=>{if(weightUnit==='kg')setWeightKg(e.target.value);else setWeightLb(e.target.value);}} disabled={disabled}
              placeholder={weightUnit==='kg'?'76':'167'} type="number" style={{...inputStyle(disabled),fontSize:22,fontWeight:600}}/>
            <UnitToggle options={['kg','lb']} value={weightUnit} onChange={setWeightUnit} disabled={disabled}/>
          </div>
        )}

        {/* Sex */}
        <div style={{background:WW.card,borderRadius:12,padding:'12px 16px',border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,opacity:disabled?.6:1}}>
          <div style={{fontSize:11,fontWeight:600,color:WW.textSec,letterSpacing:.5,textTransform:'uppercase',marginBottom:10}}>Sex</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {SEX_OPTIONS.map(o=>(
              <button key={o} onClick={()=>!disabled&&setSex(o)} style={{padding:'8px 14px',borderRadius:20,border:`1px solid ${sex===o?WW.primary:WW.border}`,background:sex===o?'#E6EAFE':'transparent',color:sex===o?WW.primaryDark:WW.textSec,fontSize:13,fontWeight:sex===o?600:400,cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',transition:'all .15s',textTransform:'capitalize'}}>
                {o}
              </button>
            ))}
          </div>
        </div>

        {/* Info note */}
        <div style={{background:'#F0EEFE',borderRadius:12,padding:'12px 14px',border:'0.5px solid #D8D0F4',display:'flex',gap:10}}>
          <Icon name="info" size={16} color="#7B5CB8" style={{marginTop:1,flexShrink:0}}/>
          <div style={{fontSize:13,color:'#5B3F9E',lineHeight:1.5}}>These details help WiseCoach personalise calorie estimates and workout recommendations.</div>
        </div>
      </div>

      {/* Sticky button */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:WW.card,padding:'12px 16px',paddingBottom:'calc(12px + env(safe-area-inset-bottom,0px))',borderTop:'0.5px solid #E8EAF8',zIndex:20}}>
        <button onClick={handleSave} style={{width:'100%',height:52,borderRadius:16,border:'none',background:saveBg,color:saveFg,fontSize:16,fontWeight:500,cursor:canSave?'pointer':'not-allowed',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {saveS==='loading'&&<Icon name="loader-circle" size={16} color="#fff" className="spin"/>}
          {saveS==='saved'&&<Icon name="check" size={16} color="#fff"/>}
          {saveTxt}
        </button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
