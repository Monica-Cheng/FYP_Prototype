<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout Admin · Challenges</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F7F8FF;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;min-height:100vh;color:#3D3D5C}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C8C8D8;border-radius:3px}
  tr:hover td{background:#F7F8FF}
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.07)'};
const NAV_ITEMS=[{id:'dashboard',label:'Dashboard',href:'A-02-Admin-Dashboard.html'},{id:'users',label:'Users',href:'A-03-Admin-Users.html'},{id:'bp',label:'Business Partners',href:'A-04-Admin-BP-Queue.html'},{id:'content',label:'Content',href:'A-05-Admin-Content.html'},{id:'challenges',label:'Challenges',href:'A-06-Admin-Challenges.html'},{id:'analytics',label:'Analytics',href:'A-07-Admin-Analytics.html'},{id:'settings',label:'Settings',href:'#'}];
const NAV_ICONS={dashboard:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/></svg>,users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="1.7"/><path d="M2 21c0-4 3.1-7 7-7s7 3 7 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M19 8v6M22 11h-6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,bp:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.7"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="1.7"/></svg>,content:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="1.7"/></svg>,challenges:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,analytics:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,settings:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.7"/></svg>};
function Sidebar({active}){return(<div style={{width:240,minHeight:'100vh',background:WW.card,borderRight:`1px solid ${WW.border}`,display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}><div style={{padding:'24px 20px 20px',borderBottom:`1px solid ${WW.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div><div><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark,lineHeight:1}}>WiseWorkout</div><div style={{fontSize:10,fontWeight:600,color:WW.textSec,letterSpacing:.5}}>ADMIN PORTAL</div></div></div></div><nav style={{padding:'12px 12px',flex:1}}>{NAV_ITEMS.map(n=>{const a=n.id===active;return(<a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:2,textDecoration:'none',background:a?WW.chipBg:'transparent',color:a?WW.primary:WW.textSec,fontWeight:a?700:500,fontSize:14}}><span style={{color:a?WW.primary:WW.textSec}}>{NAV_ICONS[n.id]}</span>{n.label}</a>);})}</nav><div style={{padding:'16px 20px',borderTop:`1px solid ${WW.border}`}}><a href="A-01-Admin-Login.html" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#EF4444',textDecoration:'none',fontWeight:600}}>Sign out</a></div></div>);}
function TopBar({title}){return(<div style={{height:64,background:WW.card,borderBottom:`1px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:WW.primaryDark}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:13,color:WW.textSec}}>admin@wiseworkout.com</div><div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:800,color:'#fff'}}>A</span></div></div></div>);}

const ACTIVE_CHALLENGES=[
  {id:'C001',name:'May Strength Month',creator:'Admin',type:'Gym',participants:142,start:'May 1, 2026',end:'May 31, 2026'},
  {id:'C002',name:'5k Every Day',creator:'Admin',type:'Cardio',participants:89,start:'May 6, 2026',end:'May 12, 2026'},
  {id:'C003',name:'10k Steps Squad',creator:'@marcus_tan',type:'Cardio',participants:4,start:'May 11, 2026',end:'May 18, 2026'},
  {id:'C004',name:'Weekend Warriors',creator:'@sarah_lim',type:'Mixed',participants:6,start:'May 9, 2026',end:'May 30, 2026'},
  {id:'C005',name:'30-Day Push-Up',creator:'Admin',type:'Gym',participants:215,start:'May 1, 2026',end:'May 30, 2026'},
];

const INIT_REPORTED=[
  {id:'R001',reason:'Inappropriate language in challenge name',reporter:'@ben_w',challenge:'Crazy Fat Loss NOW',creator:'@spammer',date:'May 11, 2026',status:'Open'},
  {id:'R002',reason:'Unrealistic health claims in description',reporter:'@priya_n',challenge:'Lose 10kg in 7 days',creator:'@fake_coach',date:'May 10, 2026',status:'Open'},
  {id:'R003',reason:'Duplicate spam challenge',reporter:'@alex_k',challenge:'5k Every Day (copy)',creator:'@spammer',date:'May 9, 2026',status:'Investigating'},
];

function App(){
  const [tab,setTab]=React.useState('active');
  const [reported,setReported]=React.useState(INIT_REPORTED);
  const [removeModal,setRemoveModal]=React.useState(null);
  const [removed,setRemoved]=React.useState([]);

  const handleRemove=(id)=>{
    setReported(p=>p.map(r=>r.id===id?{...r,status:'Removed'}:r));
    setRemoved(p=>[...p,id]);
    setRemoveModal(null);
  };
  const handleInvestigate=(id)=>{
    setReported(p=>p.map(r=>r.id===id?{...r,status:'Investigating'}:r));
  };

  const StatusPill=({s})=>{
    const cfg={Open:{bg:'#FEF3C7',c:'#92400E'},Investigating:{bg:'#DBEAFE',c:'#1D4ED8'},Removed:{bg:'#FEE2E2',c:'#DC2626'}};
    return <span style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,...(cfg[s]||{}),whiteSpace:'nowrap'}}>{s}</span>;
  };

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active="challenges"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',minWidth:0}}>
        <TopBar title="Challenge Moderation"/>
        <div style={{flex:1,padding:'28px 32px',display:'flex',flexDirection:'column',gap:20}}>
          {/* Sub-tabs */}
          <div style={{display:'flex',gap:2,background:WW.elevated,borderRadius:12,padding:4,width:'fit-content'}}>
            {[{id:'active',label:'Active Challenges'},{id:'reported',label:'Reported'}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 18px',borderRadius:9,background:tab===t.id?WW.card:'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:tab===t.id?WW.primaryDark:WW.textSec,boxShadow:tab===t.id?WW.shadow:'none',display:'flex',alignItems:'center',gap:6}}>
                {t.label}{t.id==='reported'&&<span style={{background:'#EF4444',color:'#fff',fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:10}}>{reported.filter(r=>r.status!=='Removed').length}</span>}
              </button>
            ))}
          </div>

          {tab==='active'&&(
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                  {['Challenge name','Creator','Type','Participants','Start date','End date'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {ACTIVE_CHALLENGES.map((c,i)=>(
                    <tr key={c.id} style={{borderBottom:i<ACTIVE_CHALLENGES.length-1?`0.5px solid ${WW.border}`:'none'}}>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,fontWeight:700,color:WW.text}}>{c.name}</div><div style={{fontSize:11,color:WW.textSec}}>{c.id}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{c.creator}</td>
                      <td style={{padding:'12px 16px'}}><span style={{fontSize:11,fontWeight:700,background:c.type==='Gym'?WW.chipBg:c.type==='Cardio'?'#E0F4F8':'#F0EEFE',color:c.type==='Gym'?WW.primary:c.type==='Cardio'?WW.teal:'#9B84E8',padding:'3px 9px',borderRadius:20}}>{c.type}</span></td>
                      <td style={{padding:'12px 16px',fontSize:13,fontWeight:700,color:WW.primaryDark}}>{c.participants}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec}}>{c.start}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec}}>{c.end}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {tab==='reported'&&(
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                  {['Report reason','Reporter','Challenge name','Created by','Report date','Status','Actions'].map(h=>(
                    <th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {reported.map((r,i)=>(
                    <tr key={r.id} style={{borderBottom:i<reported.length-1?`0.5px solid ${WW.border}`:'none',background:r.status==='Removed'?'#FFF8F8':'transparent'}}>
                      <td style={{padding:'12px 16px',maxWidth:200}}><div style={{fontSize:13,color:WW.text,lineHeight:1.4}}>{r.reason}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.textSec}}>{r.reporter}</td>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,fontWeight:700,color:WW.text}}>{r.challenge}</div><div style={{fontSize:11,color:WW.textSec}}>{r.id}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.textSec}}>{r.creator}</td>
                      <td style={{padding:'12px 16px',fontSize:12,color:WW.textSec,whiteSpace:'nowrap'}}>{r.date}</td>
                      <td style={{padding:'12px 16px'}}><StatusPill s={r.status}/></td>
                      <td style={{padding:'12px 16px'}}>
                        {r.status!=='Removed'?(
                          <div style={{display:'flex',gap:10}}>
                            {r.status==='Open'&&<button onClick={()=>handleInvestigate(r.id)} style={{background:'none',border:'none',color:WW.primary,fontSize:12,fontWeight:700,cursor:'pointer'}}>Investigate</button>}
                            <button onClick={()=>setRemoveModal(r)} style={{background:'none',border:'none',color:'#EF4444',fontSize:12,fontWeight:700,cursor:'pointer'}}>Remove</button>
                          </div>
                        ):(
                          <span style={{fontSize:12,color:WW.textSec}}>Removed & notified</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {/* Remove confirmation modal */}
      {removeModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,10,18,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:WW.card,borderRadius:20,padding:'28px',width:440,boxShadow:'0 20px 60px rgba(20,25,60,.25)'}}>
            <div style={{fontSize:32,marginBottom:12,textAlign:'center'}}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle'}}><path d="M5 3v18" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M5 4h10l-2 4 2 4H5" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg></div>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8,textAlign:'center'}}>Remove challenge?</div>
            <div style={{background:'#F9FAFB',borderRadius:12,padding:'12px 14px',marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:WW.text}}>{removeModal.challenge}</div>
              <div style={{fontSize:12,color:WW.textSec}}>by {removeModal.creator}</div>
            </div>
            <div style={{fontSize:13,color:WW.textSec,lineHeight:1.6,marginBottom:6}}>This challenge will be permanently removed. All <strong>{removeModal.reason==='Duplicate spam challenge'?3:12} participants</strong> will be notified by in-app message.</div>
            <div style={{background:'#FEF3C7',borderRadius:10,padding:'10px 12px',marginBottom:20,fontSize:12,color:'#92400E'}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'-2px',marginRight:6}}><path d="M12 3l9 16H3l9-16z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/><path d="M12 9v4" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><circle cx="12" cy="16.5" r="1" fill="currentColor"/></svg>This action cannot be undone.</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setRemoveModal(null)} style={{flex:1,height:42,borderRadius:10,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Cancel</button>
              <button onClick={()=>handleRemove(removeModal.id)} style={{flex:2,height:42,borderRadius:10,background:'#EF4444',color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Remove & notify participants</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
