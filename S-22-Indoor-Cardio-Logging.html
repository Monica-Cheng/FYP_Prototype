<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-22 Indoor Cardio Logging</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:240px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
  .tweak-row select{font-size:12px;border:1px solid #C8C8D8;border-radius:6px;padding:2px 4px;color:#3D3D5C}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes menuDown{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head><body>
<div class="stage">
  <div class="label">S-22 · Indoor Cardio Logging</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Wearable connected</label><input type="checkbox" id="tw-hr" checked/></div>
  <div class="tweak-row"><label>Goal type</label>
    <select id="tw-goal"><option value="distance">Distance</option><option value="duration">Duration</option><option value="calories">Calories</option><option value="none">No goal</option></select>
  </div>
  <div class="tweak-row"><label>Activity type</label>
    <select id="tw-activity"><option value="run">Treadmill Run</option><option value="walk">Treadmill Walk</option><option value="elliptical">Elliptical</option><option value="rowing">Rowing Machine</option><option value="cycle">Indoor Cycle</option></select>
  </div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',lavenderText:'#7B5CB8',lavenderBody:'#5B3F9E',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const ACTIVITY_TYPES={
  run:{label:'Treadmill Run',met:8.0,showPace:true,paceLabel:'Avg Pace',speedLabel:null},
  walk:{label:'Treadmill Walk',met:3.5,showPace:true,paceLabel:'Avg Pace',speedLabel:null},
  elliptical:{label:'Elliptical',met:5.0,showPace:false,speedLabel:null},
  rowing:{label:'Rowing Machine',met:7.0,showPace:false,speedLabel:null},
  cycle:{label:'Indoor Cycle',met:6.0,showPace:false,speedLabel:'Avg Speed'},
};

const HR_ZONES=[
  {zone:1,label:'Recovery',color:'#8A8A9E',min:0,max:114},
  {zone:2,label:'Aerobic',color:'#4BB8CC',min:115,max:134},
  {zone:3,label:'Aerobic',color:'#6C7EE8',min:135,max:154},
  {zone:4,label:'Threshold',color:'#F59E0B',min:155,max:174},
  {zone:5,label:'Max Effort',color:'#EF4444',min:175,max:999},
];

function getZone(bpm){return HR_ZONES.find(z=>bpm>=z.min&&bpm<=z.max)||HR_ZONES[2];}

function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}

function StatusBar(){
  return(
    <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}>
      <div style={{paddingTop:10}}>9:41</div>
      <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
      </div>
    </div>
  );
}

function App(){
  const [elapsed,setElapsed]=React.useState(1112); // 18:32
  const [paused,setPaused]=React.useState(false);
  const [showStop,setShowStop]=React.useState(false);
  const [showMenu,setShowMenu]=React.useState(false);
  const [hasHR,setHasHR]=React.useState(true);
  const [goalType,setGoalType]=React.useState('distance');
  const [actType,setActType]=React.useState('run');
  const timerRef=React.useRef(null);

  const currentHR=142;
  const zone=getZone(currentHR);
  const bodyWeightKg=70;
  const act=ACTIVITY_TYPES[actType];
  const hours=elapsed/3600;
  const calories=Math.round(act.met*bodyWeightKg*hours);
  const distKm=(actType==='run'?2.1:actType==='walk'?1.4:actType==='cycle'?5.2:0);

  // Goal progress
  const goalConfig={
    distance:{label:`${distKm.toFixed(1)} km of 5.0 km`,pct:Math.round(distKm/5.0*100)},
    duration:{label:`${fmtTime(elapsed)} of 30:00`,pct:Math.round(elapsed/1800*100)},
    calories:{label:`${calories} of 300 kcal`,pct:Math.round(calories/300*100)},
    none:{label:'',pct:0},
  };
  const goal=goalConfig[goalType];

  React.useEffect(()=>{
    if(paused||showStop){clearInterval(timerRef.current);return;}
    timerRef.current=setInterval(()=>setElapsed(s=>s+1),1000);
    return()=>clearInterval(timerRef.current);
  },[paused,showStop]);

  React.useEffect(()=>{
    const syncTweaks=()=>{
      setHasHR(document.getElementById('tw-hr')?.checked??true);
      setGoalType(document.getElementById('tw-goal')?.value??'distance');
      setActType(document.getElementById('tw-activity')?.value??'run');
    };
    document.querySelectorAll('#tweaks input,#tweaks select').forEach(el=>el.addEventListener('change',syncTweaks));
    syncTweaks();
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  // Stat cards
  const showDist=goalType==='distance';
  const statCount=2+(showDist?1:0);

  // Pace row
  const avgPaceSecPerKm=distKm>0?Math.round(elapsed/distKm):0;
  const avgPaceFmt=avgPaceSecPerKm>0?`${Math.floor(avgPaceSecPerKm/60)}:${String(avgPaceSecPerKm%60).padStart(2,'0')} /km`:'--';
  const curPaceFmt='6:15 /km';
  const avgSpeedFmt=`${(distKm/hours).toFixed(1)} km/h`;

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,position:'relative'}}>
      <StatusBar/>

      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',padding:'0 16px 0',height:48,flexShrink:0,position:'relative'}}>
        <a href="S-20-Cardio-Setup.html" style={{width:36,height:36,borderRadius:10,background:WW.card,border:`0.5px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',boxShadow:WW.shadow}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={WW.text} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </a>
        <div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',fontSize:16,fontWeight:800,color:WW.primaryDark}}>{act.label}</div>
        <div style={{marginLeft:'auto',position:'relative'}}>
          <button onClick={()=>setShowMenu(m=>!m)} style={{width:36,height:36,borderRadius:10,background:WW.card,border:`0.5px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:WW.shadow}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.5" fill={WW.text}/><circle cx="12" cy="12" r="1.5" fill={WW.text}/><circle cx="12" cy="19" r="1.5" fill={WW.text}/></svg>
          </button>
          {showMenu&&(
            <div onClick={()=>setShowMenu(false)} style={{position:'absolute',top:42,right:0,background:WW.card,borderRadius:12,border:`0.5px solid ${WW.border}`,boxShadow:'0 8px 24px rgba(45,58,140,.14)',zIndex:40,minWidth:160,animation:'menuDown .15s ease',overflow:'hidden'}}>
              {['Add Note','End Session'].map((item,i)=>(
                <button key={i} onClick={()=>{if(item==='End Session')setShowStop(true);}}
                  style={{display:'block',width:'100%',padding:'12px 16px',border:'none',borderBottom:i===0?`0.5px solid ${WW.border}`:'none',background:'transparent',fontSize:14,fontWeight:600,color:WW.text,textAlign:'left',cursor:'pointer'}}>
                  {item}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Goal progress bar */}
      {goalType!=='none'&&(
        <div style={{padding:'8px 16px 6px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:600,color:WW.textSec,marginBottom:5}}>
            <span>{goal.label}</span>
            <span style={{color:WW.primary,fontWeight:700}}>{Math.min(goal.pct,100)}%</span>
          </div>
          <div style={{height:6,borderRadius:8,background:WW.chipBg,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(goal.pct,100)}%`,borderRadius:8,background:WW.primary,transition:'width .4s'}}/>
          </div>
        </div>
      )}

      {/* Hero timer */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 0 24px',flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:600,color:WW.textSec,letterSpacing:2,textTransform:'uppercase',marginBottom:8}}>TIME</div>
        <div style={{fontSize:52,fontWeight:600,color:WW.text,letterSpacing:-1,fontVariantNumeric:'tabular-nums',lineHeight:1}}>
          {paused?(
            <span style={{opacity:.5}}>{fmtTime(elapsed)}</span>
          ):fmtTime(elapsed)}
        </div>
        {paused&&<div style={{marginTop:8,fontSize:11,fontWeight:700,color:WW.gold,letterSpacing:1,textTransform:'uppercase'}}>Paused</div>}
      </div>

      {/* Secondary stats row */}
      <div style={{padding:'0 16px',display:'flex',gap:10,flexShrink:0,position:'relative'}}>
        {paused&&<div style={{position:'absolute',inset:0,background:'rgba(247,248,255,.65)',zIndex:10,borderRadius:16,margin:'0 16px'}}/>}

        {/* Calories */}
        <div style={{flex:1,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'12px',display:'flex',flexDirection:'column',alignItems:'center',boxShadow:WW.shadow}}>
          <div style={{fontSize:11,color:WW.textSec,marginBottom:4}}>Calories</div>
          <div style={{fontSize:20,fontWeight:600,color:WW.text}}>{calories} <span style={{fontSize:13,fontWeight:500}}>kcal</span></div>
          <div style={{fontSize:10,color:WW.textSec,fontStyle:'italic',marginTop:3}}>MET estimate</div>
        </div>

        {/* Heart Rate */}
        <div style={{flex:1,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'12px',display:'flex',flexDirection:'column',alignItems:'center',boxShadow:WW.shadow}}>
          <div style={{fontSize:11,color:WW.textSec,marginBottom:4}}>Heart Rate</div>
          {hasHR?(
            <>
              <div style={{fontSize:20,fontWeight:600,color:zone.color}}>{currentHR} <span style={{fontSize:13,fontWeight:500}}>bpm</span></div>
              <div style={{fontSize:10,color:zone.color,fontWeight:600,marginTop:3}}>Zone {zone.zone} · {zone.label}</div>
            </>
          ):(
            <>
              <div style={{fontSize:20,fontWeight:600,color:WW.textSec}}>--</div>
              <div style={{fontSize:10,color:WW.textSec,marginTop:3}}>Connect a wearable</div>
            </>
          )}
        </div>

        {/* Distance — only if goal is distance */}
        {showDist&&(
          <div style={{flex:1,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'12px',display:'flex',flexDirection:'column',alignItems:'center',boxShadow:WW.shadow}}>
            <div style={{fontSize:11,color:WW.textSec,marginBottom:4}}>Distance</div>
            <div style={{fontSize:20,fontWeight:600,color:WW.text}}>{distKm.toFixed(1)} <span style={{fontSize:13,fontWeight:500}}>km</span></div>
            <div style={{fontSize:10,color:WW.textSec,fontStyle:'italic',marginTop:3}}>Accel. estimate</div>
          </div>
        )}
      </div>

      {/* Pace / speed row */}
      {(act.showPace||act.speedLabel)&&(
        <div style={{textAlign:'center',padding:'14px 16px 0',fontSize:13,color:WW.textSec,flexShrink:0}}>
          {act.showPace&&<span>Avg Pace&nbsp; <strong style={{color:WW.text}}>{avgPaceFmt}</strong> &nbsp;·&nbsp; Current&nbsp; <strong style={{color:WW.text}}>{curPaceFmt}</strong></span>}
          {act.speedLabel&&<span>{act.speedLabel}&nbsp; <strong style={{color:WW.text}}>{avgSpeedFmt}</strong></span>}
        </div>
      )}

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* Bottom controls */}
      <div style={{padding:'0 16px 16px',display:'flex',gap:12,flexShrink:0}}>
        <button onClick={()=>setPaused(p=>!p)}
          style={{flex:1,height:48,borderRadius:14,border:`1.5px solid ${WW.primary}`,background:'transparent',color:WW.primary,fontSize:15,fontWeight:700,cursor:'pointer'}}>
          {paused?'Resume':'Pause'}
        </button>
        <button onClick={()=>setShowStop(true)}
          style={{flex:1,height:48,borderRadius:14,border:'none',background:'#EF4444',color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 3px 10px rgba(239,68,68,.3)'}}>
          Stop
        </button>
      </div>

      {/* Stop confirmation sheet */}
      {showStop&&(
        <div style={{position:'absolute',inset:0,background:'rgba(10,10,18,.5)',zIndex:50,display:'flex',alignItems:'flex-end'}} onClick={()=>setShowStop(false)}>
          <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:WW.card,borderRadius:'22px 22px 0 0',padding:'20px 20px 40px',boxShadow:'0 -8px 40px rgba(20,25,60,.2)',animation:'slideUp .28s ease'}}>
            <div style={{width:36,height:4,borderRadius:2,background:WW.border,margin:'0 auto 20px'}}/>
            <div style={{fontSize:17,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>End session?</div>
            <div style={{fontSize:14,color:WW.textSec,lineHeight:1.6,marginBottom:24}}>Your session will be saved. You can add details on the next screen.</div>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setShowStop(false)}
                style={{flex:1,height:48,borderRadius:12,border:`1.5px solid ${WW.border}`,background:'transparent',color:WW.text,fontSize:14,fontWeight:700,cursor:'pointer'}}>
                Keep going
              </button>
              <a href="S-22b-Post-Indoor-Save.html"
                style={{flex:1,height:48,borderRadius:12,border:'none',background:'#EF4444',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>
                Yes, end session
              </a>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
