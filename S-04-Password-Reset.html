<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-04 Password Reset</title>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #EDEEF5; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .label { font-size: 12px; color: #6B6B80; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .phone-shell { width: 390px; height: 844px; border-radius: 52px; background: #0A0A12; padding: 5px; box-shadow: 0 30px 70px rgba(20,25,60,0.20), 0 0 0 1px rgba(0,0,0,0.12); position: relative; box-sizing: content-box; }
  .phone-inner { width: 390px; height: 844px; border-radius: 47px; overflow: hidden; background: #F7F8FF; position: relative; }
  .island { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 118px; height: 33px; border-radius: 20px; background: #000; z-index: 60; pointer-events: none; }
  @keyframes checkIn { from { transform: scale(0.4) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="stage">
  <div class="label">S-04 · Password Reset</div>
  <div class="phone-shell">
    <div class="island"></div>
    <div class="phone-inner" id="app"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const WW = {
  bg: '#F7F8FF', card: '#FFFFFF', elevated: '#EEF0FB',
  primary: '#6C7EE8', primaryDark: '#2D3A8C',
  text: '#3D3D5C', textSec: '#8A8A9E', border: '#C8C8D8',
  shadow: '0 2px 8px rgba(45,58,140,0.06)',
};

function StatusBar() {
  return (
    <div style={{ height: 47, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', fontSize: 15, fontWeight: 600, color: WW.text }}>
      <div style={{ paddingTop: 10 }}>9:41</div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', paddingTop: 10 }}>
        <svg width="17" height="11" viewBox="0 0 17 11">
          <rect x="0" y="7" width="3" height="4" rx="0.6" fill={WW.text}/>
          <rect x="4.5" y="5" width="3" height="6" rx="0.6" fill={WW.text}/>
          <rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill={WW.text}/>
          <rect x="13.5" y="0" width="3" height="11" rx="0.6" fill={WW.text}/>
        </svg>
        <svg width="24" height="11" viewBox="0 0 24 11">
          <rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity="0.4" fill="none"/>
          <rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/>
          <rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill={WW.text} opacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function App() {
  const [email, setEmail] = React.useState('');
  const [error, setError] = React.useState('');
  const [sent, setSent] = React.useState(false);

  const handleSend = () => {
    if (!email.includes('@')) {
      setError('Please enter a valid email address');
      return;
    }
    setError('');
    setSent(true);
  };

  return (
    <div style={{ width: '100%', height: '100%', background: WW.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ padding: '12px 24px 32px', flex: 1 }}>
        {/* Back button */}
        <a href="S-02-Login.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: WW.text, textDecoration: 'none', marginBottom: 32 }}>
          <div style={{ width: 38, height: 38, borderRadius: 19, background: 'rgba(61,61,92,0.07)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M15 5l-7 7 7 7" stroke={WW.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </a>

        {!sent ? (
          /* Input state */
          <div>
            <div style={{ marginBottom: 32 }}>
              {/* Lock icon */}
              <div style={{ width: 64, height: 64, borderRadius: 20, background: WW.elevated, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="3" stroke={WW.primary} strokeWidth="1.8"/>
                  <path d="M7 11V7a5 5 0 0110 0v4" stroke={WW.primary} strokeWidth="1.8" strokeLinecap="round"/>
                  <circle cx="12" cy="16" r="1.5" fill={WW.primary}/>
                </svg>
              </div>
              <div style={{ fontSize: 28, fontWeight: 800, color: WW.primaryDark, letterSpacing: '-0.6px', marginBottom: 10 }}>Forgot password?</div>
              <div style={{ fontSize: 15, color: WW.textSec, lineHeight: 1.5 }}>Enter your email and we will send a reset link.</div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: WW.text, marginBottom: 6 }}>Email address</div>
              <input
                type="email"
                placeholder="you@example.com"
                value={email}
                onChange={e => { setEmail(e.target.value); setError(''); }}
                style={{
                  width: '100%', height: 50, borderRadius: 12,
                  border: `1px solid ${error ? '#EF4444' : WW.border}`,
                  background: error ? '#FFF5F5' : WW.card,
                  fontSize: 15, color: WW.text, padding: '0 14px',
                  boxSizing: 'border-box', outline: 'none', fontFamily: 'inherit',
                }}
              />
              {error && <div style={{ fontSize: 12, color: '#EF4444', marginTop: 4, fontWeight: 500 }}>{error}</div>}
            </div>

            <button onClick={handleSend} style={{
              width: '100%', height: 52, borderRadius: 14, background: WW.primary,
              color: '#fff', fontSize: 16, fontWeight: 700, border: 'none', cursor: 'pointer',
              boxShadow: '0 4px 14px rgba(108,126,232,0.35)',
            }}>Send reset email</button>
          </div>
        ) : (
          /* Success state */
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', paddingTop: 40 }}>
            {/* Green tick circle */}
            <div style={{
              width: 80, height: 80, borderRadius: 40, background: '#D1FAE5',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 24, animation: 'checkIn 0.5s cubic-bezier(.2,.8,.2,1) both',
            }}>
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M10 20l7 7 13-13" stroke="#059669" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div style={{ fontSize: 24, fontWeight: 800, color: WW.primaryDark, letterSpacing: '-0.5px', marginBottom: 12, animation: 'fadeUp 0.4s ease 0.2s both' }}>
              Check your inbox
            </div>
            <div style={{ fontSize: 15, color: WW.textSec, lineHeight: 1.6, maxWidth: 280, animation: 'fadeUp 0.4s ease 0.3s both' }}>
              Reset link sent to<br/>
              <strong style={{ color: WW.text }}>{email}</strong>
            </div>
            <div style={{ marginTop: 12, fontSize: 13, color: WW.textSec, animation: 'fadeUp 0.4s ease 0.4s both' }}>
              Check your spam folder if you don't see it.
            </div>
            <a href="S-02-Login.html" style={{
              marginTop: 40, display: 'flex', alignItems: 'center', justifyContent: 'center',
              width: '100%', height: 52, borderRadius: 14, background: WW.elevated,
              color: WW.primaryDark, fontSize: 16, fontWeight: 700, textDecoration: 'none',
              animation: 'fadeUp 0.4s ease 0.5s both',
            }}>Back to Log In</a>

            <button onClick={() => setSent(false)} style={{
              marginTop: 16, background: 'none', border: 'none', color: WW.primary,
              fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}>Try a different email</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
