    <script

    <script

    <script type="text/babel">
      const WW = {

        elevated: "#EEF0FB",
        primary: "#6C7EE8",
        primaryDark: "#2D3A8C",
        lavender: "#9B84E8",
        lavenderBg: "#F0EEFE",
        lavenderDark: "#7B5CB8",
        teal: "#4BB8CC",
        tealBg: "#E0F4F8",
        amber: "#F59E0B",
        amberBg: "#FEF3C7",
        text: "#3D3D5C",
        textSec: "#8A8A9E",
        border: "#C8C8D8",
        chipBg: "#E6EAFE",

      /* ── Icon system ── */
      const PATHS = {
        "chevron-left": "M15 18l-6-6 6-6",
        "chevron-right": "M9 18l6-6-6-6",
        star: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
        check: "M20 6L9 17l-5-5",
        x: "M18 6L6 18M6 6l12 12",
        minus: "M5 12h14",
        dumbbell: "M6 4v16M18 4v16M8 8h8M8 16h8M3 8h3M18 8h3M3 16h3M18 16h3",
        clock: ["M12 22A10 10 0 1 1 12 2a10 10 0 0 1 0 20z", "M12 6v6l4 2"],
        tag: "M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01",
        "rotate-ccw": "M1 4v6h6M3.51 15a9 9 0 1 0 .49-3.95",
        "x-circle": [
          "M22 12A10 10 0 1 1 2 12a10 10 0 0 1 20 0z",
          "M15 9l-6 6",
          "M9 9l6 6",
        ],
      };
      const Ico = {
        home: (c) => (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path
              d="M3 10.5L12 3l9 7.5V21a.5.5 0 01-.5.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A.5.5 0 013 21V10.5z"

        ),
        plans: (c) => (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="10" width="3.5" height="7" rx="1" fill={c} />
            <rect x="20" y="10" width="3.5" height="7" rx="1" fill={c} />
            <rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c} />
            <rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c} />
            <rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c} />

        coach: (c) => (

      function Icon({
        name,
        size = 16,
        color = "currentColor",
        style: s,
        className: cn,
      }) {
        if (name === "more-horizontal") {
          return (
            <svg
              width={size}
              height={size}
              viewBox="0 0 24 24"
              style={{ display: "inline-flex", flexShrink: 0, ...s }}
              className={cn}
            >
              <circle cx="5" cy="12" r="1.5" fill={color} />
              <circle cx="12" cy="12" r="1.5" fill={color} />
              <circle cx="19" cy="12" r="1.5" fill={color} />
            </svg>
          );
        }
        const p = PATHS[name];
        if (!p) return null;
        const paths = Array.isArray(p) ? p : [p];
        return (
          <svg
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke={color}
            strokeWidth="1.8"
            strokeLinecap="round"
            strokeLinejoin="round"
            style={{ display: "inline-flex", flexShrink: 0, ...s }}
            className={cn}
          >
            {paths.map((d, i) => (
              <path key={i} d={d} />
            ))}
          </svg>
        );

                "Leg Press 3×12",
                "Calf Raise 4×15",
              ],
            },
            {

                "Incline Press 4×8",

              exercises: [
                "Pull-ups 4×8",

        { id: 2, name: "Incline DB Press", sets: "3×10", accessory: false },
        { id: 3, name: "Overhead Press", sets: "3×10", accessory: false },
        { id: 4, name: "Lateral Raise", sets: "3×15", accessory: true },

      function SessionRow({ s }) {
        const isRest = s.status === "rest";
        const statusColor = {
          completed: WW.teal,
          done: WW.teal,
          today: WW.primary,
          scheduled: WW.border,
          rest: WW.border,
          missed: WW.amber,
        }[s.status];
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 10,
              padding: "9px 0",
              borderBottom: `0.5px solid #F2F2F7`,
            }}
          >
            <div
              style={{
                width: 3,
                height: 36,
                borderRadius: 2,
                background: statusColor,
                flexShrink: 0,
              }}
            />
            <div style={{ flex: 1 }}>
              <div
                style={{
                  fontSize: 13,
                  fontWeight: 700,
                  color: isRest ? WW.textSec : WW.text,
                }}
              >
                {isRest ? "Rest Day" : s.session}
              </div>
              {!isRest && s.exercises.length > 0 && (
                <div style={{ fontSize: 11, color: WW.textSec }}>
                  {s.exercises.length} exercises
                </div>
              )}
            </div>
            {(s.status === "completed" || s.status === "done") && (
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" fill={WW.tealBg} />
                <path
                  d="M8 12l3 3 5-5"
                  stroke={WW.teal}
                  strokeWidth="2"
                  strokeLinecap="round"
                />
              </svg>
            )}
            {s.status === "today" && (
              <span
                style={{
                  fontSize: 10,
                  fontWeight: 700,
                  color: WW.primary,
                  background: WW.chipBg,
                  padding: "3px 8px",
                  borderRadius: 10,
                }}
              >
                TODAY
              </span>
            )}
            {s.status === "missed" && (
              <span
                style={{
                  fontSize: 10,
                  fontWeight: 700,
                  color: WW.amber,
                  background: WW.amberBg,
                  padding: "3px 8px",
                  borderRadius: 10,
                }}
              >
                MISSED
              </span>
            )}
          </div>

      }

      function App() {
        const [weekIdx, setWeekIdx] = React.useState(1);

        function DayCircle({ w }) {
          const s = w.state;
          let bg, content, border = "none";
          if (s === "done" || s === "completed") {
            bg = WW.teal;
            content = <Icon name="check" size={13} color="#fff" />;
          } else if (s === "today") {
            bg = WW.primary;
            content = (
              <span style={{ fontSize: 11, fontWeight: 700, color: "#fff" }}>
                4
              </span>
            );
          } else if (s === "missed") {
            bg = "#FEF3C7";
            content = <Icon name="x" size={11} color={WW.amber} />;
            border = `1px solid ${WW.amber}`;
          } else if (s === "rest") {
            bg = "#F7F8FF";
            content = <Icon name="minus" size={11} color={WW.border} />;
            border = `1px solid ${WW.border}`;
          } else {
            bg = WW.card;
            content = (
              <span style={{ fontSize: 11, color: WW.textSec }}>{w.day}</span>
            );
            border = `1px solid ${WW.border}`;
          }
          return (
            <div
              style={{
                width: 32,
                height: 32,
                borderRadius: 16,
                background: bg,
                border,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                flexShrink: 0,
              }}
            >
              {content}
            </div>
          );

                  </div>
                  <div style={{ fontSize: 11, color: WW.textSec }}>
                    <span style={{ fontWeight: 700, color: WW.amber }}>1</span>{" "}
                    missed
                  </div>
                  <div style={{ fontSize: 11, color: WW.textSec }}>
                    <span style={{ fontWeight: 700, color: WW.textSec }}>26</span>{" "}
                    remaining
                  </div>
                </div>
              </div>

              {/* This week calendar */}
              <div
                style={{
                  fontSize: 14,
                  fontWeight: 600,
                  color: WW.text,
                  marginBottom: 8,
                }}
              >
                This week
              </div>
              <div
                style={{
                  background: WW.card,
                  borderRadius: 12,
                  padding: "10px 8px",
                  border: `0.5px solid ${WW.border}`,
                  boxShadow: WW.shadow,
                  marginBottom: 12,
                  display: "flex",
                  justifyContent: "space-between",
                }}
              >
                {THIS_WEEK.map((w, i) => (
                  <div
                    key={i}
                    style={{
                      display: "flex",
                      flexDirection: "column",
                      alignItems: "center",
                      gap: 3,
                      width: 38,
                    }}
                  >
                    <span style={{ fontSize: 10, fontWeight: 600, color: WW.textSec }}>
                      {w.day}
                    </span>
                    <DayCircle w={w} />
                    <span
                      style={{
                        fontSize: 8,
                        color: WW.textSec,
                        textAlign: "center",
                        lineHeight: 1.2,
                        maxWidth: 36,
                      }}
                    >
                      {w.label}
                    </span>
                  </div>
                ))}
              </div>

              {/* Today's session */}
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  marginBottom: 8,
                }}
              >
                <span style={{ fontSize: 14, fontWeight: 600, color: WW.text }}>
                  Today — Thursday
                </span>
                <span
                  style={{
                    background: "#E6EAFE",
                    color: WW.primary,
                    fontSize: 11,
                    fontWeight: 600,
                    padding: "3px 8px",
                    borderRadius: 20,
                  }}
                >
                  Day 4
                </span>
              </div>

              <div
                style={{
                  background: WW.card,
                  borderRadius: 14,
                  padding: "13px 14px",
                  border: `0.5px solid ${WW.border}`,
                  boxShadow: WW.shadow,
                  marginBottom: 16,
                }}
              >
                <div
                  style={{
                    fontSize: 16,
                    fontWeight: 700,
                    color: WW.text,
                    marginBottom: 5,
                  }}
                >
                  Day 4
                </div>
                <div
                  style={{
                    display: "flex",
                    gap: 10,
                    marginBottom: 10,
                    flexWrap: "wrap",
                  }}
                >
                  {[
                    { icon: "clock", t: "45 min est." },
                    { icon: "dumbbell", t: "5 exercises" },
                    { icon: "tag", t: "Chest · Shoulders" },
                  ].map((m, i) => (
                    <div
                      key={i}
                      style={{ display: "flex", alignItems: "center", gap: 4 }}
                    >
                      <Icon name={m.icon} size={11} color={WW.textSec} />
                      <span style={{ fontSize: 11, color: WW.textSec }}>{m.t}</span>
                    </div>
                  ))}
                </div>
                {TODAY_EXERCISES.map((e) => (
                  <div
                    key={e.id}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 8,
                      padding: "5px 0",
                      borderBottom: "0.5px solid #F2F2F7",
                    }}
                  >
                    <div
                      style={{
                        width: 22,
                        height: 22,
                        borderRadius: 7,
                        background: WW.elevated,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 10,
                        fontWeight: 700,
                        color: WW.textSec,
                        flexShrink: 0,
                      }}
                    >
                      {e.id}
                    </div>
                    <span style={{ flex: 1, fontSize: 13, color: WW.text }}>
                      {e.name}
                    </span>
                    {e.accessory && (
                      <span
                        style={{
                          fontSize: 9,
                          fontWeight: 500,
                          background: "#FEF3C7",
                          color: WW.amber,
                          padding: "2px 5px",
                          borderRadius: 6,
                        }}
                      >
                        Accessory
                      </span>
                    )}
                    <span style={{ fontSize: 12, color: WW.textSec, flexShrink: 0 }}>
                      {e.sets}
                    </span>
                  </div>
                ))}
              </div>

              {/* Week tabs */}
              <div
                style={{
                  display: "flex",
                  gap: 6,
                  overflowX: "auto",
                  marginBottom: 10,
                  paddingBottom: 2,
                }}
              >
                {WEEKS_DATA.map((w, i) => (
                  <button
                    key={i}
                    onClick={() => setWeekIdx(i)}
                    style={{
                      padding: "6px 14px",
                      borderRadius: 20,
                      border: `1.5px solid ${weekIdx === i ? WW.primary : WW.border}`,
                      background: weekIdx === i ? WW.chipBg : "transparent",
                      color: weekIdx === i ? WW.primary : WW.textSec,
                      fontSize: 13,
                      fontWeight: 700,
                      cursor: "pointer",
                      flexShrink: 0,
                      fontFamily: "inherit",
                    }}
                  >
                    Week {w.week}
                  </button>
                ))}
                <div
                  style={{
                    padding: "6px 11px",
                    borderRadius: 20,
                    border: `1.5px dashed ${WW.border}`,
                    color: WW.textSec,
                    fontSize: 12,
                    fontWeight: 500,
                    flexShrink: 0,
                  }}
                >
                  +6 more
                </div>
              </div>

              {/* Session rows */}
              <div
                style={{
                  background: WW.card,
                  borderRadius: 14,
                  border: `0.5px solid ${WW.border}`,
                  padding: "4px 12px",
                  boxShadow: WW.shadow,
                  marginBottom: 20,
                }}
              >
                {currentWeek.days.map((s, i) => (
                  <SessionRow key={i} s={s} />
                ))}
              </div>

              {/* Plan options */}
              <div
                style={{
                  background: WW.card,
                  borderRadius: 14,
                  border: `0.5px solid ${WW.border}`,
                  boxShadow: WW.shadow,
                  overflow: "hidden",
                  marginBottom: 8,
                }}
              >
                <button
                  onClick={() => alert("Restart plan from Day 1?")}
                  style={{
                    width: "100%",
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    padding: "13px 14px",
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                    fontFamily: "inherit",
                    borderBottom: "0.5px solid #F2F2F7",
                  }}
                >
                  <Icon name="rotate-ccw" size={15} color={WW.textSec} />
                  <span style={{ flex: 1, textAlign: "left", fontSize: 13, color: WW.text }}>
                    Restart plan from Day 1
                  </span>
                  <Icon name="chevron-right" size={15} color={WW.textSec} />
                </button>
                <button
                  onClick={() => alert("Stop tracking this plan?")}
                  style={{
                    width: "100%",
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    padding: "13px 14px",
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                >
                  <Icon name="x-circle" size={15} color="#EF4444" />
                  <span style={{ flex: 1, textAlign: "left", fontSize: 13, color: "#EF4444" }}>
                    Stop tracking this plan
                  </span>
                  <Icon name="chevron-right" size={15} color="#EF4444" />
                </button>
              </div>
            </div>

            {/* Action bar */}
            <div
              style={{
                position: "absolute",
                bottom: 84,
                left: 0,
                right: 0,
                padding: "10px 16px",
                background: WW.card,
                borderTop: `0.5px solid ${WW.border}`,
                display: "flex",
                gap: 8,
                zIndex: 20,
              }}
            >
              <a
                href="S-17-Gym-Session-Active.html"
                style={{
                  flex: 2,
                  height: 46,
                  borderRadius: 12,
                  background: WW.primary,
                  color: "#fff",
                  fontSize: 14,
                  fontWeight: 700,
                  textDecoration: "none",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  boxShadow: "0 3px 12px rgba(108,126,232,.35)",
                }}
              >
                Start Today's Session
              </a>
              <button
                onClick={() => alert("Marked as rest day.")}
                style={{
                  flex: 1,
                  height: 46,
                  borderRadius: 12,
                  border: `1.5px solid ${WW.border}`,
                  background: "transparent",
                  color: WW.textSec,
                  fontSize: 12,
                  fontWeight: 700,
                  cursor: "pointer",
                  fontFamily: "inherit",
                }}
              >
                Mark Rest
              </button>
              <button
                onClick={() => alert("Day skipped.")}
                style={{
                  flex: 1,
                  height: 46,
                  borderRadius: 12,
                  border: `1.5px solid ${WW.border}`,
                  background: "transparent",
                  color: WW.textSec,
                  fontSize: 12,
                  fontWeight: 700,
                  cursor: "pointer",
                  fontFamily: "inherit",
                }}
              >
                Skip Day
              </button>
            </div>

            <BottomNav />
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
