<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-16 Tracked Plan Schedule</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:250px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head><body>
<div class="stage">
  <div class="label">S-16 · Tracked Plan Schedule</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Missed workout</label><input type="checkbox" id="tw-missed"/></div>
  <div class="tweak-row"><label>Is Premium</label><input type="checkbox" id="tw-premium"/></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',lavenderDark:'#7B5CB8',teal:'#4BB8CC',tealBg:'#E0F4F8',amber:'#F59E0B',amberBg:'#FEF3C7',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const Ico={
  home:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a.5.5 0 01-.5.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A.5.5 0 013 21V10.5z" fill={c}/></svg>,
  plans:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c}/></svg>,
  coach:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  progress:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}

const NAV=[{id:'home',label:'Home',icon:Ico.home,href:'S-09-Home.html'},{id:'plans',label:'Plans',icon:Ico.plans,href:'S-10-Plans-Hub.html'},{id:'coach',label:'Coach',icon:Ico.coach,href:'S-25-Coach-Chat.html'},{id:'club',label:'Club',icon:Ico.club,href:'S-28-Club-Tab.html'},{id:'progress',label:'Progress',icon:Ico.progress,href:'S-32-Progress-Tab.html'}];
function BottomNav({active}){return(<div style={{position:'absolute',bottom:0,left:0,right:0,height:84,background:WW.card,borderTop:'0.5px solid #E8EAF8',display:'flex',zIndex:30}}>{NAV.map(n=>{const a=n.id===active,c=a?WW.primary:WW.textSec;return(<a key={n.id} href={n.href} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,textDecoration:'none',paddingBottom:8}}>{n.icon(c)}<span style={{fontSize:10,fontWeight:600,color:c}}>{n.label}</span></a>);})}</div>);}

// Week 1 schedule: Mon/Wed/Fri = sessions; Tue/Thu/Sat/Sun = rest
const WEEK_DAYS=[
  {day:'M',date:5,status:'completed',session:'Push A'},
  {day:'T',date:6,status:'rest'},
  {day:'W',date:7,status:'completed',session:'Pull A'},
  {day:'T',date:8,status:'rest'},
  {day:'F',date:9,status:'today',session:'Legs A'},
  {day:'S',date:10,status:'scheduled',session:'Push B'},
  {day:'S',date:11,status:'rest'},
];

const WEEKS_DATA=[
  {week:1,days:[
    {day:'Mon',session:'Push A',status:'completed',exercises:['Bench Press 4×8','Overhead Press 3×10','Tricep Pushdown 3×12','Lateral Raise 3×15']},
    {day:'Tue',session:'Rest',status:'rest',exercises:[]},
    {day:'Wed',session:'Pull A',status:'completed',exercises:['Pull-ups 4×8','Barbell Row 3×10','Face Pull 3×15','Bicep Curl 3×12']},
    {day:'Thu',session:'Rest',status:'rest',exercises:[]},
    {day:'Fri',session:'Legs A',status:'today',exercises:['Squat 4×8','Romanian Deadlift 3×10','Leg Press 3×12','Calf Raise 4×15']},
    {day:'Sat',session:'Push B',status:'scheduled',exercises:['Incline Press 4×8','Dumbbell Press 3×10','Overhead Tricep 3×12']},
    {day:'Sun',session:'Rest',status:'rest',exercises:[]},
  ]},
  {week:2,days:[
    {day:'Mon',session:'Push B',status:'scheduled',exercises:['Incline Press 4×8','Dumbbell Press 3×10','Overhead Tricep 3×12','Cable Lateral 3×15']},
    {day:'Tue',session:'Rest',status:'rest',exercises:[]},
    {day:'Wed',session:'Pull B',status:'scheduled',exercises:['Deadlift 4×5','Lat Pulldown 3×10','Seated Row 3×12','Hammer Curl 3×12']},
    {day:'Thu',session:'Rest',status:'rest',exercises:[]},
    {day:'Fri',session:'Legs B',status:'scheduled',exercises:['Front Squat 4×6','Leg Curl 3×12','Walking Lunge 3×10','Seated Calf 4×15']},
    {day:'Sat',session:'Push A',status:'scheduled',exercises:['Bench Press 4×8','Overhead Press 3×10']},
    {day:'Sun',session:'Rest',status:'rest',exercises:[]},
  ]},
];

const STATUS_DOT={
  completed:{bg:WW.teal,border:WW.teal},
  today:{bg:'transparent',border:WW.primary},
  scheduled:{bg:'transparent',border:WW.border},
  rest:{bg:'transparent',border:'transparent'},
  missed:{bg:WW.amber,border:WW.amber},
};

function WeekCalendar(){
  return(
    <div style={{background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,padding:'12px 10px',marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        {WEEK_DAYS.map((d,i)=>{
          const isToday=d.status==='today';
          const dotStyle=STATUS_DOT[d.status];
          return(
            <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{fontSize:10,fontWeight:600,color:WW.textSec}}>{d.day}</div>
              <div style={{width:32,height:32,borderRadius:10,background:isToday?WW.chipBg:'transparent',border:`1.5px solid ${isToday?WW.primary:WW.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:12,fontWeight:isToday?800:600,color:isToday?WW.primary:WW.text}}>{d.date}</span>
              </div>
              {d.session?(
                <div style={{width:6,height:6,borderRadius:3,background:dotStyle.bg,border:`1.5px solid ${dotStyle.border}`}}/>
              ):(
                <div style={{width:6,height:6}}/>
              )}
              {d.session&&<div style={{fontSize:8,color:WW.textSec,fontWeight:600,textAlign:'center',maxWidth:32,lineHeight:1.2}}>{d.session?.split(' ')[0]}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SessionRow({session}){
  const statusColor={completed:WW.teal,today:WW.primary,scheduled:WW.border,rest:WW.border,missed:WW.amber}[session.status];
  const isRest=session.status==='rest';
  return(
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:`0.5px solid ${WW.border}`}}>
      <div style={{width:3,height:36,borderRadius:2,background:statusColor,flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:isRest?WW.textSec:WW.text}}>{session.session}</div>
        {!isRest&&<div style={{fontSize:11,color:WW.textSec}}>{session.exercises.length} exercises</div>}
      </div>
      {session.status==='completed'&&(
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill={WW.tealBg}/><path d="M8 12l3 3 5-5" stroke={WW.teal} strokeWidth="2" strokeLinecap="round"/></svg>
      )}
      {session.status==='today'&&(
        <div style={{fontSize:10,fontWeight:700,color:WW.primary,background:WW.chipBg,padding:'3px 8px',borderRadius:10}}>TODAY</div>
      )}
      {session.status==='missed'&&(
        <div style={{fontSize:10,fontWeight:700,color:WW.amber,background:WW.amberBg,padding:'3px 8px',borderRadius:10}}>MISSED</div>
      )}
    </div>
  );
}

function PremiumGate(){
  return(
    <div style={{background:'#FFFBEB',borderRadius:12,border:`0.5px solid rgba(245,158,11,.3)`,padding:'11px 13px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6.2 4.5 2.4 7.2L12 16.5l-6.2 4.4 2.4-7.2L2 9.2h7.6L12 2z" fill="#F59E0B"/></svg>
        <div style={{fontSize:13,fontWeight:700,color:'#92400E'}}>Adaptive Controls · Premium</div>
      </div>
      <button style={{width:'100%',height:34,borderRadius:9,background:'#F59E0B',border:'none',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>Upgrade to Premium</button>
    </div>
  );
}

function MissedCheckIn({onDismiss}){
  const [reason,setReason]=React.useState(null);
  const reasons=['Busy','Tired','Injured','Other'];
  return(
    <div style={{background:WW.amberBg,borderRadius:14,border:`0.5px solid rgba(245,158,11,.35)`,padding:'13px',marginBottom:14,animation:'fadeUp .3s ease'}}>
      <div style={{fontSize:13,fontWeight:700,color:'#92400E',marginBottom:4}}>Missed yesterday's session</div>
      <div style={{fontSize:12,color:'#B45309',marginBottom:10}}>What happened? (optional)</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
        {reasons.map(r=>(
          <button key={r} onClick={()=>setReason(r)} style={{padding:'5px 12px',borderRadius:20,border:`1.5px solid ${reason===r?WW.amber:WW.amber}`,background:reason===r?WW.amber:'transparent',color:reason===r?'#fff':'#92400E',fontSize:12,fontWeight:600,cursor:'pointer'}}>{r}</button>
        ))}
      </div>
      <button onClick={onDismiss} style={{width:'100%',height:36,borderRadius:10,background:'#F59E0B',border:'none',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Log & Continue</button>
    </div>
  );
}

function App(){
  const [weekIdx,setWeekIdx]=React.useState(0);
  const [showMissed,setShowMissed]=React.useState(false);
  const [isPremium,setIsPremium]=React.useState(false);
  const [missedDismissed,setMissedDismissed]=React.useState(false);

  const TOTAL_DAYS=56; // 8 weeks
  const COMPLETED_DAYS=13;
  const progress=Math.round((COMPLETED_DAYS/TOTAL_DAYS)*100);

  React.useEffect(()=>{
    ['tw-missed','tw-premium'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el)return;
      if(id==='tw-missed'){el.addEventListener('change',e=>{setShowMissed(e.target.checked);setMissedDismissed(false);});}
      if(id==='tw-premium'){el.addEventListener('change',e=>setIsPremium(e.target.checked));}
    });
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  const currentWeek=WEEKS_DATA[weekIdx];
  const todaySession=currentWeek.days.find(d=>d.status==='today');

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'4px 16px 10px',flexShrink:0}}>
        <a href="S-15-My-Plans-Library.html" style={{width:38,height:38,borderRadius:19,background:'rgba(61,61,92,.07)',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke={WW.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </a>
        <div style={{flex:1,overflow:'hidden'}}>
          <div style={{fontSize:16,fontWeight:800,color:WW.primaryDark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Beginner Push-Pull-Legs</div>
        </div>
      </div>
      {/* Premium version banner */}
      <a href="S-16b-Tracked-Plan-Premium.html" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,height:34,background:'#FFFBEB',borderTop:'0.5px solid #FDE68A',borderBottom:'0.5px solid #FDE68A',textDecoration:'none',flexShrink:0}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="#F59E0B" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <span style={{fontSize:12,fontWeight:600,color:'#92400E'}}>See the Premium version of this screen →</span>
      </a>

      <div style={{flex:1,overflowY:'auto',padding:'0 16px',paddingBottom:148}}>
        {/* Progress bar */}
        <div style={{background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <div style={{fontSize:13,fontWeight:700,color:WW.text}}>Day {COMPLETED_DAYS} of {TOTAL_DAYS}</div>
            <div style={{fontSize:13,fontWeight:700,color:WW.primary}}>{progress}%</div>
          </div>
          <div style={{height:8,borderRadius:4,background:WW.elevated,overflow:'hidden',marginBottom:6}}>
            <div style={{height:'100%',width:`${progress}%`,background:`linear-gradient(90deg, ${WW.primary}, ${WW.lavender})`,borderRadius:4,transition:'width .5s ease'}}/>
          </div>
          <div style={{display:'flex',gap:14}}>
            <div style={{fontSize:11,color:WW.textSec}}><span style={{fontWeight:700,color:WW.teal}}>9</span> completed</div>
            <div style={{fontSize:11,color:WW.textSec}}><span style={{fontWeight:700,color:WW.amber}}>1</span> missed</div>
            <div style={{fontSize:11,color:WW.textSec}}><span style={{fontWeight:700,color:WW.textSec}}>46</span> remaining</div>
          </div>
        </div>

        {/* Missed check-in */}
        {showMissed&&!missedDismissed&&<MissedCheckIn onDismiss={()=>setMissedDismissed(true)}/>}

        {/* Week calendar */}
        <WeekCalendar/>

        {/* Adaptive Controls */}
        {!isPremium?<PremiumGate/>:(
          <div style={{background:WW.lavenderBg,borderRadius:12,border:`0.5px solid rgba(155,132,232,.3)`,padding:'11px 13px',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6.2 4.5 2.4 7.2L12 16.5l-6.2 4.4 2.4-7.2L2 9.2h7.6L12 2z" fill={WW.lavender}/></svg>
              <div style={{fontSize:13,fontWeight:700,color:WW.lavenderDark}}>Adaptive Controls</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button style={{flex:1,padding:'7px 4px',borderRadius:9,border:`1.5px solid ${WW.lavender}`,background:'transparent',color:WW.lavenderDark,fontSize:11,fontWeight:700,cursor:'pointer'}}>Swap Exercise</button>
              <button style={{flex:1,padding:'7px 4px',borderRadius:9,border:`1.5px solid ${WW.lavender}`,background:'transparent',color:WW.lavenderDark,fontSize:11,fontWeight:700,cursor:'pointer'}}>Add Rest Day</button>
              <button style={{flex:1,padding:'7px 4px',borderRadius:9,border:`1.5px solid ${WW.lavender}`,background:'transparent',color:WW.lavenderDark,fontSize:11,fontWeight:700,cursor:'pointer'}}>Reschedule</button>
            </div>
          </div>
        )}

        {/* Week tabs */}
        <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:10,paddingBottom:2}}>
          {WEEKS_DATA.map((w,i)=>(
            <button key={i} onClick={()=>setWeekIdx(i)} style={{padding:'6px 16px',borderRadius:20,border:`1.5px solid ${weekIdx===i?WW.primary:WW.border}`,background:weekIdx===i?WW.chipBg:'transparent',color:weekIdx===i?WW.primary:WW.textSec,fontSize:13,fontWeight:700,cursor:'pointer',flexShrink:0}}>Week {w.week}</button>
          ))}
          <div style={{padding:'6px 12px',borderRadius:20,border:`1.5px dashed ${WW.border}`,color:WW.textSec,fontSize:12,fontWeight:500,flexShrink:0}}>+6 more</div>
        </div>

        {/* Session list */}
        <div style={{background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,padding:'4px 12px'}}>
          {currentWeek.days.map((s,i)=><SessionRow key={i} session={s}/>)}
        </div>
      </div>

      {/* Action bar */}
      <div style={{position:'absolute',bottom:84,left:0,right:0,padding:'10px 16px',background:WW.card,borderTop:`0.5px solid ${WW.border}`,display:'flex',gap:8,zIndex:20}}>
        <a href="S-17-Gym-Session-Active.html" style={{flex:2,height:46,borderRadius:12,background:WW.primary,color:'#fff',fontSize:14,fontWeight:700,textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 3px 12px rgba(108,126,232,.35)'}}>Start Today's Session</a>
        <button style={{flex:1,height:46,borderRadius:12,border:`1.5px solid ${WW.border}`,background:'transparent',color:WW.textSec,fontSize:12,fontWeight:700,cursor:'pointer'}}>Mark Rest</button>
        <button style={{flex:1,height:46,borderRadius:12,border:`1.5px solid ${WW.border}`,background:'transparent',color:WW.textSec,fontSize:12,fontWeight:700,cursor:'pointer'}}>Skip Day</button>
      </div>

      <BottomNav active="plans"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
