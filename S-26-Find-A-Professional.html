<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-26 Find a Professional</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:240px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
</style>
</head><body>
<div class="stage">
  <div class="label">S-26 · Find a Professional</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Empty state</label><input type="checkbox" id="tw-empty"/></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',lavenderDark:'#7B5CB8',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const Ico={
  home:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a.5.5 0 01-.5.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A.5.5 0 013 21V10.5z" fill={c}/></svg>,
  plans:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c}/></svg>,
  coach:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  progress:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

const NAV=[
  {id:'home',label:'Home',icon:Ico.home,href:'S-09-Home.html'},
  {id:'plans',label:'Plans',icon:Ico.plans,href:'S-10-Plans-Hub.html'},
  {id:'coach',label:'Coach',icon:Ico.coach,href:'S-25-Coach-Chat.html'},
  {id:'club',label:'Club',icon:Ico.club,href:'S-28-Club-Tab.html'},
  {id:'progress',label:'Progress',icon:Ico.progress,href:'S-32-Progress-Tab.html'},
];

function BottomNav({active}){
  return(
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:84,background:WW.card,borderTop:'0.5px solid #E8EAF8',display:'flex',zIndex:30}}>
      {NAV.map(n=>{const a=n.id===active,c=a?WW.primary:WW.textSec;return(
        <a key={n.id} href={n.href} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,textDecoration:'none',paddingBottom:8}}>
          {n.icon(c)}<span style={{fontSize:10,fontWeight:600,color:c}}>{n.label}</span>
        </a>
      );})}
    </div>
  );
}

function StatusBar(){
  return(
    <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}>
      <div style={{paddingTop:10}}>9:41</div>
      <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
      </div>
    </div>
  );
}

const FILTER_TYPES=['All','Personal Trainer','Running Coach','Physiotherapist','Nutritionist','Dietitian'];

const PROFESSIONALS=[
  {
    id:1,initials:'SL',color:'#6C7EE8',name:'Sarah Lim',type:'Personal Trainer',
    bio:'Specialises in strength training and body recomposition for beginners and intermediate athletes. 8 years of experience.',
    certs:['NASM-CPT','CrossFit L2'],area:'Central & East Singapore',email:'sarah.lim@wiseworkout.com',
  },
  {
    id:2,initials:'JT',color:'#4BB8CC',name:'James Tan',type:'Running Coach',
    bio:'Former competitive runner with 12 years of coaching experience. Helped 200+ athletes complete their first marathon.',
    certs:['Athletics Singapore Coach','UESCA Running Coach'],area:'Islandwide (online available)',email:'james.tan@wiseworkout.com',
  },
  {
    id:3,initials:'PN',color:'#9B84E8',name:'Priya Nair',type:'Physiotherapist',
    bio:'Registered physiotherapist focusing on sports rehabilitation and injury prevention. Works with athletes of all levels.',
    certs:['Allied Health Professions Council','Sports Physio Cert'],area:'West Singapore · Jurong',email:'priya.nair@wiseworkout.com',
  },
  {
    id:4,initials:'MK',color:'#F59E0B',name:'Marcus Koh',type:'Nutritionist',
    bio:'Registered nutritionist with a focus on performance nutrition and body composition. Offers personalised meal planning.',
    certs:['Singapore Nutrition & Dietetics Assoc','Precision Nutrition L2'],area:'North Singapore · Woodlands',email:'marcus.koh@wiseworkout.com',
  },
];

function ProfileCard({pro}){
  return(
    <a href="S-27-Professional-Profile.html" style={{textDecoration:'none',display:'block',background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,padding:'14px',marginBottom:12}}>
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        {/* Avatar */}
        <div style={{width:52,height:52,borderRadius:26,background:pro.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontSize:17,fontWeight:800,color:'#fff'}}>{pro.initials}</span>
        </div>
        {/* Info */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
            <div style={{fontSize:15,fontWeight:800,color:WW.primaryDark}}>{pro.name}</div>
            {/* Verified badge */}
            <div style={{display:'flex',alignItems:'center',gap:3,background:'#D1FAE5',borderRadius:6,padding:'1px 6px'}}>
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="#059669" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <span style={{fontSize:9,fontWeight:700,color:'#059669'}}>Verified</span>
            </div>
          </div>
          <div style={{fontSize:12,fontWeight:600,color:pro.color,marginBottom:5}}>{pro.type}</div>
          <div style={{fontSize:12,color:WW.textSec,lineHeight:1.45,marginBottom:8,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{pro.bio}</div>
          {/* Cert pills */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
            {pro.certs.map(c=>(
              <div key={c} style={{padding:'2px 8px',borderRadius:6,background:WW.elevated,border:`0.5px solid ${WW.border}`,fontSize:10,fontWeight:600,color:WW.textSec}}>{c}</div>
            ))}
          </div>
          {/* Service area */}
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:10}}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke={WW.textSec} strokeWidth="1.5"/><circle cx="12" cy="9" r="2.5" stroke={WW.textSec} strokeWidth="1.5"/></svg>
            <span style={{fontSize:11,color:WW.textSec,fontWeight:500}}>{pro.area}</span>
          </div>
          {/* Contact button */}
          <button onClick={e=>{e.preventDefault();window.location.href=`mailto:${pro.email}?subject=WiseWorkout%20Enquiry`;}} style={{width:'100%',height:36,borderRadius:10,border:`1.5px solid ${WW.primary}`,background:'transparent',color:WW.primary,fontSize:13,fontWeight:700,cursor:'pointer'}}>Contact</button>
        </div>
      </div>
    </a>
  );
}

function App(){
  const [filter,setFilter]=React.useState('All');
  const [isEmpty,setIsEmpty]=React.useState(false);

  React.useEffect(()=>{
    const el=document.getElementById('tw-empty');
    if(el)el.addEventListener('change',e=>setIsEmpty(e.target.checked));
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  const filtered=isEmpty?[]:PROFESSIONALS.filter(p=>filter==='All'||p.type===filter);

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>

      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'4px 16px 12px',flexShrink:0}}>
        <a href="S-25-Coach-Chat.html" style={{width:38,height:38,borderRadius:19,background:'rgba(61,61,92,.07)',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke={WW.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </a>
        <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,flex:1}}>Find a Professional</div>
      </div>

      {/* Filter chips */}
      <div style={{padding:'0 16px 10px',overflowX:'auto',flexShrink:0}}>
        <div style={{display:'flex',gap:7,width:'max-content'}}>
          {FILTER_TYPES.map(f=>{
            const sel=filter===f;
            return(
              <button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 14px',borderRadius:20,border:`1.5px solid ${sel?WW.primary:WW.border}`,background:sel?WW.chipBg:WW.card,color:sel?WW.primary:WW.textSec,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
                {f}
              </button>
            );
          })}
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:'auto',padding:'4px 16px',paddingBottom:100}}>
        {filtered.length===0?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingTop:60,gap:12,textAlign:'center'}}>
            <div style={{width:64,height:64,borderRadius:32,background:WW.elevated,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke={WW.textSec} strokeWidth="1.5"/><path d="M3 21c0-3.9 2.7-7 6-7" stroke={WW.textSec} strokeWidth="1.5" strokeLinecap="round"/><path d="M16 11v6m-3-3h6" stroke={WW.textSec} strokeWidth="1.8" strokeLinecap="round"/></svg>
            </div>
            <div style={{fontSize:15,fontWeight:700,color:WW.text}}>No verified professionals available</div>
            <div style={{fontSize:13,color:WW.textSec,lineHeight:1.5,maxWidth:260}}>Check back soon. Profiles are reviewed by our admin team before becoming visible.</div>
          </div>
        ):(
          filtered.map(p=><ProfileCard key={p.id} pro={p}/>)
        )}
      </div>

      <BottomNav active="coach"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
