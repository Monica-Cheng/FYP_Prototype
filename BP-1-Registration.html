<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-37 BP Registration</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
</style>
</head><body>
<div class="stage">
  <div class="label">S-37 · BP Registration</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}

const PROF_TYPES=['Personal Trainer','Running Coach','Physiotherapist','Nutritionist','Dietitian'];

function Field({label,optional,error,children}){
  return(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:error?'#EF4444':WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>
        {label}{optional&&<span style={{fontSize:10,fontWeight:400,textTransform:'none',marginLeft:4}}>(optional)</span>}
        {!optional&&<span style={{color:'#EF4444',marginLeft:2}}>*</span>}
      </div>
      {children}
      {error&&<div style={{fontSize:11,color:'#EF4444',marginTop:4}}>{error}</div>}
    </div>
  );
}
function Inp({value,onChange,placeholder,type='text',error,maxLength,style={}}){
  return(
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} maxLength={maxLength}
      style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${error?'#EF4444':WW.border}`,padding:'0 14px',fontSize:14,fontWeight:500,color:WW.text,outline:'none',boxSizing:'border-box',fontFamily:'inherit',background:WW.card,...style}}/>
  );
}

function CertEntry({cert,idx,onChange,onRemove,attempted}){
  const err=(f)=>attempted&&!cert[f]?'Required':null;
  return(
    <div style={{background:WW.elevated,borderRadius:14,padding:'14px',marginBottom:12,position:'relative'}}>
      <div style={{fontSize:12,fontWeight:800,color:WW.primaryDark,marginBottom:10}}>Certification {idx+1}</div>
      <Field label="Certification name" error={err('name')}>
        <Inp value={cert.name} onChange={e=>onChange('name',e.target.value)} placeholder="e.g. NASM Certified PT" error={err('name')}/>
      </Field>
      <Field label="Issuing body" error={err('issuer')}>
        <Inp value={cert.issuer} onChange={e=>onChange('issuer',e.target.value)} placeholder="e.g. NASM" error={err('issuer')}/>
      </Field>
      <Field label="Expiry date" error={err('expiry')}>
        <input type="date" value={cert.expiry} onChange={e=>onChange('expiry',e.target.value)}
          style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${(attempted&&!cert.expiry)?'#EF4444':WW.border}`,padding:'0 14px',fontSize:14,color:WW.text,outline:'none',boxSizing:'border-box',background:WW.card}}/>
      </Field>
      <Field label="Document">
        <label style={{display:'flex',alignItems:'center',gap:10,height:44,borderRadius:12,border:`1.5px dashed ${WW.border}`,padding:'0 14px',cursor:'pointer',background:WW.card}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke={WW.primary} strokeWidth="1.7"/><polyline points="14 2 14 8 20 8" stroke={WW.primary} strokeWidth="1.7"/><line x1="12" y1="18" x2="12" y2="12" stroke={WW.primary} strokeWidth="1.7"/><polyline points="9 15 12 12 15 15" stroke={WW.primary} strokeWidth="1.7"/></svg>
          <span style={{fontSize:13,color:cert.file?WW.text:WW.textSec,fontWeight:cert.file?700:400}}>
            {cert.file||'Upload document (PDF/JPG)'}
          </span>
          <input type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:'none'}} onChange={e=>{if(e.target.files[0])onChange('file',e.target.files[0].name);}}/>
        </label>
      </Field>
      {idx>0&&(
        <button onClick={onRemove} style={{fontSize:12,fontWeight:700,color:'#EF4444',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>Remove certification</button>
      )}
    </div>
  );
}

function App(){
  const [legalName,setLegalName]=React.useState('');
  const [profType,setProfType]=React.useState('');
  const [bizName,setBizName]=React.useState('');
  const [email,setEmail]=React.useState('');
  const [phone,setPhone]=React.useState('');
  const [area,setArea]=React.useState('');
  const [desc,setDesc]=React.useState('');
  const [certs,setCerts]=React.useState([{name:'',issuer:'',expiry:'',file:''}]);
  const [attempted,setAttempted]=React.useState(false);
  const [submitted,setSubmitted]=React.useState(false);

  const err=(v)=>attempted&&!v.trim()?'This field is required':null;
  const typeErr=attempted&&!profType?'Please select a professional type':null;

  const addCert=()=>setCerts(p=>[...p,{name:'',issuer:'',expiry:'',file:''}]);
  const removeCert=(i)=>setCerts(p=>p.filter((_,idx)=>idx!==i));
  const updateCert=(i,f,v)=>setCerts(p=>p.map((c,idx)=>idx===i?{...c,[f]:v}:c));

  const handleSubmit=()=>{
    setAttempted(true);
    const baseOk=legalName&&profType&&email&&phone&&area&&desc;
    const certsOk=certs.every(c=>c.name&&c.issuer&&c.expiry);
    if(baseOk&&certsOk){setSubmitted(true);}
  };

  if(submitted){
    return(
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,position:'relative'}}>
        <StatusBar/>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',textAlign:'center'}}>
          <div style={{width:72,height:72,borderRadius:36,background:'#D1FAE5',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16,fontSize:32}}>✅</div>
          <div style={{fontSize:20,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Application submitted!</div>
          <div style={{fontSize:14,color:WW.textSec,lineHeight:1.6,marginBottom:28}}>We'll review your application and notify you by email within 3–5 business days.</div>
          <a href="S-38-BP-Status.html" style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:52,borderRadius:14,background:WW.primary,color:'#fff',fontSize:15,fontWeight:700,textDecoration:'none',boxShadow:'0 4px 14px rgba(108,126,232,.3)'}}>View Application Status</a>
        </div>
      </div>
    );
  }

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,position:'relative'}}>
      <StatusBar/>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',padding:'10px 18px 14px',background:WW.card,borderBottom:'0.5px solid #E8EAF8',gap:12,flexShrink:0}}>
        <a href="S-02-Login.html" style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,borderRadius:10,background:WW.elevated,textDecoration:'none',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={WW.primaryDark} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </a>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:800,color:WW.primaryDark}}>Register as a Professional</div>
          <div style={{fontSize:11,color:WW.textSec,marginTop:1}}>Join WiseWorkout as a verified expert</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px 18px 32px'}}>

        {/* Section 1 — Personal & business info */}
        <div style={{fontSize:13,fontWeight:800,color:WW.primaryDark,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:22,height:22,borderRadius:11,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:12,fontWeight:800,color:'#fff'}}>1</span>
          </div>
          Personal & Business Info
        </div>

        <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'14px 16px',marginBottom:18,boxShadow:WW.shadow}}>
          <Field label="Legal name" error={err(legalName)}>
            <Inp value={legalName} onChange={e=>setLegalName(e.target.value)} placeholder="Full legal name" error={err(legalName)}/>
          </Field>

          <Field label="Professional type" error={typeErr}>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {PROF_TYPES.map(t=>{
                const sel=profType===t;
                return(
                  <button key={t} onClick={()=>setProfType(t)}
                    style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:12,border:`1.5px solid ${sel?WW.primary:(typeErr?'#EF4444':WW.border)}`,background:sel?WW.chipBg:WW.card,cursor:'pointer',textAlign:'left'}}>
                    <div style={{width:18,height:18,borderRadius:9,border:`2px solid ${sel?WW.primary:WW.border}`,background:sel?WW.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {sel&&<div style={{width:7,height:7,borderRadius:4,background:'#fff'}}/>}
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:sel?WW.primary:WW.text}}>{t}</span>
                  </button>
                );
              })}
            </div>
            {typeErr&&<div style={{fontSize:11,color:'#EF4444',marginTop:4}}>{typeErr}</div>}
          </Field>

          <Field label="Business name" optional>
            <Inp value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="Practice or studio name"/>
          </Field>

          <Field label="Contact email" error={err(email)}>
            <Inp value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="professional@example.com" error={err(email)}/>
          </Field>

          <Field label="Phone number" error={err(phone)}>
            <Inp value={phone} onChange={e=>setPhone(e.target.value)} type="tel" placeholder="+65 9000 0000" error={err(phone)}/>
          </Field>

          <Field label="Service area" error={err(area)}>
            <Inp value={area} onChange={e=>setArea(e.target.value)} placeholder="e.g. Singapore — Novena, Orchard" error={err(area)}/>
          </Field>

          <Field label="Services description" error={err(desc)}>
            <div style={{position:'relative'}}>
              <textarea value={desc} onChange={e=>setDesc(e.target.value.slice(0,300))} placeholder="Describe your services, specialisations, and approach..."
                style={{width:'100%',height:90,borderRadius:12,border:`1.5px solid ${(attempted&&!desc)?'#EF4444':WW.border}`,padding:'10px 14px',fontSize:13,color:WW.text,outline:'none',resize:'none',boxSizing:'border-box',fontFamily:'inherit',background:WW.card}}/>
              <div style={{position:'absolute',bottom:8,right:12,fontSize:10,color:desc.length>270?'#EF4444':WW.textSec}}>{desc.length}/300</div>
            </div>
            {attempted&&!desc&&<div style={{fontSize:11,color:'#EF4444',marginTop:4}}>This field is required</div>}
          </Field>
        </div>

        {/* Section 2 — Certifications */}
        <div style={{fontSize:13,fontWeight:800,color:WW.primaryDark,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:22,height:22,borderRadius:11,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:12,fontWeight:800,color:'#fff'}}>2</span>
          </div>
          Upload Certifications (required)
        </div>

        {attempted&&certs.some(c=>!c.name||!c.issuer||!c.expiry)&&(
          <div style={{background:'#FEE2E2',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:12,color:'#DC2626',fontWeight:600}}>
            ⚠️ Please complete all certification fields. Minimum 1 required.
          </div>
        )}

        {certs.map((cert,i)=>(
          <CertEntry key={i} cert={cert} idx={i} onChange={(f,v)=>updateCert(i,f,v)} onRemove={()=>removeCert(i)} attempted={attempted}/>
        ))}

        <button onClick={addCert} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 0',background:'none',border:'none',cursor:'pointer',color:WW.primary,fontSize:13,fontWeight:700,marginBottom:20}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke={WW.primary} strokeWidth="1.8"/><path d="M12 8v8M8 12h8" stroke={WW.primary} strokeWidth="1.8" strokeLinecap="round"/></svg>
          Add Another Certification
        </button>

        {/* Submit */}
        <button onClick={handleSubmit} style={{width:'100%',height:52,borderRadius:14,background:WW.primary,color:'#fff',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 14px rgba(108,126,232,.3)'}}>
          Submit Application
        </button>
        <div style={{fontSize:11,color:WW.textSec,textAlign:'center',marginTop:10,lineHeight:1.5}}>
          By submitting you agree to our Professional Terms and Verification Policy.
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
