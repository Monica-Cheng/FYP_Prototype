<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-30 Profile</title>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #EDEEF5; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .label { font-size: 12px; color: #6B6B80; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .phone-shell { width: 390px; height: 844px; border-radius: 52px; background: #0A0A12; padding: 5px; box-shadow: 0 30px 70px rgba(20,25,60,0.20), 0 0 0 1px rgba(0,0,0,0.12); position: relative; box-sizing: content-box; }
  .phone-inner { width: 390px; height: 844px; border-radius: 47px; overflow: hidden; background: #F7F8FF; position: relative; }
  .island { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 118px; height: 33px; border-radius: 20px; background: #000; z-index: 60; pointer-events: none; }
  .tweaks-panel { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #fff; border-radius: 14px; padding: 14px 16px 16px; box-shadow: 0 10px 40px rgba(20,25,60,0.18), 0 0 0 0.5px rgba(0,0,0,0.08); color: #3D3D5C; display: none; z-index: 100; }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; color: #8A8A9E; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; gap: 10px; }
  .tweak-row label { font-size: 13px; color: #3D3D5C; flex: 1; }
  .tweak-row input[type="range"] { flex: 1.1; accent-color: #6C7EE8; }
  .tweak-row input[type="text"] { flex: 1.2; min-width: 0; font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid #C8C8D8; color: #3D3D5C; background: #F7F8FF; font-family: inherit; }
  .tweak-val { font-size: 11px; color: #8A8A9E; min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }
  @keyframes xpFill { from { width: 0; } }
  .xp-fill { animation: xpFill 1.2s cubic-bezier(.2,.8,.2,1) both; }
</style>
</head>
<body>
  <div class="stage">
    <div class="label">S-30 · Profile</div>
    <div class="phone-shell" data-screen-label="S-30 Profile">
      <div class="island"></div>
      <div class="phone-inner" id="app"></div>
    </div>
  </div>

  <div class="tweaks-panel" id="tweaks">
    <h3>Tweaks</h3>
    <div class="tweak-row">
      <label>Display name</label>
      <input type="text" id="tw-name">
    </div>
    <div class="tweak-row">
      <label>Level</label>
      <input type="range" id="tw-lvl" min="1" max="30" step="1">
      <span class="tweak-val" id="tw-lvl-v">7</span>
    </div>
    <div class="tweak-row">
      <label>XP %</label>
      <input type="range" id="tw-xp" min="0" max="100" step="1">
      <span class="tweak-val" id="tw-xp-v">81%</span>
    </div>
    <div class="tweak-row">
      <label>Leaderboard rank</label>
      <input type="range" id="tw-rank" min="1" max="12" step="1">
      <span class="tweak-val" id="tw-rank-v">2</span>
    </div>
  </div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const WW = {
  bg: '#F7F8FF', card: '#FFFFFF', elevated: '#EEF0FB',
  primary: '#6C7EE8', primaryDark: '#2D3A8C', primaryFaint: '#E6EAFE',
  lavender: '#9B84E8', lavenderBg: '#F0EEFE', lavenderDark: '#7B5CB8',
  teal: '#4BB8CC', tealBg: '#E0F4F8', tealDark: '#2E8B9E',
  amber: '#E8A13B', amberBg: '#FFF3DE',
  text: '#3D3D5C', textSec: '#8A8A9E', textTert: '#B5B5C8',
  border: '#E2E3ED', borderSoft: '#EEEFF5',
  shadow: '0 2px 8px rgba(45,58,140,0.06)',
};

const Ico = {
  chev:(c)=>(<svg width="7" height="12" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke={c||WW.textSec} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>),
  flame:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 3s5 4 5 9a5 5 0 01-10 0c0-2 1-3 2-4-.5 1.5.5 3 2 3-.5-3 1-5 1-8z" fill={c}/></svg>),
  dumbbell:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24"><rect x="2" y="9" width="3" height="6" rx="1" fill={c}/><rect x="19" y="9" width="3" height="6" rx="1" fill={c}/><rect x="5" y="10.5" width="2" height="3" rx="0.5" fill={c}/><rect x="17" y="10.5" width="2" height="3" rx="0.5" fill={c}/><rect x="7" y="11" width="10" height="2" rx="0.6" fill={c}/></svg>),
  run:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="17" cy="5" r="2" fill={c}/><path d="M13 8l-2 4 3 2-1 5M10 12l-3-1-2 3M14 14l3 2 2-2" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  lock:(c)=>(<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" fill={c}/><path d="M8 11V8a4 4 0 018 0v3" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/></svg>),
  trophy:(c)=>(<svg width="20" height="20" viewBox="0 0 24 24" fill={c}><path d="M8 4h8v5a4 4 0 01-8 0V4z"/><rect x="10" y="13" width="4" height="3"/><rect x="8" y="17" width="8" height="2" rx="0.8"/></svg>),
  sparkle:(c)=>(<svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill={c}/></svg>),
  watch:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="3" stroke={c} strokeWidth="1.7"/><path d="M9 6V4h6v2M9 18v2h6v-2" stroke={c} strokeWidth="1.7" strokeLinecap="round"/><circle cx="12" cy="12" r="2.2" fill={c}/></svg>),
  bell:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 8a6 6 0 0112 0c0 7 3 8 3 8H3s3-1 3-8z" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>),
  heart:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 5.5-7 10-7 10z" stroke={c} strokeWidth="1.7" strokeLinejoin="round"/></svg>),
  person:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.3" stroke={c} strokeWidth="1.7"/><path d="M5 20c0-3.5 3.2-6 7-6s7 2.5 7 6" stroke={c} strokeWidth="1.7" strokeLinecap="round"/></svg>),
  shield:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6l8-3z" stroke={c} strokeWidth="1.7" strokeLinejoin="round"/></svg>),
  logout:(c)=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 4H5v16h5M14 8l4 4-4 4M18 12H9" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>),
};

function StatusBar() {
  return (
    <div style={{ height:47, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 28px', fontSize:15, fontWeight:600, color:WW.text, position:'relative', zIndex:5 }}>
      <div style={{ paddingTop:10 }}>9:41</div>
      <div style={{ display:'flex', gap:6, alignItems:'center', paddingTop:10 }}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx="0.6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx="0.6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill={WW.text} opacity="0.4"/></svg>
      </div>
    </div>
  );
}

function Header({ name, level, xpPct }) {
  const initial = (name.trim()[0] || 'M').toUpperCase();
  const xpCurrent = Math.round(4000 * (xpPct / 100));
  return (
    <div style={{ padding:'14px 20px 18px', textAlign:'center' }}>
      {/* avatar */}
      <div style={{ display:'inline-flex', width:90, height:90, borderRadius:45, background:`linear-gradient(135deg, ${WW.primary} 0%, ${WW.lavender} 100%)`, alignItems:'center', justifyContent:'center', color:'#fff', fontSize:36, fontWeight:700, letterSpacing:'-0.5px', boxShadow:'0 10px 28px rgba(108,126,232,0.32), inset 0 1px 0 rgba(255,255,255,0.25)', border:'3px solid #fff' }}>
        {initial}
      </div>
      <div style={{ fontSize:22, fontWeight:700, color:WW.text, letterSpacing:'-0.4px', marginTop:12 }}>{name}</div>
      <div style={{ fontSize:13, fontWeight:500, color:WW.textSec, marginTop:2, letterSpacing:'0.1px' }}>Level {level} — Iron Athlete</div>

      {/* xp bar */}
      <div style={{ marginTop:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, padding:'0 2px' }}>
          <div style={{ fontSize:11, fontWeight:700, color:WW.primaryDark, letterSpacing:'0.3px', textTransform:'uppercase' }}>Level {level}</div>
          <div style={{ fontSize:11, fontWeight:600, color:WW.textSec, fontVariantNumeric:'tabular-nums' }}>{xpCurrent.toLocaleString()} / 4,000 XP</div>
        </div>
        <div style={{ height:10, borderRadius:5, background:WW.primaryFaint, overflow:'hidden', position:'relative' }}>
          <div className="xp-fill" style={{ height:'100%', width:`${xpPct}%`, borderRadius:5, background:`linear-gradient(90deg, ${WW.primary} 0%, ${WW.lavender} 100%)`, boxShadow:'0 0 8px rgba(108,126,232,0.4)' }}/>
        </div>
      </div>
    </div>
  );
}

function StatCards() {
  const cards = [
    { ic:Ico.dumbbell, v:'47',     l:'Sessions' },
    { ic:Ico.run,      v:'38.2',   l:'Kilometres', unit:'km' },
    { ic:Ico.flame,    v:'7',      l:'Day streak' },
  ];
  return (
    <div style={{ padding:'0 16px 16px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
      {cards.map(c => (
        <div key={c.l} style={{ background:WW.elevated, borderRadius:16, padding:'13px 10px 12px', textAlign:'left' }}>
          <div style={{ width:30, height:30, borderRadius:10, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:8 }}>
            {c.ic(c.l === 'Day streak' ? WW.teal : WW.primary)}
          </div>
          <div style={{ display:'flex', alignItems:'baseline', gap:3 }}>
            <div style={{ fontSize:20, fontWeight:700, color:WW.text, letterSpacing:'-0.5px', fontVariantNumeric:'tabular-nums', lineHeight:1 }}>{c.v}</div>
            {c.unit && <div style={{ fontSize:11, fontWeight:600, color:WW.textSec }}>{c.unit}</div>}
          </div>
          <div style={{ fontSize:11, color:WW.textSec, fontWeight:500, marginTop:4, letterSpacing:'0.1px' }}>{c.l}</div>
        </div>
      ))}
    </div>
  );
}

function Badge({ name, color, bg, ic, locked }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minWidth:64, gap:6, opacity: locked ? 0.55 : 1 }}>
      <div style={{ width:60, height:60, borderRadius:30, background: locked ? WW.elevated : bg, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', boxShadow: locked ? 'none' : `0 6px 14px ${bg}88`, border: locked ? `1.5px dashed ${WW.border}` : 'none' }}>
        {locked ? Ico.lock(WW.textTert) : ic(color)}
      </div>
      <div style={{ fontSize:11, fontWeight:600, color: locked ? WW.textTert : WW.text, textAlign:'center', letterSpacing:'-0.05px', lineHeight:1.15, maxWidth:72 }}>{name}</div>
    </div>
  );
}

function BadgesStrip() {
  const badges = [
    { name:'First Workout', color:'#fff', bg:WW.teal, ic:(c)=>Ico.dumbbell(c) },
    { name:'7-Day Streak',  color:'#fff', bg:WW.teal, ic:(c)=>Ico.flame(c) },
    { name:'Personal Best', color:'#fff', bg:WW.primary, ic:(c)=>Ico.trophy(c) },
    { name:'Squad Win',     color:'#fff', bg:WW.amber, ic:(c)=>Ico.sparkle(c) },
    { name:'Marathon', locked:true },
    { name:'50 Sessions', locked:true },
  ];
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ padding:'0 20px 10px', display:'flex', alignItems:'baseline', justifyContent:'space-between' }}>
        <div style={{ fontSize:15, fontWeight:700, color:WW.text, letterSpacing:'-0.2px' }}>Badges</div>
        <button style={{ background:'none', border:'none', padding:0, cursor:'pointer', fontFamily:'inherit', fontSize:12, fontWeight:600, color:WW.primary }}>View all</button>
      </div>
      <div style={{ display:'flex', gap:14, padding:'4px 20px 6px', overflowX:'auto' }}>
        {badges.map(b => <Badge key={b.name} {...b}/>)}
      </div>
    </div>
  );
}

function Leaderboard({ rank }) {
  const suffix = (n) => { const s = ['th','st','nd','rd']; const v = n % 100; return s[(v-20)%10] || s[v] || s[0]; };
  return (
    <div style={{ margin:'0 16px 18px', background:WW.card, borderRadius:16, boxShadow:WW.shadow, padding:'14px 14px 14px 12px', display:'flex', gap:12, alignItems:'center', border:`0.5px solid ${WW.borderSoft}` }}>
      {/* mini podium */}
      <div style={{ display:'flex', alignItems:'flex-end', gap:3, flexShrink:0 }}>
        <div style={{ width:10, height:18, background:'#CBAE7A', borderRadius:'2px 2px 0 0' }}/>
        <div style={{ width:10, height:26, background:WW.primary, borderRadius:'2px 2px 0 0', position:'relative' }}>
          <div style={{ position:'absolute', top:-12, left:'50%', transform:'translateX(-50%)', fontSize:9, fontWeight:700, color:WW.primaryDark, fontVariantNumeric:'tabular-nums' }}>{rank}</div>
        </div>
        <div style={{ width:10, height:14, background:'#B49E7A', borderRadius:'2px 2px 0 0' }}/>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:11, fontWeight:700, color:WW.textSec, letterSpacing:'0.4px', textTransform:'uppercase', marginBottom:2 }}>Friends leaderboard</div>
        <div style={{ fontSize:13.5, color:WW.text, fontWeight:600, letterSpacing:'-0.1px' }}>
          You are ranked <span style={{ color:WW.primary }}>{rank}{suffix(rank)}</span> this week
        </div>
      </div>
      <button style={{ background:'none', border:'none', padding:0, cursor:'pointer', fontFamily:'inherit', fontSize:11.5, fontWeight:600, color:WW.primary, whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:3 }}>
        View {Ico.chev(WW.primary)}
      </button>
    </div>
  );
}

function SettingsList() {
  const rows = [
    { ic:Ico.watch,  l:'Wearable connections', sub:'Apple Watch · Garmin' },
    { ic:Ico.bell,   l:'Notification preferences' },
    { ic:Ico.heart,  l:'Health profile', sub:'Injuries, goals, body metrics' },
    { ic:Ico.person, l:'Account settings' },
    { ic:Ico.shield, l:'Privacy & data' },
    { ic:Ico.logout, l:'Log out', danger:true },
  ];
  return (
    <div style={{ margin:'0 16px 24px', background:WW.card, borderRadius:16, overflow:'hidden', boxShadow:WW.shadow, border:`0.5px solid ${WW.borderSoft}` }}>
      {rows.map((r, i) => (
        <div key={r.l} style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 14px', borderTop: i === 0 ? 'none' : `0.5px solid ${WW.borderSoft}`, cursor:'pointer' }}>
          <div style={{ width:32, height:32, borderRadius:10, background: r.danger ? '#FDECEC' : WW.elevated, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            {r.ic(r.danger ? '#C04B4B' : WW.primary)}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:14, fontWeight:600, color: r.danger ? '#C04B4B' : WW.text, letterSpacing:'-0.1px' }}>{r.l}</div>
            {r.sub && <div style={{ fontSize:11.5, color:WW.textSec, marginTop:2, fontWeight:500 }}>{r.sub}</div>}
          </div>
          {!r.danger && <div style={{ color:WW.textTert }}>{Ico.chev(WW.textTert)}</div>}
        </div>
      ))}
    </div>
  );
}

const TWEAKS = /*EDITMODE-BEGIN*/{
  "name": "Marcus Tan",
  "level": 7,
  "xpPct": 81,
  "rank": 2
}/*EDITMODE-END*/;

function ProfileScreen({ tw }) {
  return (
    <div style={{ width:390, height:844, background:WW.bg, fontFamily:'-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif', color:WW.text, position:'relative', overflow:'hidden', WebkitFontSmoothing:'antialiased' }}>
      <StatusBar/>
      <div style={{ position:'absolute', top:47, left:0, right:0, bottom:0, overflowY:'auto', paddingBottom:20 }}>
        <Header name={tw.name} level={tw.level} xpPct={tw.xpPct}/>
        <StatCards/>
        <BadgesStrip/>
        <Leaderboard rank={tw.rank}/>
        <SettingsList/>
      </div>
    </div>
  );
}

function App() {
  const [tw, setTw] = React.useState(TWEAKS);
  window.__getTweaks = () => tw;
  window.__updateTweaks = (patch) => setTw(prev => {
    const next = { ...prev, ...patch };
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:patch }, '*');
    return next;
  });
  return <ProfileScreen tw={tw}/>;
}

function __mountWhenReady() {
  if (!window.ReactDOM) return setTimeout(__mountWhenReady, 30);
  ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
}
__mountWhenReady();
</script>

<script>
(function () {
  const panel = document.getElementById('tweaks');
  const nm = document.getElementById('tw-name');
  const lv = document.getElementById('tw-lvl');
  const lvV = document.getElementById('tw-lvl-v');
  const xp = document.getElementById('tw-xp');
  const xpV = document.getElementById('tw-xp-v');
  const rk = document.getElementById('tw-rank');
  const rkV = document.getElementById('tw-rank-v');

  function syncFrom(tw) {
    nm.value = tw.name;
    lv.value = tw.level; lvV.textContent = tw.level;
    xp.value = tw.xpPct; xpV.textContent = tw.xpPct + '%';
    rk.value = tw.rank; rkV.textContent = tw.rank;
  }
  function whenReady(cb) {
    if (window.__updateTweaks) return cb();
    setTimeout(() => whenReady(cb), 30);
  }
  whenReady(() => {
    syncFrom(window.__getTweaks());
    nm.addEventListener('input', e => window.__updateTweaks({ name: e.target.value || 'Marcus Tan' }));
    lv.addEventListener('input', e => { const v = parseInt(e.target.value,10); lvV.textContent = v; window.__updateTweaks({ level: v }); });
    xp.addEventListener('input', e => { const v = parseInt(e.target.value,10); xpV.textContent = v + '%'; window.__updateTweaks({ xpPct: v }); });
    rk.addEventListener('input', e => { const v = parseInt(e.target.value,10); rkV.textContent = v; window.__updateTweaks({ rank: v }); });
  });
  window.addEventListener('message', (ev) => {
    const d = ev.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === '__activate_edit_mode') panel.classList.add('open');
    else if (d.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>

</body></html>
