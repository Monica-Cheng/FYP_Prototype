<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout Admin · Analytics</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F7F8FF;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;min-height:100vh;color:#3D3D5C}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C8C8D8;border-radius:3px}
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.07)'};
const NAV_ITEMS=[{id:'dashboard',label:'Dashboard',href:'A-02-Admin-Dashboard.html'},{id:'users',label:'Users',href:'A-03-Admin-Users.html'},{id:'bp',label:'Business Partners',href:'A-04-Admin-BP-Queue.html'},{id:'content',label:'Content',href:'A-05-Admin-Content.html'},{id:'challenges',label:'Challenges',href:'A-06-Admin-Challenges.html'},{id:'analytics',label:'Analytics',href:'A-07-Admin-Analytics.html'},{id:'settings',label:'Settings',href:'#'}];
const NAV_ICONS={dashboard:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/></svg>,users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="1.7"/><path d="M2 21c0-4 3.1-7 7-7s7 3 7 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M19 8v6M22 11h-6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,bp:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.7"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="1.7"/></svg>,content:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="1.7"/></svg>,challenges:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,analytics:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,settings:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.7"/></svg>};
function Sidebar({active}){return(<div style={{width:240,minHeight:'100vh',background:WW.card,borderRight:`1px solid ${WW.border}`,display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}><div style={{padding:'24px 20px 20px',borderBottom:`1px solid ${WW.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div><div><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark,lineHeight:1}}>WiseWorkout</div><div style={{fontSize:10,fontWeight:600,color:WW.textSec,letterSpacing:.5}}>ADMIN PORTAL</div></div></div></div><nav style={{padding:'12px 12px',flex:1}}>{NAV_ITEMS.map(n=>{const a=n.id===active;return(<a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:2,textDecoration:'none',background:a?WW.chipBg:'transparent',color:a?WW.primary:WW.textSec,fontWeight:a?700:500,fontSize:14}}><span style={{color:a?WW.primary:WW.textSec}}>{NAV_ICONS[n.id]}</span>{n.label}</a>);})}</nav><div style={{padding:'16px 20px',borderTop:`1px solid ${WW.border}`}}><a href="A-01-Admin-Login.html" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#EF4444',textDecoration:'none',fontWeight:600}}>Sign out</a></div></div>);}
function TopBar({title}){return(<div style={{height:64,background:WW.card,borderBottom:`1px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:WW.primaryDark}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:13,color:WW.textSec}}>admin@wiseworkout.com</div><div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:800,color:'#fff'}}>A</span></div></div></div>);}

// Data sets by period
const DATA={
  '7d':{
    dau:[{l:'Mon',v:1240},{l:'Tue',v:980},{l:'Wed',v:1420},{l:'Thu',v:1100},{l:'Fri',v:1380},{l:'Sat',v:1620},{l:'Sun',v:1290}],
    wau:[{l:'Mon',v:5400},{l:'Tue',v:5200},{l:'Wed',v:5600},{l:'Thu',v:5300},{l:'Fri',v:5500},{l:'Sat',v:5900},{l:'Sun',v:5700}],
    sessions:{gym:840,cardio:620,manual:290},
    plans:[{l:'8-Wk Beginner',v:312},{l:'5K Run Plan',v:248},{l:'Fat Loss',v:201},{l:'Core 30-Day',v:178},{l:'Advanced PL',v:89}],
    challenges:[{l:'Mon',v:18},{l:'Tue',v:22},{l:'Wed',v:19},{l:'Thu',v:31},{l:'Fri',v:28},{l:'Sat',v:45},{l:'Sun',v:38}],
    bp:[{l:'FitLife',v:62},{l:'Run Smart',v:48},{l:'NutriWell',v:31},{l:'Core SG',v:24}],
  },
  '30d':{
    dau:[{l:'W1',v:1100},{l:'W2',v:1250},{l:'W3',v:1380},{l:'W4',v:1290}],
    wau:[{l:'W1',v:5200},{l:'W2',v:5500},{l:'W3',v:5900},{l:'W4',v:5700}],
    sessions:{gym:3200,cardio:2400,manual:1100},
    plans:[{l:'8-Wk Beginner',v:1240},{l:'5K Run Plan',v:980},{l:'Fat Loss',v:820},{l:'Core 30-Day',v:710},{l:'Advanced PL',v:390}],
    challenges:[{l:'W1',v:95},{l:'W2',v:118},{l:'W3',v:142},{l:'W4',v:165}],
    bp:[{l:'FitLife',v:240},{l:'Run Smart',v:198},{l:'NutriWell',v:142},{l:'Core SG',v:98}],
  },
  '90d':{
    dau:[{l:'Feb',v:920},{l:'Mar',v:1080},{l:'Apr',v:1240},{l:'May',v:1290}],
    wau:[{l:'Feb',v:4200},{l:'Mar',v:4800},{l:'Apr',v:5400},{l:'May',v:5700}],
    sessions:{gym:9800,cardio:7200,manual:3100},
    plans:[{l:'8-Wk Beginner',v:3800},{l:'5K Run Plan',v:2900},{l:'Fat Loss',v:2400},{l:'Core 30-Day',v:2100},{l:'Advanced PL',v:1200}],
    challenges:[{l:'Feb',v:280},{l:'Mar',v:340},{l:'Apr',v:410},{l:'May',v:165}],
    bp:[{l:'FitLife',v:680},{l:'Run Smart',v:540},{l:'NutriWell',v:390},{l:'Core SG',v:290}],
  },
};

function SectionCard({title,children,onExport}){
  return(
    <div style={{background:WW.card,borderRadius:16,padding:'22px 24px',border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{fontSize:15,fontWeight:700,color:WW.primaryDark}}>{title}</div>
        <button onClick={onExport} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:8,border:`1px solid ${WW.border}`,background:WW.bg,color:WW.textSec,fontSize:12,fontWeight:600,cursor:'pointer'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Export CSV
        </button>
      </div>
      {children}
    </div>
  );
}

function LineChart({data,colors,h=140,labels}){
  const allVals=data.flatMap(d=>d.map(p=>p.v));
  const min=Math.min(...allVals)-50;const max=Math.max(...allVals)+50;
  const W=600,H=h;
  const makePoints=(series)=>series.map((d,i)=>({x:20+i*(W-40)/(series.length-1),y:H-10-((d.v-min)/(max-min))*(H-20)}));
  const makePath=(pts)=>pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{height:h,display:'block'}}>
        {[0.25,0.5,0.75].map(r=><line key={r} x1={0} y1={H*r} x2={W} y2={H*r} stroke={WW.border} strokeWidth=".5" strokeDasharray="4,4"/>)}
        {data.map((series,si)=>{
          const pts=makePoints(series);
          const path=makePath(pts);
          const fill=path+`L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
          return(<g key={si}><path d={fill} fill={colors[si]} opacity=".08"/><path d={path} stroke={colors[si]} strokeWidth="2.5" fill="none" strokeLinejoin="round"/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={colors[si]}/>)}</g>);
        })}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',padding:'0 4px',marginTop:4}}>
        {data[0].map((d,i)=><div key={i} style={{fontSize:11,color:WW.textSec,textAlign:'center'}}>{d.l}</div>)}
      </div>
      {labels&&<div style={{display:'flex',gap:16,marginTop:10}}>{labels.map((l,i)=><div key={l} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:12,height:3,borderRadius:2,background:colors[i]}}/><span style={{fontSize:12,color:WW.textSec}}>{l}</span></div>)}</div>}
    </div>
  );
}

function BarChart({data,color,h=110}){
  const max=Math.max(...data.map(d=>d.v));
  return(
    <div style={{display:'flex',gap:12,alignItems:'flex-end',height:h+40}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <div style={{fontSize:12,fontWeight:700,color:WW.primaryDark}}>{d.v.toLocaleString()}</div>
          <div style={{width:'100%',borderRadius:'6px 6px 0 0',background:color,height:`${(d.v/max)*h}px`,minHeight:4}}/>
          <div style={{fontSize:11,color:WW.textSec,textAlign:'center',lineHeight:1.2,maxWidth:70}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

function PieChart({data}){
  const total=data.reduce((s,d)=>s+d.v,0);
  let angle=0;
  const cx=80,cy=80,r=65,ir=35;
  const slices=data.map(d=>{
    const start=angle;const pct=d.v/total;const end=angle+pct*2*Math.PI;angle=end;
    const x1=cx+r*Math.sin(start),y1=cy-r*Math.cos(start);
    const x2=cx+r*Math.sin(end),y2=cy-r*Math.cos(end);
    const ix1=cx+ir*Math.sin(start),iy1=cy-ir*Math.cos(start);
    const ix2=cx+ir*Math.sin(end),iy2=cy-ir*Math.cos(end);
    const large=pct>.5?1:0;
    return{...d,path:`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large},0 ${ix1},${iy1} Z`,pct:Math.round(pct*100)};
  });
  return(
    <div style={{display:'flex',alignItems:'center',gap:24}}>
      <svg width="160" height="160" viewBox="0 0 160 160">
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color}/>)}
        <text x="80" y="77" textAnchor="middle" fontSize="11" fill={WW.textSec}>Sessions</text>
        <text x="80" y="93" textAnchor="middle" fontSize="14" fontWeight="800" fill={WW.primaryDark}>{total.toLocaleString()}</text>
      </svg>
      <div style={{flex:1}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:i<slices.length-1?`0.5px solid ${WW.border}`:'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:12,height:12,borderRadius:3,background:s.color}}/>
              <span style={{fontSize:13,color:WW.text,fontWeight:600}}>{s.label}</span>
            </div>
            <div style={{textAlign:'right'}}>
              <span style={{fontSize:13,fontWeight:800,color:WW.primaryDark}}>{s.v.toLocaleString()}</span>
              <span style={{fontSize:11,color:WW.textSec,marginLeft:6}}>{s.pct}%</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [period,setPeriod]=React.useState('7d');
  const d=DATA[period];
  const sessionData=[{label:'Gym sessions',v:d.sessions.gym,color:WW.primary},{label:'Cardio sessions',v:d.sessions.cardio,color:WW.teal},{label:'Manual logs',v:d.sessions.manual,color:WW.lavender}];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active="analytics"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',minWidth:0}}>
        <TopBar title="Analytics"/>
        <div style={{flex:1,padding:'28px 32px',display:'flex',flexDirection:'column',gap:24}}>

          {/* Period filter + privacy note */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:2,background:WW.elevated,borderRadius:12,padding:4}}>
              {[{id:'7d',label:'7 days'},{id:'30d',label:'30 days'},{id:'90d',label:'90 days'}].map(p=>(
                <button key={p.id} onClick={()=>setPeriod(p.id)} style={{padding:'8px 18px',borderRadius:9,background:period===p.id?WW.card:'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:period===p.id?WW.primaryDark:WW.textSec,boxShadow:period===p.id?WW.shadow:'none'}}>{p.label}</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:WW.textSec,background:WW.tealBg,border:'0.5px solid rgba(75,184,204,.3)',borderRadius:10,padding:'6px 12px'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke={WW.teal} strokeWidth="1.6"/></svg>
              All data is aggregated and anonymised — no individual user data shown
            </div>
          </div>

          {/* DAU + WAU line chart */}
          <SectionCard title="Daily & Weekly Active Users" onExport={()=>{}}>
            <LineChart data={[d.dau,d.wau]} colors={[WW.primary,WW.teal]} h={150} labels={['DAU','WAU']}/>
          </SectionCard>

          {/* Session breakdown + top plans */}
          <div style={{display:'flex',gap:20}}>
            <SectionCard title="Sessions by Type" onExport={()=>{}}>
              <PieChart data={sessionData}/>
            </SectionCard>
            <div style={{flex:2}}>
              <SectionCard title="Top Plan Templates" onExport={()=>{}}>
                <BarChart data={d.plans} color={WW.primary} h={110}/>
              </SectionCard>
            </div>
          </div>

          {/* Challenge participation + BP views */}
          <div style={{display:'flex',gap:20}}>
            <div style={{flex:1}}>
              <SectionCard title="Challenge Participation" onExport={()=>{}}>
                <LineChart data={[d.challenges]} colors={[WW.gold]} h={120}/>
              </SectionCard>
            </div>
            <div style={{flex:1}}>
              <SectionCard title="BP Profile View Counts" onExport={()=>{}}>
                <BarChart data={d.bp} color={WW.lavender} h={110}/>
              </SectionCard>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
