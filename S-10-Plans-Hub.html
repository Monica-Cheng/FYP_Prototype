<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-10 Plans Hub</title>
<style>
  :root{color-scheme:light}
  html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
</style>
</head><body>
<div class="stage">
  <div class="label">S-10 · Plans Hub</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',lavenderDark:'#7B5CB8',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const Ico={
  home:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a.5.5 0 01-.5.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A.5.5 0 013 21V10.5z" fill={c}/></svg>,
  plans:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c}/></svg>,
  coach:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  progress:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  run:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="14" cy="4" r="2" fill={c}/><path d="M10 8l2 4 4-2 2 4M7 20l3-4 2 2 3-4" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  walk:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="4" r="2" fill={c}/><path d="M9 9l3 3 3-3M12 12v5M10 21l2-4 2 4" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  cycle:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5.5" cy="17" r="3" stroke={c} strokeWidth="1.5"/><circle cx="18.5" cy="17" r="3" stroke={c} strokeWidth="1.5"/><path d="M5.5 17L9 10l3 2 3-5h3M12 12l6.5 5" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  pencil:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a1 1 0 00-1 1v15a1 1 0 001 1h15a1 1 0 001-1v-7" stroke={c} strokeWidth="1.6" strokeLinecap="round"/><path d="M18.5 2.5a2 2 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  grid:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.5"/></svg>,
  sparkle:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill={c}/><circle cx="18.5" cy="5.5" r="1.2" fill={c}/></svg>,
  chevron:c=><svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke={c||WW.textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
};

function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}

const NAV=[{id:'home',label:'Home',icon:Ico.home,href:'S-09-Home.html'},{id:'plans',label:'Plans',icon:Ico.plans,href:'S-10-Plans-Hub.html'},{id:'coach',label:'Coach',icon:Ico.coach,href:'S-25-Coach-Chat.html'},{id:'club',label:'Club',icon:Ico.club,href:'S-28-Club-Tab.html'},{id:'progress',label:'Progress',icon:Ico.progress,href:'S-32-Progress-Tab.html'}];
function BottomNav({active}){return(<div style={{position:'absolute',bottom:0,left:0,right:0,height:84,background:WW.card,borderTop:'0.5px solid #E8EAF8',display:'flex',zIndex:30}}>{NAV.map(n=>{const a=n.id===active,c=a?WW.primary:WW.textSec;return(<a key={n.id} href={n.href} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,textDecoration:'none',paddingBottom:8}}>{n.icon(c)}<span style={{fontSize:10,fontWeight:600,color:c}}>{n.label}</span></a>);})}</div>);}

const SAVED_PLANS=[
  {name:'Beginner Push-Pull-Legs',type:'Gym',level:'Beginner',days:3,source:'Matched',tracked:true},
  {name:'5K Running Plan',type:'Running',level:'Beginner',days:4,source:'Catalog',tracked:false},
  {name:'My Custom Push',type:'Gym',level:'Custom',days:3,source:'Custom',tracked:false},
];

const ACTIVITY_TYPES=[
  {id:'run',label:'Run',sub:'Outdoor / treadmill',icon:Ico.run,color:WW.teal},
  {id:'walk',label:'Walk',sub:'Easy cardio',icon:Ico.walk,color:'#22C55E'},
  {id:'cycle',label:'Cycle',sub:'Bike / spin',icon:Ico.cycle,color:'#F59E0B'},
  {id:'indoor',label:'Indoor Cardio',sub:'Elliptical, rowing…',icon:c=><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="8" width="18" height="9" rx="3" stroke={c} strokeWidth="1.5"/><path d="M8 8V6M16 8V6M12 17v2" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,color:WW.primary},
];

function ActivitySheet({onClose}){
  return(
    <>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',zIndex:40}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:WW.card,borderRadius:'22px 22px 0 0',zIndex:50,paddingBottom:36}}>
        <div style={{width:36,height:4,borderRadius:2,background:WW.border,margin:'10px auto 18px'}}/>
        <div style={{padding:'0 20px 16px',fontSize:17,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.3px'}}>Start an Activity</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,padding:'0 16px'}}>
          {ACTIVITY_TYPES.map(a=>(
            <a key={a.id} href="S-20-Cardio-Setup.html" style={{display:'flex',alignItems:'center',gap:14,padding:'13px 14px',background:WW.bg,borderRadius:14,border:`0.5px solid ${WW.border}`,textDecoration:'none'}}>
              <div style={{width:44,height:44,borderRadius:12,background:`${a.color}18`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{a.icon(a.color)}</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:WW.text}}>{a.label}</div>
                <div style={{fontSize:12,color:WW.textSec}}>{a.sub}</div>
              </div>
              <div style={{marginLeft:'auto'}}><svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke={WW.textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
            </a>
          ))}
        </div>
      </div>
    </>
  );
}

function App(){
  const [showActivity,setShowActivity]=React.useState(false);
  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>
      <div style={{flex:1,overflowY:'auto',padding:'0 16px',paddingBottom:92}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,marginTop:4}}>
          <div style={{fontSize:26,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.5px'}}>Plans</div>
          <a href="S-34-Profile.html?ref=S-10-Plans-Hub.html" style={{width:40,height:40,borderRadius:20,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff',textDecoration:'none',boxShadow:'0 2px 8px rgba(108,126,232,0.3)'}}>M</a>
        </div>

        {/* Start Activity CTA */}
        <button onClick={()=>setShowActivity(true)} style={{
          width:'100%',height:52,borderRadius:14,background:WW.teal,color:'#fff',
          border:'none',cursor:'pointer',fontSize:16,fontWeight:700,
          boxShadow:'0 4px 14px rgba(75,184,204,0.35)',marginBottom:22,
          display:'flex',alignItems:'center',justifyContent:'center',gap:10,
        }}>
          {Ico.run('#fff')}
          Start Activity
        </button>

        {/* Choose a way to train */}
        <div style={{fontSize:11,fontWeight:700,color:WW.textSec,letterSpacing:'0.5px',textTransform:'uppercase',marginBottom:10}}>Choose a Way to Train</div>
        <div style={{display:'flex',gap:8,marginBottom:22}}>
          {[
            {label:'Build',sub:'Create your own routine',icon:Ico.pencil,href:'S-11-Build-Custom-Routine.html',color:'#6C7EE8'},
            {label:'Explore',sub:'Browse plan catalog',icon:Ico.grid,href:'S-12-Explore-Plan-Catalog.html',color:'#4BB8CC'},
            {label:'Plan Match',sub:'Get AI-matched plan',icon:Ico.sparkle,href:'S-14-Plan-Match.html',color:'#9B84E8'},
          ].map(({label,sub,icon,href,color})=>(
            <a key={label} href={href} style={{flex:1,background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,padding:'14px 10px 12px',display:'flex',flexDirection:'column',alignItems:'center',gap:8,textDecoration:'none'}}>
              <div style={{width:40,height:40,borderRadius:12,background:`${color}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>{icon(color)}</div>
              <div style={{fontSize:12,fontWeight:800,color:WW.text,textAlign:'center'}}>{label}</div>
              <div style={{fontSize:10,color:WW.textSec,textAlign:'center',lineHeight:1.3,fontWeight:500}}>{sub}</div>
            </a>
          ))}
        </div>

        {/* Tracked plan */}
        <div style={{fontSize:11,fontWeight:700,color:WW.textSec,letterSpacing:'0.5px',textTransform:'uppercase',marginBottom:10}}>Tracked Plan</div>
        <div style={{background:WW.elevated,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'16px',marginBottom:22}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,color:WW.teal,letterSpacing:'0.4px',textTransform:'uppercase',background:WW.tealBg,padding:'2px 8px',borderRadius:6}}>Tracked Plan</div>
          </div>
          <div style={{fontSize:17,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.2px',marginBottom:4}}>Beginner Push-Pull-Legs</div>
          <div style={{fontSize:13,color:WW.textSec,marginBottom:14}}>3 days/week · 8 weeks · Day 5 of 24</div>
          <div style={{display:'flex',gap:8}}>
            <a href="S-16-Tracked-Plan-Schedule.html" style={{flex:1,height:40,borderRadius:11,border:`1.5px solid ${WW.primary}`,display:'flex',alignItems:'center',justifyContent:'center',color:WW.primary,fontSize:13,fontWeight:700,textDecoration:'none'}}>View Schedule</a>
            <a href="S-17-Gym-Session-Active.html" style={{flex:1,height:40,borderRadius:11,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,textDecoration:'none',boxShadow:'0 3px 10px rgba(108,126,232,.3)'}}>Start Today</a>
          </div>
        </div>

        {/* My Plans horizontal scroll */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:WW.textSec,letterSpacing:'0.5px',textTransform:'uppercase'}}>My Plans</div>
          <a href="S-15-My-Plans-Library.html" style={{fontSize:13,color:WW.primary,fontWeight:700,textDecoration:'none'}}>See all</a>
        </div>
        <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8,marginBottom:4}}>
          {SAVED_PLANS.map(p=>(
            <a key={p.name} href="S-13-Plan-Detail.html" style={{minWidth:160,background:WW.card,borderRadius:14,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,padding:'12px 13px',textDecoration:'none',flexShrink:0,display:'block'}}>
              {p.tracked&&<div style={{fontSize:10,fontWeight:700,color:WW.teal,background:WW.tealBg,padding:'2px 7px',borderRadius:5,display:'inline-block',marginBottom:6}}>Tracked</div>}
              <div style={{fontSize:13,fontWeight:800,color:WW.text,lineHeight:1.3,marginBottom:6}}>{p.name}</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                <span style={{fontSize:10,fontWeight:600,color:WW.textSec,background:WW.elevated,padding:'2px 7px',borderRadius:5}}>{p.type}</span>
                <span style={{fontSize:10,fontWeight:600,color:WW.textSec,background:WW.elevated,padding:'2px 7px',borderRadius:5}}>{p.days}d/wk</span>
                <span style={{fontSize:10,fontWeight:600,color:WW.primary,background:WW.chipBg,padding:'2px 7px',borderRadius:5}}>{p.source}</span>
              </div>
            </a>
          ))}
        </div>
      </div>
      <BottomNav active="plans"/>
      {showActivity&&<ActivitySheet onClose={()=>setShowActivity(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
