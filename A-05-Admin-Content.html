<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout Admin · Content</title>
<style>
  :root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F7F8FF;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;min-height:100vh;color:#3D3D5C}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C8C8D8;border-radius:3px}
  tr:hover td{background:#F7F8FF}
  input,select,textarea{font-family:inherit}
</style>
</head><body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',teal:'#4BB8CC',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.07)'};
const NAV_ITEMS=[{id:'dashboard',label:'Dashboard',href:'A-02-Admin-Dashboard.html'},{id:'users',label:'Users',href:'A-03-Admin-Users.html'},{id:'bp',label:'Business Partners',href:'A-04-Admin-BP-Queue.html'},{id:'content',label:'Content',href:'A-05-Admin-Content.html'},{id:'challenges',label:'Challenges',href:'A-06-Admin-Challenges.html'},{id:'analytics',label:'Analytics',href:'A-07-Admin-Analytics.html'},{id:'settings',label:'Settings',href:'#'}];
const NAV_ICONS={dashboard:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" strokeWidth="1.7"/></svg>,users:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" strokeWidth="1.7"/><path d="M2 21c0-4 3.1-7 7-7s7 3 7 7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M19 8v6M22 11h-6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,bp:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" strokeWidth="1.7"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="1.7"/></svg>,content:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="1.7"/></svg>,challenges:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>,analytics:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,settings:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.7"/></svg>};
function Sidebar({active}){return(<div style={{width:240,minHeight:'100vh',background:WW.card,borderRight:`1px solid ${WW.border}`,display:'flex',flexDirection:'column',flexShrink:0,position:'sticky',top:0,height:'100vh',overflowY:'auto'}}><div style={{padding:'24px 20px 20px',borderBottom:`1px solid ${WW.border}`}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg></div><div><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark,lineHeight:1}}>WiseWorkout</div><div style={{fontSize:10,fontWeight:600,color:WW.textSec,letterSpacing:.5}}>ADMIN PORTAL</div></div></div></div><nav style={{padding:'12px 12px',flex:1}}>{NAV_ITEMS.map(n=>{const a=n.id===active;return(<a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:2,textDecoration:'none',background:a?WW.chipBg:'transparent',color:a?WW.primary:WW.textSec,fontWeight:a?700:500,fontSize:14}}><span style={{color:a?WW.primary:WW.textSec}}>{NAV_ICONS[n.id]}</span>{n.label}</a>);})}</nav><div style={{padding:'16px 20px',borderTop:`1px solid ${WW.border}`}}><a href="A-01-Admin-Login.html" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#EF4444',textDecoration:'none',fontWeight:600}}>Sign out</a></div></div>);}
function TopBar({title}){return(<div style={{height:64,background:WW.card,borderBottom:`1px solid ${WW.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:WW.primaryDark}}>{title}</div><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:13,color:WW.textSec}}>admin@wiseworkout.com</div><div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${WW.primary},#9B84E8)`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:800,color:'#fff'}}>A</span></div></div></div>);}

const INJURY_TAGS=['Low back pain','Knee injury','Shoulder injury','Hip pain','Beginner-safe'];
const MUSCLE_GROUPS=['Chest','Back','Shoulders','Arms','Core','Legs','Full body'];
const EQUIPMENT=['Barbell','Dumbbell','Machine','Bodyweight','Resistance bands','Kettlebell'];

const INIT_EXERCISES=[
  {id:'E001',name:'Barbell Bench Press',muscle:'Chest',equipment:'Barbell',tags:['Shoulder injury'],status:'Active'},
  {id:'E002',name:'Squat',muscle:'Legs',equipment:'Barbell',tags:['Knee injury','Low back pain'],status:'Active'},
  {id:'E003',name:'Pull-up',muscle:'Back',equipment:'Bodyweight',tags:[],status:'Active'},
  {id:'E004',name:'Overhead Press',muscle:'Shoulders',equipment:'Barbell',tags:['Shoulder injury'],status:'Active'},
  {id:'E005',name:'Romanian Deadlift',muscle:'Legs',equipment:'Barbell',tags:['Low back pain'],status:'Archived'},
  {id:'E006',name:'Dumbbell Curl',muscle:'Arms',equipment:'Dumbbell',tags:['Beginner-safe'],status:'Active'},
];
const INIT_PLANS=[
  {id:'P001',name:'8-Week Beginner Strength',goal:'Strength',level:'Beginner',days:3,type:'Gym',status:'Active'},
  {id:'P002',name:'5K Running Plan',goal:'Endurance',level:'Intermediate',days:4,type:'Cardio',status:'Active'},
  {id:'P003',name:'Full Body Fat Loss',goal:'Weight loss',level:'Beginner',days:4,type:'Mixed',status:'Active'},
  {id:'P004',name:'Advanced Powerlifting',goal:'Strength',level:'Advanced',days:5,type:'Gym',status:'Archived'},
  {id:'P005',name:'30-Day Core Challenge',goal:'Core strength',level:'All',days:7,type:'Gym',status:'Active'},
];

const BLANK_EX={name:'',desc:'',muscle:'Chest',equipment:'Barbell',tags:[],videoUrl:'',instructions:''};
const BLANK_PLAN={name:'',goal:'',level:'Beginner',days:3,type:'Gym'};

function TagChip({label,selected,onClick}){
  return <button onClick={onClick} style={{padding:'4px 10px',borderRadius:20,border:`1.5px solid ${selected?WW.primary:WW.border}`,background:selected?WW.chipBg:WW.card,color:selected?WW.primary:WW.textSec,fontSize:12,fontWeight:600,cursor:'pointer'}}>{label}</button>;
}

function App(){
  const [tab,setTab]=React.useState('exercises');
  const [exercises,setExercises]=React.useState(INIT_EXERCISES);
  const [plans,setPlans]=React.useState(INIT_PLANS);
  const [search,setSearch]=React.useState('');
  const [formModal,setFormModal]=React.useState(null); // null | 'exercise' | 'plan'
  const [editItem,setEditItem]=React.useState(null);
  const [form,setForm]=React.useState({});

  const openAdd=(type)=>{setFormModal(type);setEditItem(null);setForm(type==='exercise'?{...BLANK_EX}:{...BLANK_PLAN});};
  const openEdit=(type,item)=>{setFormModal(type);setEditItem(item);setForm({...item});};
  const archive=(type,id)=>{
    if(type==='exercise') setExercises(p=>p.map(e=>e.id===id?{...e,status:e.status==='Active'?'Archived':'Active'}:e));
    else setPlans(p=>p.map(pl=>pl.id===id?{...pl,status:pl.status==='Active'?'Archived':'Active'}:pl));
  };
  const saveForm=()=>{
    if(formModal==='exercise'){
      if(editItem) setExercises(p=>p.map(e=>e.id===editItem.id?{...e,...form}:e));
      else setExercises(p=>[...p,{...form,id:`E00${p.length+1}`,status:'Active'}]);
    } else {
      if(editItem) setPlans(p=>p.map(pl=>pl.id===editItem.id?{...pl,...form}:pl));
      else setPlans(p=>[...p,{...form,id:`P00${p.length+1}`,status:'Active'}]);
    }
    setFormModal(null);
  };

  const filteredEx=exercises.filter(e=>!search||e.name.toLowerCase().includes(search.toLowerCase())||e.muscle.toLowerCase().includes(search.toLowerCase()));
  const filteredPl=plans.filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase()));

  const Btn=({c='#6C7EE8',children,onClick})=><button onClick={onClick} style={{background:'none',border:'none',color:c,fontSize:12,fontWeight:700,cursor:'pointer',padding:'2px 0'}}>{children}</button>;
  const StatusPill=({s})=><span style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,background:s==='Active'?'#D1FAE5':'#F2F2F7',color:s==='Active'?'#059669':'#6B7280'}}>{s}</span>;

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active="content"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',minWidth:0}}>
        <TopBar title="Content Management"/>
        <div style={{flex:1,padding:'28px 32px',display:'flex',flexDirection:'column',gap:20}}>
          {/* Sub-tabs + search + add */}
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{display:'flex',gap:2,background:WW.elevated,borderRadius:12,padding:4}}>
              {[{id:'exercises',label:'Exercise Library'},{id:'plans',label:'Plan Templates'}].map(t=>(
                <button key={t.id} onClick={()=>{setTab(t.id);setSearch('');}} style={{padding:'8px 18px',borderRadius:9,background:tab===t.id?WW.card:'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:tab===t.id?WW.primaryDark:WW.textSec,boxShadow:tab===t.id?WW.shadow:'none'}}>{t.label}</button>
              ))}
            </div>
            <div style={{flex:1,position:'relative'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:WW.textSec}}><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Search ${tab==='exercises'?'exercises':'plan templates'}…`} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 14px 0 38px',fontSize:14,color:WW.text,outline:'none'}}/>
            </div>
            <button onClick={()=>openAdd(tab==='exercises'?'exercise':'plan')} style={{height:40,padding:'0 20px',borderRadius:10,background:WW.primary,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',boxShadow:'0 4px 12px rgba(108,126,232,.3)'}}>
              + Add {tab==='exercises'?'Exercise':'Template'}
            </button>
          </div>

          {/* Exercise table */}
          {tab==='exercises'&&(
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                  {['Exercise','Muscle group','Equipment','Injury risk tags','Status','Actions'].map(h=><th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {filteredEx.map((e,i)=>(
                    <tr key={e.id} style={{borderBottom:i<filteredEx.length-1?`0.5px solid ${WW.border}`:'none'}}>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,fontWeight:700,color:WW.text}}>{e.name}</div><div style={{fontSize:11,color:WW.textSec}}>{e.id}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{e.muscle}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{e.equipment}</td>
                      <td style={{padding:'12px 16px'}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{e.tags.map(t=><span key={t} style={{fontSize:10,fontWeight:700,background:'#FEE2E2',color:'#DC2626',padding:'2px 7px',borderRadius:10}}>{t}</span>)}{e.tags.length===0&&<span style={{fontSize:11,color:WW.textSec}}>—</span>}</div></td>
                      <td style={{padding:'12px 16px'}}><StatusPill s={e.status}/></td>
                      <td style={{padding:'12px 16px'}}><div style={{display:'flex',gap:10}}><Btn onClick={()=>openEdit('exercise',e)}>Edit</Btn><Btn c='#8A8A9E' onClick={()=>archive('exercise',e.id)}>{e.status==='Active'?'Archive':'Restore'}</Btn></div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Plan templates table */}
          {tab==='plans'&&(
            <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{borderBottom:`1px solid ${WW.border}`,background:'#FAFBFF'}}>
                  {['Plan name','Goal','Level','Days/week','Type','Status','Actions'].map(h=><th key={h} style={{textAlign:'left',padding:'12px 16px',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {filteredPl.map((p,i)=>(
                    <tr key={p.id} style={{borderBottom:i<filteredPl.length-1?`0.5px solid ${WW.border}`:'none'}}>
                      <td style={{padding:'12px 16px'}}><div style={{fontSize:13,fontWeight:700,color:WW.text}}>{p.name}</div><div style={{fontSize:11,color:WW.textSec}}>{p.id}</div></td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{p.goal}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{p.level}</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{p.days}×/week</td>
                      <td style={{padding:'12px 16px',fontSize:13,color:WW.text}}>{p.type}</td>
                      <td style={{padding:'12px 16px'}}><StatusPill s={p.status}/></td>
                      <td style={{padding:'12px 16px'}}><div style={{display:'flex',gap:10}}><Btn onClick={()=>openEdit('plan',p)}>Edit</Btn><Btn c='#8A8A9E' onClick={()=>archive('plans',p.id)}>{p.status==='Active'?'Archive':'Restore'}</Btn></div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {/* Form modal */}
      {formModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,10,18,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div style={{background:WW.card,borderRadius:20,padding:'28px',width:520,maxHeight:'85vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(20,25,60,.25)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark}}>{editItem?'Edit':'Add'} {formModal==='exercise'?'Exercise':'Plan Template'}</div>
              <button onClick={()=>setFormModal(null)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:WW.textSec}}>×</button>
            </div>

            {formModal==='exercise'&&(
              <>
                {[{l:'Exercise name',k:'name',p:'e.g. Barbell Bench Press'},{l:'Description',k:'desc',p:'Brief description…',ta:true},{l:'Demo video URL',k:'videoUrl',p:'https://…'},{l:'Instructions',k:'instructions',p:'Step-by-step instructions…',ta:true}].map(f=>(
                  <div key={f.k} style={{marginBottom:12}}>
                    <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>{f.l}</label>
                    {f.ta
                      ?<textarea value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p} rows={3} style={{width:'100%',borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'8px 12px',fontSize:13,color:WW.text,outline:'none',resize:'vertical'}}/>
                      :<input value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 12px',fontSize:13,color:WW.text,outline:'none'}}/>
                    }
                  </div>
                ))}
                {[{l:'Muscle group',k:'muscle',opts:MUSCLE_GROUPS},{l:'Equipment',k:'equipment',opts:EQUIPMENT}].map(f=>(
                  <div key={f.k} style={{marginBottom:12}}>
                    <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>{f.l}</label>
                    <select value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 12px',fontSize:13,color:WW.text,outline:'none',background:WW.card}}>
                      {f.opts.map(o=><option key={o}>{o}</option>)}
                    </select>
                  </div>
                ))}
                <div style={{marginBottom:16}}>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:8}}>Injury risk tags</label>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {INJURY_TAGS.map(t=><TagChip key={t} label={t} selected={(form.tags||[]).includes(t)} onClick={()=>setForm(p=>({...p,tags:(p.tags||[]).includes(t)?p.tags.filter(x=>x!==t):[...(p.tags||[]),t]}))}/>)}
                  </div>
                </div>
              </>
            )}

            {formModal==='plan'&&(
              <>
                {[{l:'Plan name',k:'name',p:'e.g. 8-Week Beginner Strength'},{l:'Goal',k:'goal',p:'e.g. Strength, Weight loss'}].map(f=>(
                  <div key={f.k} style={{marginBottom:12}}>
                    <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>{f.l}</label>
                    <input value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 12px',fontSize:13,color:WW.text,outline:'none'}}/>
                  </div>
                ))}
                {[{l:'Level',k:'level',opts:['Beginner','Intermediate','Advanced','All']},{l:'Type',k:'type',opts:['Gym','Cardio','Mixed']}].map(f=>(
                  <div key={f.k} style={{marginBottom:12}}>
                    <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>{f.l}</label>
                    <select value={form[f.k]||''} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 12px',fontSize:13,color:WW.text,outline:'none',background:WW.card}}>
                      {f.opts.map(o=><option key={o}>{o}</option>)}
                    </select>
                  </div>
                ))}
                <div style={{marginBottom:12}}>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>Sessions per week</label>
                  <input type="number" min={1} max={7} value={form.days||3} onChange={e=>setForm(p=>({...p,days:parseInt(e.target.value)||3}))} style={{width:'100%',height:40,borderRadius:10,border:`1.5px solid ${WW.border}`,padding:'0 12px',fontSize:13,color:WW.text,outline:'none'}}/>
                </div>
              </>
            )}

            <div style={{display:'flex',gap:10,marginTop:8}}>
              <button onClick={()=>setFormModal(null)} style={{flex:1,height:42,borderRadius:10,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:13,fontWeight:700,cursor:'pointer'}}>Cancel</button>
              <button onClick={saveForm} style={{flex:2,height:42,borderRadius:10,background:WW.primary,color:'#fff',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
