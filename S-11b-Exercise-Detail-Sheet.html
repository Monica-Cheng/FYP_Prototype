<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-11b Exercise Detail Sheet</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:220px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 0.5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}
  .tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;gap:8px;font-size:13px}
</style>
</head><body>
<div class="stage">
  <div class="label">S-11b · Exercise Detail Sheet</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>

<div class="tweaks-panel" id="tweaks">
  <h3>Exercise</h3>
  <div class="tweak-row">
    <label style="flex:1">Exercise</label>
    <select id="tw-ex" style="font-size:12px;padding:4px 7px;borderRadius:7px;border:1px solid #C8C8D8;background:#F7F8FF">
      <option value="Bench Press">Bench Press</option>
      <option value="Pull-up">Pull-up</option>
      <option value="Squat">Squat</option>
      <option value="Overhead Press">Overhead Press</option>
      <option value="Romanian Deadlift">Romanian Deadlift</option>
      <option value="Hip Thrust">Hip Thrust</option>
    </select>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

const MC={
  Chest:    {bg:'#EEF0FB',c:WW.primary},
  Back:     {bg:WW.tealBg,c:WW.teal},
  Shoulders:{bg:WW.lavenderBg,c:WW.lavender},
  Arms:     {bg:'#FFF3E0',c:'#F97316'},
  Legs:     {bg:'#F0FFF4',c:'#10B981'},
  Core:     {bg:'#FFF0F0',c:'#EF4444'},
  Glutes:   {bg:'#FEF3C7',c:'#D97706'},
};
const mc=m=>MC[m]||{bg:WW.elevated,c:WW.textSec};

const EXERCISES={
  'Bench Press':{
    muscle:'Chest',secondary:['Triceps','Front Delts'],equipment:'Barbell',difficulty:'Intermediate',
    desc:'Lie flat on a bench with feet firmly on the floor. Grip the bar slightly wider than shoulder-width, retract your shoulder blades, and lower the bar to your mid-chest with control. Press back to full extension while keeping wrists stacked over elbows.',
    steps:['Set the bar at a height you can comfortably reach','Grip just wider than shoulder-width with wrists straight','Arch your upper back, keep lower back neutral','Unrack and lower the bar to mid-chest','Press back up, exhaling at the top'],
    mistakes:['Bouncing the bar off the chest','Elbows flaring past 90° — raises injury risk','Losing shoulder blade retraction mid-set','Pressing to the face instead of straight up'],
  },
  'Pull-up':{
    muscle:'Back',secondary:['Biceps','Rear Delts','Core'],equipment:'Pull-up Bar',difficulty:'Intermediate',
    desc:'Hang from a bar with an overhand grip slightly wider than shoulder-width. Initiate the pull by depressing your shoulder blades. Drive your elbows down toward your hips until your chin clears the bar, then lower with full control.',
    steps:['Dead hang with full arm extension','Depress shoulder blades — "proud chest" position','Drive elbows toward hips to pull up','Get chin over the bar','Lower slowly — take 2–3 seconds'],
    mistakes:['Kipping to cheat reps','Not achieving full extension at the bottom','Shrugging rather than depressing the scapula','Letting the core sag — keep it braced'],
  },
  'Squat':{
    muscle:'Legs',secondary:['Glutes','Core','Adductors'],equipment:'Barbell',difficulty:'Intermediate',
    desc:'Position the bar across your upper traps. Feet shoulder-width apart, toes turned slightly out. Push your knees out in line with your toes as you lower until your thighs are at least parallel to the floor. Drive through your heels to stand.',
    steps:['Set bar on upper traps, not neck','Feet shoulder-width, toes 15–30° out','Brace core, breath into belly before each rep','Break at the hips and knees simultaneously','Lower until thighs parallel or below','Drive through full foot, extend hips and knees together'],
    mistakes:['Knees caving inward (valgus collapse)','Heels rising off the floor','Excessive forward lean','Not reaching depth (above parallel)'],
  },
  'Overhead Press':{
    muscle:'Shoulders',secondary:['Triceps','Upper Chest','Core'],equipment:'Barbell',difficulty:'Intermediate',
    desc:'Start with the bar at collarbone height, hands just outside shoulder-width. Brace your core and press the bar directly overhead, moving your head back slightly as the bar passes. Lock out and return under control.',
    steps:['Start bar at clavicle height','Elbows slightly in front of the bar','Brace core and glutes before pressing','Press straight up, head back temporarily','Lock out overhead, biceps by ears','Lower with control to starting position'],
    mistakes:['Excessive lower back arch','Bar drifting forward instead of straight up','Not locking out elbows at the top','Shrugging the traps at the top'],
  },
  'Romanian Deadlift':{
    muscle:'Legs',secondary:['Glutes','Lower Back','Hamstrings'],equipment:'Barbell',difficulty:'Intermediate',
    desc:'Hold a barbell at hip height, feet hip-width apart. Hinge at the hips, sending them back while keeping a long neutral spine. Lower the bar along your thighs until you feel a deep hamstring stretch, then drive the hips forward to return.',
    steps:['Stand with bar at hip height, soft knee bend','Push hips back — "close the hip joint"','Keep bar touching or close to legs throughout','Lower until hamstrings are fully stretched','Drive hips forward to return — not a squat motion'],
    mistakes:['Rounding the lower back under load','Squatting down instead of hinging','Bar drifting away from the legs','Not feeling the hamstring stretch (too shallow)'],
  },
  'Hip Thrust':{
    muscle:'Glutes',secondary:['Hamstrings','Adductors'],equipment:'Barbell + Bench',difficulty:'Beginner',
    desc:'Sit against a bench with a barbell across your hips and a pad for comfort. Drive through your heels to thrust the hips toward the ceiling until your body forms a straight line from shoulders to knees. Squeeze hard at the top.',
    steps:['Bench at mid-upper back height','Bar across hips with a hip pad','Feet flat, about hip-width apart','Drive through full foot, not just heels','Squeeze glutes hard at the top — 1-second pause','Lower under control, do not touch the ground between reps'],
    mistakes:['Hyperextending the lower back at the top','Driving through the toes instead of the heels','Not achieving full hip extension','Narrow or wide stance reducing glute activation'],
  },
};

function StatusBar(){
  return(
    <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}>
      <div style={{paddingTop:10}}>9:41</div>
      <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg>
      </div>
    </div>
  );
}

function App(){
  const [exName,setExName]=React.useState('Bench Press');
  const [added,setAdded]=React.useState(false);

  React.useEffect(()=>{
    const sel=document.getElementById('tw-ex');
    if(!sel)return;
    sel.addEventListener('change',e=>{setExName(e.target.value);setAdded(false);});
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';
    btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');
    document.body.appendChild(btn);
  },[]);

  const ex=EXERCISES[exName]||EXERCISES['Bench Press'];
  const col=mc(ex.muscle);

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>

      {/* Ghost routine builder behind sheet */}
      <div style={{flex:1,padding:'0 14px',opacity:0.35,pointerEvents:'none',overflow:'hidden',position:'relative'}}>
        <div style={{height:44,borderRadius:12,background:WW.card,marginBottom:10,border:`0.5px solid ${WW.border}`}}/>
        <div style={{height:120,borderRadius:14,background:WW.card,marginBottom:8,border:`0.5px solid ${WW.border}`}}/>
        <div style={{height:80,borderRadius:14,background:WW.card,border:`0.5px solid ${WW.border}`}}/>
      </div>

      {/* Dim overlay */}
      <div style={{position:'absolute',inset:0,background:'rgba(10,10,20,0.5)',zIndex:10}}/>

      {/* Bottom sheet */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:WW.card,borderRadius:'22px 22px 0 0',zIndex:20,maxHeight:'88%',display:'flex',flexDirection:'column',boxShadow:'0 -8px 32px rgba(45,58,140,0.2)'}}>

        {/* Drag handle */}
        <div style={{width:36,height:4,borderRadius:2,background:WW.border,margin:'10px auto 0',flexShrink:0}}/>

        {/* Header */}
        <div style={{display:'flex',alignItems:'flex-start',padding:'14px 18px 10px',flexShrink:0,gap:12}}>
          <div style={{width:48,height:48,borderRadius:13,background:col.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:`0.5px solid ${col.c}22`}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <rect x="7" y="10" width="10" height="4" rx="2" fill={col.c} fillOpacity="0.3" stroke={col.c} strokeWidth="1.4"/>
              <rect x="3" y="8" width="4" height="8" rx="2" stroke={col.c} strokeWidth="1.4"/>
              <rect x="17" y="8" width="4" height="8" rx="2" stroke={col.c} strokeWidth="1.4"/>
              <rect x="1" y="10" width="2" height="4" rx="1" fill={col.c}/>
              <rect x="21" y="10" width="2" height="4" rx="1" fill={col.c}/>
            </svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:21,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.4px',lineHeight:1.2}}>{exName}</div>
            <div style={{fontSize:12,fontWeight:700,color:col.c,marginTop:3}}>{ex.muscle}</div>
          </div>
          <a href="S-11-Build-Custom-Routine.html" style={{width:30,height:30,borderRadius:15,background:WW.elevated,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',flexShrink:0}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke={WW.textSec} strokeWidth="2" strokeLinecap="round"/></svg>
          </a>
        </div>

        {/* Scrollable content */}
        <div style={{flex:1,overflowY:'auto',padding:'0 18px'}}>

          {/* Demo animation placeholder */}
          <div style={{height:188,borderRadius:16,background:`linear-gradient(135deg,${col.bg} 0%,${col.c}33 100%)`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,marginBottom:16,border:`0.5px solid ${col.c}33`,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,opacity:0.06,background:`repeating-linear-gradient(45deg,${col.c} 0px,${col.c} 1px,transparent 1px,transparent 14px)`}}/>
            {/* Animated silhouette placeholder */}
            <div style={{position:'relative',zIndex:1}}>
              <svg width="56" height="80" viewBox="0 0 56 80" fill="none">
                <ellipse cx="28" cy="9" rx="8" ry="8" fill={col.c} fillOpacity="0.4"/>
                <rect x="18" y="20" width="20" height="24" rx="5" fill={col.c} fillOpacity="0.35"/>
                <rect x="4" y="20" width="12" height="20" rx="4" fill={col.c} fillOpacity="0.2"/>
                <rect x="40" y="20" width="12" height="20" rx="4" fill={col.c} fillOpacity="0.2"/>
                <rect x="19" y="44" width="8" height="26" rx="4" fill={col.c} fillOpacity="0.25"/>
                <rect x="29" y="44" width="8" height="26" rx="4" fill={col.c} fillOpacity="0.25"/>
              </svg>
            </div>
            <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
              <div style={{width:42,height:42,borderRadius:21,background:'rgba(255,255,255,0.65)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill={col.c}><path d="M8 5v14l11-7z"/></svg>
              </div>
              <div style={{fontSize:11,fontWeight:700,color:col.c,opacity:0.75}}>Exercise animation loading…</div>
            </div>
          </div>

          {/* Tags */}
          <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:16}}>
            <div style={{padding:'5px 12px',borderRadius:20,background:col.bg,fontSize:11,fontWeight:700,color:col.c}}>{ex.muscle} — Primary</div>
            {(ex.secondary||[]).map(m=>(
              <div key={m} style={{padding:'5px 12px',borderRadius:20,background:WW.elevated,fontSize:11,fontWeight:600,color:WW.textSec}}>{m}</div>
            ))}
            <div style={{padding:'5px 12px',borderRadius:20,background:'#FEF3C7',fontSize:11,fontWeight:700,color:'#D97706'}}>{ex.equipment}</div>
            <div style={{padding:'5px 12px',borderRadius:20,background:'#D1FAE5',fontSize:11,fontWeight:700,color:'#059669'}}>{ex.difficulty}</div>
          </div>

          {/* Body diagram — front + back */}
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            {['Front','Back'].map(side=>{
              const isActive=side==='Front'?['Chest','Shoulders','Arms','Core','Legs'].includes(ex.muscle):['Back','Glutes'].includes(ex.muscle);
              return(
                <div key={side} style={{flex:1,background:WW.elevated,borderRadius:12,padding:'12px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:`0.5px solid ${WW.border}`}}>
                  <svg width="40" height="64" viewBox="0 0 40 64" fill="none">
                    <ellipse cx="20" cy="7" rx="7" ry="7" fill={WW.border}/>
                    <rect x="11" y="16" width="18" height="20" rx="4" fill={isActive?col.c:WW.border} fillOpacity={isActive?'0.35':'0.8'}/>
                    <rect x="1" y="16" width="9" height="17" rx="3" fill={['Arms'].includes(ex.muscle)?col.c:WW.border} fillOpacity="0.6"/>
                    <rect x="30" y="16" width="9" height="17" rx="3" fill={['Arms'].includes(ex.muscle)?col.c:WW.border} fillOpacity="0.6"/>
                    <rect x="12" y="36" width="7" height="22" rx="3" fill={['Legs','Glutes'].includes(ex.muscle)?col.c:WW.border} fillOpacity={['Legs','Glutes'].includes(ex.muscle)?'0.3':'0.6'}/>
                    <rect x="21" y="36" width="7" height="22" rx="3" fill={['Legs','Glutes'].includes(ex.muscle)?col.c:WW.border} fillOpacity={['Legs','Glutes'].includes(ex.muscle)?'0.3':'0.6'}/>
                  </svg>
                  <div style={{fontSize:9,fontWeight:700,color:WW.textSec,letterSpacing:'0.3px'}}>{side.toUpperCase()}</div>
                </div>
              );
            })}
            {/* Tip card */}
            <div style={{flex:2,background:WW.lavenderBg,borderRadius:12,padding:'12px',border:`0.5px solid ${WW.lavender}33`}}>
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.5 4.5H19l-4 3 1.5 4.5L12 12l-4.5 3 1.5-4.5L5 7.5h5.5L12 3z" fill={WW.lavender}/></svg>
                <span style={{fontSize:10,fontWeight:700,color:WW.lavender}}>WiseCoach tip</span>
              </div>
              <div style={{fontSize:11,color:'#5B3F9E',lineHeight:1.55}}>Focus on the mind-muscle connection. Feel the target muscle working on each rep.</div>
            </div>
          </div>

          {/* How to perform */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:8}}>How to perform</div>
            <div style={{fontSize:13,color:WW.text,lineHeight:1.65,marginBottom:12}}>{ex.desc}</div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {(ex.steps||[]).map((step,i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{width:20,height:20,borderRadius:10,background:col.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                    <span style={{fontSize:10,fontWeight:800,color:col.c}}>{i+1}</span>
                  </div>
                  <div style={{fontSize:12,color:WW.text,lineHeight:1.55,paddingTop:2}}>{step}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Common mistakes */}
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,fontWeight:700,color:WW.textSec,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Common Mistakes</div>
            {(ex.mistakes||[]).map((m,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:9}}>
                <div style={{width:18,height:18,borderRadius:9,background:'#FEE2E2',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                  <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2L2 10" stroke="#EF4444" strokeWidth="1.8" strokeLinecap="round"/></svg>
                </div>
                <div style={{fontSize:13,color:WW.text,lineHeight:1.55}}>{m}</div>
              </div>
            ))}
          </div>
        </div>

        {/* CTA */}
        <div style={{padding:'12px 18px 28px',borderTop:`0.5px solid ${WW.border}`,flexShrink:0,background:WW.card}}>
          <button onClick={()=>setAdded(true)} style={{
            width:'100%',height:52,borderRadius:14,border:'none',cursor:'pointer',
            background:added?'#10B981':WW.primary,
            color:'#fff',fontSize:16,fontWeight:700,
            boxShadow:added?'0 4px 14px rgba(16,185,129,0.35)':'0 4px 14px rgba(108,126,232,0.35)',
            transition:'all 0.3s',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          }}>
            {added?(
              <>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="rgba(255,255,255,0.25)"/><path d="M7.5 12l3 3 6-6" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Added to Routine
              </>
            ):(
              <>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.2" strokeLinecap="round"/></svg>
                Add to Routine
              </>
            )}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
