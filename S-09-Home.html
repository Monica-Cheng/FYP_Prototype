<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-09 Home</title>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #EDEEF5; font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .label { font-size: 12px; color: #6B6B80; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .phone-shell { width: 390px; height: 844px; border-radius: 52px; background: #0A0A12; padding: 5px; box-shadow: 0 30px 70px rgba(20,25,60,0.20), 0 0 0 1px rgba(0,0,0,0.12); position: relative; box-sizing: content-box; }
  .phone-inner { width: 390px; height: 844px; border-radius: 47px; overflow: hidden; background: #F7F8FF; position: relative; }
  .island { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 118px; height: 33px; border-radius: 20px; background: #000; z-index: 60; pointer-events: none; }
  .tweaks-panel { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #fff; border-radius: 14px; padding: 14px 16px 16px; box-shadow: 0 10px 40px rgba(20,25,60,0.18), 0 0 0 0.5px rgba(0,0,0,0.08); color: #3D3D5C; display: none; z-index: 100; }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; color: #8A8A9E; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; gap: 10px; }
  .tweak-row label { font-size: 13px; color: #3D3D5C; flex: 1; }
  .tweak-row input[type="checkbox"] { accent-color: #6C7EE8; }
  .tweak-row select { font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid #C8C8D8; background: #F7F8FF; color: #3D3D5C; }
  @keyframes fabPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="stage">
  <div class="label">S-09 · Home</div>
  <div class="phone-shell">
    <div class="island"></div>
    <div class="phone-inner" id="app"></div>
  </div>
</div>

<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row">
    <label>Home state</label>
    <select id="tw-state">
      <option value="plan">Plan active (today)</option>
      <option value="rest">Plan active (rest day)</option>
      <option value="missed">Missed workout</option>
      <option value="noplan">No plan yet</option>
    </select>
  </div>
  <div class="tweak-row"><label>Calorie goal on</label><input type="checkbox" id="tw-cal" checked/></div>
  <div class="tweak-row"><label>Unread notifications</label><input type="checkbox" id="tw-notif" checked/></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const WW = {
  bg: '#F7F8FF', card: '#FFFFFF', elevated: '#EEF0FB',
  primary: '#6C7EE8', primaryDark: '#2D3A8C',
  lavender: '#9B84E8', lavenderBg: '#F0EEFE', lavenderDark: '#7B5CB8', lavenderText: '#5B3F9E',
  teal: '#4BB8CC', tealBg: '#E0F4F8',
  text: '#3D3D5C', textSec: '#8A8A9E', border: '#C8C8D8',
  chipBg: '#E6EAFE', gold: '#F59E0B',
  shadow: '0 2px 8px rgba(45,58,140,0.06)',
};

// ─── Icons ───────────────────────────────────────────────────────────────────
const Ico = {
  home: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a0.5 0.5 0 01-0.5 0.5H15V15a1 1 0 00-1-1h-4a1 1 0 00-1 1v6.5H3.5A0.5 0.5 0 013 21V10.5z" fill={c} strokeLinejoin="round"/></svg>,
  plans: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx="0.5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx="0.5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx="0.8" fill={c}/></svg>,
  coach: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  progress: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  bell: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 8a6 6 0 0112 0c0 7 3 8 3 8H3s3-1 3-8z" stroke={c||WW.text} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/><path d="M10.3 20a1.9 1.9 0 003.4 0" stroke={c||WW.text} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  sparkle: c => <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill={c||'#fff'}/><circle cx="18.5" cy="5.5" r="1.2" fill={c||'#fff'}/></svg>,
  chevron: c => <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke={c||WW.textSec} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  flame: c => <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3s5 4 5 9a5 5 0 01-10 0c0-2 1-3 2-4-.5 1.5.5 3 2 3-.5-3 1-5 1-8z" fill={c||WW.teal} stroke={c||WW.teal} strokeWidth="1.2" strokeLinejoin="round"/></svg>,
  plus: c => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={c||'#fff'} strokeWidth="2.2" strokeLinecap="round"/></svg>,
};

// ─── Status bar ───────────────────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{ height: 47, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', fontSize: 15, fontWeight: 600, color: WW.text, flexShrink: 0 }}>
      <div style={{ paddingTop: 10 }}>9:41</div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', paddingTop: 10 }}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx="0.6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx="0.6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill={WW.text} opacity="0.4"/></svg>
      </div>
    </div>
  );
}

// ─── Bottom nav ───────────────────────────────────────────────────────────────
const NAV = [
  { id: 'home', label: 'Home', icon: Ico.home, href: 'S-09-Home.html' },
  { id: 'plans', label: 'Plans', icon: Ico.plans, href: 'S-10-Plans-Hub.html' },
  { id: 'coach', label: 'Coach', icon: Ico.coach, href: 'S-25-Coach-Chat.html' },
  { id: 'club', label: 'Club', icon: Ico.club, href: 'S-28-Club-Tab.html' },
  { id: 'progress', label: 'Progress', icon: Ico.progress, href: 'S-32-Progress-Tab.html' },
];
function BottomNav({ active }) {
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 84, background: WW.card, borderTop: '0.5px solid #E8EAF8', display: 'flex', zIndex: 30 }}>
      {NAV.map(n => {
        const isActive = n.id === active;
        const c = isActive ? WW.primary : WW.textSec;
        return (
          <a key={n.id} href={n.href} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, textDecoration: 'none', paddingBottom: 8 }}>
            {n.icon(c)}
            <span style={{ fontSize: 10, fontWeight: 600, color: c, letterSpacing: '0.1px' }}>{n.label}</span>
          </a>
        );
      })}
    </div>
  );
}

// ─── Calorie ring ─────────────────────────────────────────────────────────────
function CalorieRing({ burned = 420, goal = 600 }) {
  const r = 44, cx = 52, cy = 52, stroke = 7;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(burned / goal, 1);
  const gymKcal = 280, cardioKcal = 140, leftKcal = goal - burned;
  return (
    <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 18 }}>
      {/* Ring */}
      <div style={{ position: 'relative', width: 104, height: 104, flexShrink: 0 }}>
        <svg width="104" height="104" viewBox="0 0 104 104">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={WW.chipBg} strokeWidth={stroke}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={WW.primary} strokeWidth={stroke}
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
            transform={`rotate(-90 ${cx} ${cy})`}/>
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: WW.primaryDark, letterSpacing: '-0.5px', lineHeight: 1 }}>{burned}</div>
          <div style={{ fontSize: 10, color: WW.textSec, fontWeight: 600 }}>kcal</div>
        </div>
      </div>
      {/* Stats */}
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: WW.text, marginBottom: 2 }}>Today's energy</div>
        <div style={{ fontSize: 12, color: WW.textSec, marginBottom: 12 }}>Goal {goal} kcal</div>
        {[
          { label: 'Gym', val: gymKcal, color: WW.primary },
          { label: 'Cardio', val: cardioKcal, color: WW.teal },
          { label: 'Left', val: Math.max(0, leftKcal), color: WW.textSec },
        ].map(r => (
          <div key={r.label} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: 4, background: r.color, flexShrink: 0 }}/>
            <div style={{ fontSize: 12, color: WW.textSec, flex: 1 }}>{r.label}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: WW.text }}>{r.val} kcal</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Week calendar strip ──────────────────────────────────────────────────────
function WeekCalendar() {
  const days = [
    { d: 'S', state: 'completed' },
    { d: 'M', state: 'completed' },
    { d: 'T', state: 'completed' },
    { d: 'W', state: 'today' },
    { d: 'T', state: 'scheduled' },
    { d: 'F', state: 'rest' },
    { d: 'S', state: 'rest' },
  ];
  const styles = {
    completed: { bg: WW.teal, border: WW.teal, dot: '#fff' },
    today: { bg: 'transparent', border: WW.primary, dot: WW.primary },
    scheduled: { bg: 'transparent', border: WW.border, dot: WW.textSec },
    missed: { bg: 'transparent', border: '#F59E0B', dot: '#F59E0B' },
    rest: { bg: 'transparent', border: WW.border, dot: WW.border },
  };
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0 2px' }}>
      {days.map(({ d, state }, i) => {
        const s = styles[state];
        return (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: state === 'today' ? WW.primary : WW.textSec }}>{d}</div>
            <div style={{ width: 32, height: 32, borderRadius: 10, background: s.bg, border: `1.5px solid ${s.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: s.dot }}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Today plan card ──────────────────────────────────────────────────────────
function TodayPlanCard() {
  return (
    <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, overflow: 'hidden' }}>
      {/* Header strip */}
      <div style={{ background: WW.primaryDark, padding: '10px 16px 9px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: 'rgba(255,255,255,0.65)', letterSpacing: '0.8px' }}>TODAY · PUSH A</div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', fontWeight: 600 }}>Day 5 of 24</div>
      </div>
      <div style={{ padding: '14px 16px' }}>
        <div style={{ fontSize: 17, fontWeight: 800, color: WW.text, letterSpacing: '-0.2px', marginBottom: 8 }}>Chest, Shoulders & Triceps</div>
        {/* Stats */}
        <div style={{ display: 'flex', gap: 14, marginBottom: 12 }}>
          {[['45', 'min'], ['5', 'exercises'], ['~280', 'kcal']].map(([v, u]) => (
            <div key={u} style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: WW.text }}>{v}</span>
              <span style={{ fontSize: 11, color: WW.textSec }}>{u}</span>
            </div>
          ))}
        </div>
        {/* Exercise preview */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 14 }}>
          {['Bench Press · 4×8', 'Overhead Press · 3×10', 'Tricep Pushdown · 3×12'].map(ex => (
            <div key={ex} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ width: 5, height: 5, borderRadius: 3, background: WW.primary, flexShrink: 0 }}/>
              <div style={{ fontSize: 13, color: WW.textSec, fontWeight: 500 }}>{ex}</div>
            </div>
          ))}
          <div style={{ fontSize: 12, color: WW.textSec, paddingLeft: 13 }}>+2 more exercises</div>
        </div>
        <a href="S-17-Gym-Session-Active.html" style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          height: 46, borderRadius: 12, background: WW.primary,
          color: '#fff', fontSize: 15, fontWeight: 700, textDecoration: 'none',
          boxShadow: '0 3px 10px rgba(108,126,232,0.3)',
        }}>Start Workout</a>
      </div>
    </div>
  );
}

function RestDayCard() {
  return (
    <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '18px 18px', textAlign: 'center' }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>😴</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: WW.text, marginBottom: 6 }}>Rest Day</div>
      <div style={{ fontSize: 13, color: WW.textSec, lineHeight: 1.5, marginBottom: 14 }}>Recovery is part of the plan. Your next session is tomorrow — Legs A.</div>
      <a href="S-16-Tracked-Plan-Schedule.html" style={{ fontSize: 13, color: WW.primary, fontWeight: 700, textDecoration: 'none' }}>View Full Schedule →</a>
    </div>
  );
}

function MissedCard() {
  const [selected, setSelected] = React.useState('');
  const chips = ['Busy', 'Tired', 'Injured', 'Other'];
  return (
    <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '16px 16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
        <div style={{ width: 8, height: 8, borderRadius: 4, background: '#F59E0B' }}/>
        <div style={{ fontSize: 14, fontWeight: 700, color: WW.text }}>Looks like you missed a workout</div>
      </div>
      <div style={{ fontSize: 13, color: WW.textSec, marginBottom: 12 }}>What happened? We'll adjust your plan accordingly.</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {chips.map(c => (
          <button key={c} onClick={() => setSelected(c)} style={{
            padding: '7px 14px', borderRadius: 20,
            border: `1.5px solid ${selected === c ? '#F59E0B' : WW.border}`,
            background: selected === c ? '#FEF3C7' : WW.card,
            color: selected === c ? '#92400E' : WW.text,
            fontSize: 13, fontWeight: selected === c ? 700 : 500, cursor: 'pointer',
          }}>{c}</button>
        ))}
      </div>
      {selected && (
        <button style={{ marginTop: 12, width: '100%', height: 42, borderRadius: 12, background: WW.primary, color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer' }}>
          Log &amp; Continue Plan
        </button>
      )}
    </div>
  );
}

function NoPlanCard() {
  return (
    <div style={{ background: WW.lavenderBg, borderRadius: 16, border: `0.5px solid rgba(155,132,232,0.3)`, padding: '18px 18px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
        <div style={{ width: 32, height: 32, borderRadius: 10, background: WW.lavender, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {Ico.sparkle('#fff')}
        </div>
        <div style={{ fontSize: 15, fontWeight: 700, color: WW.lavenderDark }}>Welcome to WiseWorkout!</div>
      </div>
      <div style={{ fontSize: 13, color: WW.lavenderText, lineHeight: 1.55, marginBottom: 14 }}>
        Let's get you set up with a training plan. Answer a few questions and WiseCoach will match you with the perfect plan.
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <a href="S-14-Plan-Match.html" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 44, borderRadius: 12, background: WW.primary, color: '#fff', fontSize: 14, fontWeight: 700, textDecoration: 'none' }}>Take Plan Match Quiz</a>
        <div style={{ display: 'flex', gap: 8 }}>
          <a href="S-12-Explore-Plan-Catalog.html" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', height: 38, borderRadius: 10, border: `1.5px solid ${WW.primary}`, color: WW.primary, fontSize: 13, fontWeight: 700, textDecoration: 'none' }}>Explore Plans</a>
          <a href="S-11-Build-Custom-Routine.html" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', height: 38, borderRadius: 10, border: `1.5px solid ${WW.border}`, color: WW.text, fontSize: 13, fontWeight: 700, textDecoration: 'none' }}>Build Routine</a>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [homeState, setHomeState] = React.useState('plan');
  const [calGoal, setCalGoal] = React.useState(true);
  const [hasNotif, setHasNotif] = React.useState(true);

  React.useEffect(() => {
    ['tw-state', 'tw-cal', 'tw-notif'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (id === 'tw-state') el.addEventListener('change', e => setHomeState(e.target.value));
      if (id === 'tw-cal') { el.checked = true; el.addEventListener('change', e => setCalGoal(e.target.checked)); }
      if (id === 'tw-notif') { el.checked = true; el.addEventListener('change', e => setHasNotif(e.target.checked)); }
    });
    const panel = document.getElementById('tweaks');
    if (panel) panel.style.display = 'none';
    const btn = document.createElement('button');
    btn.textContent = '⚙';
    btn.style.cssText = 'position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,0.4)';
    btn.onclick = () => panel?.classList.toggle('open');
    document.body.appendChild(btn);
  }, []);

  return (
    <div style={{ width: '100%', height: '100%', background: WW.bg, display: 'flex', flexDirection: 'column', position: 'relative' }}>
      <StatusBar />

      {/* Top bar */}
      <div style={{ padding: '4px 20px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div>
          <div style={{ fontSize: 13, color: WW.textSec, fontWeight: 500 }}>Good morning</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: WW.text, letterSpacing: '-0.4px' }}>Marcus</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {/* Bell */}
          <div style={{ position: 'relative' }}>
            <div style={{ width: 40, height: 40, borderRadius: 20, background: WW.card, border: `0.5px solid ${WW.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: WW.shadow }}>
              {Ico.bell(WW.text)}
            </div>
            {hasNotif && <div style={{ position: 'absolute', top: 6, right: 6, width: 8, height: 8, borderRadius: 4, background: WW.primary, border: '1.5px solid #F7F8FF' }}/>}
          </div>
          {/* Avatar */}
          <a href="S-34-Profile.html?ref=S-09-Home.html" style={{
            width: 40, height: 40, borderRadius: 20, background: WW.primary,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 16, fontWeight: 800, color: '#fff', textDecoration: 'none',
            boxShadow: '0 2px 8px rgba(108,126,232,0.3)',
          }}>M</a>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px', paddingBottom: 100 }}>

        {/* WiseCoach card */}
        <a href="S-25-Coach-Chat.html" style={{ textDecoration: 'none', display: 'block', marginBottom: 12 }}>
          <div style={{ background: WW.lavenderBg, borderRadius: 16, borderLeft: `3px solid ${WW.lavender}`, border: `0.5px solid rgba(155,132,232,0.25)`, borderLeftWidth: 3, borderLeftColor: WW.lavender, borderLeftStyle: 'solid', padding: '13px 14px 13px 14px', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
            <div style={{ width: 30, height: 30, borderRadius: 15, background: WW.lavender, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              {Ico.sparkle('#fff')}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: WW.lavenderDark }}>WiseCoach</span>
                <span style={{ fontSize: 11, color: WW.textSec }}>· 8 min ago</span>
              </div>
              <div style={{ fontSize: 13.5, color: WW.lavenderText, lineHeight: 1.5, fontWeight: 500 }}>
                Great week so far! Your Push A volume is up 12% — shoulders are responding well. Ready to hit it again?
              </div>
            </div>
            <div style={{ flexShrink: 0, paddingTop: 6 }}>{Ico.chevron(WW.lavender)}</div>
          </div>
        </a>

        {/* Calorie ring or CTA */}
        <div style={{ marginBottom: 12 }}>
          {calGoal ? (
            <CalorieRing burned={420} goal={600}/>
          ) : (
            <a href="S-06-Onboarding-Goals.html" style={{ textDecoration: 'none', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '14px 16px' }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: WW.text }}>Set a calorie goal</div>
                <div style={{ fontSize: 12, color: WW.textSec, marginTop: 2 }}>Track your energy burn each day</div>
              </div>
              <div style={{ padding: '6px 14px', borderRadius: 10, background: WW.chipBg, color: WW.primary, fontSize: 13, fontWeight: 700 }}>Set up</div>
            </a>
          )}
        </div>

        {/* Streak & XP card */}
        <a href="S-32-Progress-Tab.html" style={{ textDecoration: 'none', display: 'block', marginBottom: 12 }}>
          <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '13px 16px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                {Ico.flame(WW.teal)}
                <div>
                  <span style={{ fontSize: 17, fontWeight: 800, color: WW.text }}>12</span>
                  <span style={{ fontSize: 13, color: WW.textSec, fontWeight: 500 }}> day streak</span>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ padding: '3px 10px', borderRadius: 10, background: WW.chipBg }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: WW.primary }}>Lvl 7</span>
                </div>
                <div style={{ fontSize: 12, color: WW.textSec, fontWeight: 500 }}>2,340 XP</div>
              </div>
            </div>
            {/* XP bar */}
            <div style={{ height: 6, borderRadius: 3, background: WW.chipBg, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: '62%', borderRadius: 3, background: WW.primary }}/>
            </div>
            <div style={{ fontSize: 11, color: WW.textSec, marginTop: 4 }}>660 XP to Level 8</div>
          </div>
        </a>

        {/* Weekly calendar */}
        <div style={{ background: WW.card, borderRadius: 16, border: `0.5px solid ${WW.border}`, boxShadow: WW.shadow, padding: '13px 14px', marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: WW.textSec, letterSpacing: '0.4px', textTransform: 'uppercase', marginBottom: 10 }}>This Week</div>
          <WeekCalendar />
        </div>

        {/* Today's plan card (state-dependent) */}
        {homeState === 'plan' && <TodayPlanCard/>}
        {homeState === 'rest' && <RestDayCard/>}
        {homeState === 'missed' && <MissedCard/>}
        {homeState === 'noplan' && <NoPlanCard/>}
      </div>

      {/* FAB */}
      <a href="S-24-Manual-Activity-Log.html" style={{
        position: 'absolute', right: 18, bottom: 96, width: 52, height: 52, borderRadius: 26,
        background: WW.primary, display: 'flex', alignItems: 'center', justifyContent: 'center',
        textDecoration: 'none', boxShadow: '0 4px 16px rgba(108,126,232,0.45)',
        zIndex: 25, animation: 'fabPop 0.3s cubic-bezier(.2,.8,.2,1) both',
      }}>
        {Ico.plus('#fff')}
      </a>

      <BottomNav active="home"/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
