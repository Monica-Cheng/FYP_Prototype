/* ── SaveButton ───────────────────────────────────────────── */
function SaveBtn({saved,onToggle}){
  return(
    <button onClick={e=>{e.preventDefault();e.stopPropagation();onToggle();}} style={{
      height:24,padding:'0 9px',borderRadius:7,cursor:'pointer',fontSize:10,fontWeight:700,

      {saved&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>}
      {saved?'Saved':'Save'}

  );
}

/* ── Category section with sub-chips ─────────────────────── */
function CategorySection({title,allPlans,subsList,saved,onSave}){
  const [sub,setSub]=React.useState(subsList[0]);
  const visible=allPlans.filter(p=>{
    if(sub==='All'||sub===subsList[0])return true;
    if(sub==='At Home')return p.sub==='Bodyweight'||p.sub==='Dumbbells'||p.sub==='Bands';
    return p.sub===sub;
  });
  return(
    <div style={{marginBottom:22}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.2px'}}>{title}</div>
        <a href="#" style={{fontSize:12,color:WW.primary,fontWeight:700,textDecoration:'none'}}>See all</a>
      </div>
      <div style={{display:'flex',gap:7,overflowX:'auto',padding:'0 16px 10px',scrollbarWidth:'none'}}>
        {subsList.map(s=>(
          <button key={s} onClick={()=>setSub(s)} style={{
            padding:'5px 13px',borderRadius:16,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,
            border:`1.5px solid ${sub===s?WW.primary:WW.border}`,
            background:sub===s?WW.chipBg:WW.card,
            color:sub===s?WW.primary:WW.textSec,
            transition:'all 0.15s',
          }}>{s}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:10,overflowX:'auto',padding:'2px 16px 6px',scrollbarWidth:'none'}}>
        {visible.length>0?visible.map(p=>(
          <MiniCard key={p.id} plan={p} saved={saved.has(p.id)} onSave={()=>onSave(p.id)}/>
        )):(
          <div style={{padding:'20px',color:WW.textSec,fontSize:13}}>No plans in this category.</div>
        )}
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────── */
function App(){
  const [search,setSearch]=React.useState('');
  const [filters,setFilters]=React.useState(DEFAULT_FILTERS);
  const [activeDim,setActiveDim]=React.useState(null);
  const [saved,setSaved]=React.useState(new Set([1,2]));

  const toggleSave=id=>setSaved(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const hasFilter=search.length>0||Object.entries(filters).some(([k,v])=>v!==DEFAULT_FILTERS[k]);

  const filtered=PLANS.filter(p=>{
    const q=search.toLowerCase();
    if(q&&!p.name.toLowerCase().includes(q)&&!p.goal.toLowerCase().includes(q)&&!p.coach.toLowerCase().includes(q))return false;
    if(filters.level!=='All'&&p.level!==filters.level)return false;
    if(filters.goal!=='All'&&p.goal!==filters.goal)return false;
    if(filters.equipment!=='Any'){
      const sub=filters.equipment;
      if(!p.sub.toLowerCase().includes(sub.toLowerCase())&&p.sub!==sub)return false;
    }
    if(filters.sport!=='All'&&p.sport!==filters.sport)return false;
    return true;
  });

  const featuredPlans=PLANS.filter(p=>FEATURED_IDS.includes(p.id));
  const gymPlans=PLANS.filter(p=>p.sport==='Gym');
  const runPlans=PLANS.filter(p=>p.sport==='Running');

  const clearFilters=()=>{setFilters(DEFAULT_FILTERS);setSearch('');setActiveDim(null);};

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>

      {/* Header */}
      <div style={{padding:'2px 16px 10px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{fontSize:24,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.5px'}}>Explore</div>
          <a href="S-10-Plans-Hub.html" style={{width:34,height:34,borderRadius:17,background:'rgba(61,61,92,.07)',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke={WW.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </a>
        </div>
        {/* Search */}
        <div style={{position:'relative',marginBottom:10}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)'}}><circle cx="11" cy="11" r="7" stroke={WW.textSec} strokeWidth="1.8"/><path d="M16.5 16.5l3.5 3.5" stroke={WW.textSec} strokeWidth="1.8" strokeLinecap="round"/></svg>
          <input placeholder="Search plans, goals, coaches…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:'100%',height:40,borderRadius:12,border:`1px solid ${WW.border}`,background:WW.card,fontSize:13,color:WW.text,paddingLeft:34,paddingRight:12,boxSizing:'border-box',outline:'none',fontFamily:'inherit'}}/>
        </div>

        {/* 4-dim filter bar */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:activeDim?6:0,scrollbarWidth:'none'}}>
          {FILTER_DIMS.map(dim=>{
            const active=filters[dim.id]!==DEFAULT_FILTERS[dim.id];
            const expanded=activeDim===dim.id;
            return(
              <button key={dim.id} onClick={()=>setActiveDim(expanded?null:dim.id)} style={{
                padding:'6px 11px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,
                border:`1.5px solid ${(active||expanded)?WW.primary:WW.border}`,
                background:(active||expanded)?WW.chipBg:WW.card,
                color:(active||expanded)?WW.primary:WW.textSec,
                display:'flex',alignItems:'center',gap:4,transition:'all 0.15s',
              }}>
                {active?filters[dim.id]:dim.label}
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style={{transform:expanded?'rotate(180deg)':'',transition:'transform 0.2s'}}><path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>
              </button>
            );
          })}
          {hasFilter&&(
            <button onClick={clearFilters} style={{padding:'6px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,border:`1.5px solid #EF4444`,background:'#FEE2E2',color:'#EF4444'}}>
              Clear ×
            </button>
          )}
        </div>
        {/* Expanded dim options */}
        {activeDim&&(()=>{
          const dim=FILTER_DIMS.find(d=>d.id===activeDim);
          return(
            <div style={{display:'flex',gap:6,overflowX:'auto',paddingTop:8,paddingBottom:2,scrollbarWidth:'none'}}>
              {dim.options.map(opt=>{
                const sel=filters[activeDim]===opt;
                return(
                  <button key={opt} onClick={()=>{setFilters(f=>({...f,[activeDim]:opt}));setActiveDim(null);}} style={{
                    padding:'5px 13px',borderRadius:16,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,
                    border:`1.5px solid ${sel?WW.primary:WW.border}`,
                    background:sel?WW.primary:WW.card,
                    color:sel?'#fff':WW.textSec,
                  }}>{opt}</button>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* Scrollable body */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:92,scrollbarWidth:'none'}}>

        {hasFilter?(
          /* ── Filtered results ── */
          <div style={{padding:'4px 16px'}}>
            <div style={{fontSize:12,color:WW.textSec,fontWeight:600,marginBottom:12}}>{filtered.length} plan{filtered.length!==1?'s':''} found</div>
            {filtered.length===0?(
              <div style={{textAlign:'center',padding:'40px 20px'}}>
                <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                <div style={{fontSize:15,fontWeight:700,color:WW.primaryDark,marginBottom:6}}>No plans match</div>
                <div style={{fontSize:13,color:WW.textSec,lineHeight:1.5}}>Try adjusting your filters or search term.</div>
                <button onClick={clearFilters} style={{marginTop:16,padding:'10px 22px',borderRadius:12,background:WW.primary,color:'#fff',border:'none',fontSize:14,fontWeight:700,cursor:'pointer'}}>Clear Filters</button>
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {filtered.map(p=><GridCard key={p.id} plan={p} saved={saved.has(p.id)} onSave={()=>toggleSave(p.id)}/>)}
              </div>
            )}
          </div>
        ):(
          /* ── Browse mode ── */
          <>
            {/* Featured plans */}
            <div style={{marginBottom:22}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 16px 10px'}}>
                <div style={{fontSize:15,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.2px'}}>Featured</div>
                <a href="#" style={{fontSize:12,color:WW.primary,fontWeight:700,textDecoration:'none'}}>See all</a>
              </div>
              <div style={{display:'flex',gap:12,overflowX:'auto',padding:'2px 16px 6px',scrollbarWidth:'none'}}>
                {featuredPlans.map(p=><FeaturedCard key={p.id} plan={p} saved={saved.has(p.id)} onSave={()=>toggleSave(p.id)}/>)}
              </div>
            </div>

            {/* Gym plans */}
            <CategorySection title="Gym Plans" allPlans={gymPlans} subsList={GYM_SUBS} saved={saved} onSave={toggleSave}/>

            {/* Running plans */}
            <CategorySection title="Running Plans" allPlans={runPlans} subsList={RUN_SUBS} saved={saved} onSave={toggleSave}/>

            {/* Community Routines */}
            <div style={{padding:'0 16px',marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:15,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.2px'}}>Popular Routines</div>
                <a href="#" style={{fontSize:12,color:WW.primary,fontWeight:700,textDecoration:'none'}}>See all</a>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {ROUTINES.map(r=><RoutineCard key={r.id} r={r}/>)}
              </div>
            </div>
          </>
        )}
      </div>

      <BottomNav active="plans"/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
