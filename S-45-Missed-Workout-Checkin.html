<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #edeef5;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }
      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .lbl {
        font-size: 12px;
        color: #6b6b80;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        font-weight: 600;
      }
      .phone-shell {
        width: 390px;
        height: 844px;
        border-radius: 52px;
        background: #0a0a12;
        padding: 5px;
        box-shadow:
          0 30px 70px rgba(20, 25, 60, 0.2),
          0 0 0 1px rgba(0, 0, 0, 0.12);
        position: relative;
        box-sizing: content-box;
      }
      .phone-inner {
        width: 390px;
        height: 844px;
        border-radius: 47px;
        overflow: hidden;
        background: #f7f8ff;
        position: relative;
      }
      .island {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 118px;
        height: 33px;
        border-radius: 20px;
        background: #000;
        z-index: 60;
        pointer-events: none;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="lbl">S-45 · Missed Workout Check-in</div>
      <div class="phone-shell">
        <div class="island"></div>
        <div class="phone-inner" id="app"></div>
      </div>
    </div>

      crossorigin="anonymous"

        const paths = Array.isArray(p) ? p : [p];
        return (
          <svg
            width={size}
            height={size}

          weekday: "short",
          day: "numeric",
          month: "short",

          <div

              display: "inline-flex",

              background: WW.tealBg,

              onClick={() => setDays((d) => Math.max(min, d - 1))}
              style={{
                background: "none",
                border: "none",
                cursor: "pointer",
                padding: 4,
              }}
            >
              <Icon name="minus-circle" size={22} color={WW.primary} />
            </button>
            <span
              style={{
                fontSize: 20,
                fontWeight: 700,
                color: WW.primaryDark,
                minWidth: 24,
                textAlign: "center",

            >
              {days}

            <button
              onClick={() => setDays((d) => Math.min(max, d + 1))}
              style={{
                background: "none",
                border: "none",
                cursor: "pointer",
                padding: 4,
              }}
            >
              <Icon name="plus-circle" size={22} color={WW.primary} />

        const [selected, setSelected] = React.useState(null);
        const [showCompress, setShowCompress] = React.useState(false);
        const [showBreak, setShowBreak] = React.useState(false);
        const [toast, setToast] = React.useState(null);
        const [demoId, setDemoId] = React.useState(null);

        function showToastMsg(msg) {
          setToast(msg);
          setTimeout(() => setToast(null), 2500);
        }

        function pickReason(id) {
          setSelected(id);
          setDemoId(id);
        }
        function pickDemo(id) {
          setSelected(id);
          setDemoId(id);
        }

        function goBackToChoices() {
          setSelected(null);
          setDemoId(null);
        }

        const active = demoId || selected;

        function ResponseCard({ id }) {
          if (id === "busy")
            return (
              <ResponseBusy
                onCompress={() => setShowCompress(true)}
                onBreak={() => setShowBreak(true)}
              />
            );
          if (id === "sick") return <ResponseSick />;
          if (id === "injured") return <ResponseInjured />;
          if (id === "rest") return <ResponseRest />;
          if (id === "skip") return <ResponseSkip />;
          return null;
        }

        return (
          <div
            style={{
              width: "100%",
              height: "100%",
              background: "rgba(26,26,26,0.45)",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              fontFamily: "'Inter',system-ui,sans-serif",
              position: "relative",
            }}
          >
            {/* Floating card */}
            <div
              style={{
                width: "calc(100% - 32px)",
                background: WW.card,
                borderRadius: 20,
                boxShadow: "0 8px 32px rgba(0,0,0,0.18)",
                maxHeight: "85%",
                display: "flex",
                flexDirection: "column",
                overflow: "hidden",
                position: "relative",
              }}
            >
              {/* Header */}
              <div style={{ padding: "16px 16px 12px", flexShrink: 0 }}>
                {!active ? (
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "flex-end",
                      marginBottom: 12,
                    }}
                  >
                    <span style={{ fontSize: 11, color: WW.textSec }}>
                      Just now
                    </span>
                  </div>
                ) : (
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      marginBottom: 10,
                    }}
                  >
                    <button
                      onClick={goBackToChoices}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        width: 32,
                        height: 32,
                        borderRadius: 16,
                        background: WW.elevated,
                        border: "none",
                        cursor: "pointer",
                        padding: 0,
                      }}
                    >
                      <Icon name="chevron-left" size={18} color={WW.textSec} />
                    </button>
                  </div>
                )}
                <div
                  style={{
                    fontSize: 15,
                    color: WW.text,
                    lineHeight: 1.4,
                    marginBottom: 4,
                  }}
                >
                  Looks like you missed your Legs A session on Wednesday.
                </div>
                <div
                  style={{
                    fontSize: 15,
                    fontWeight: 600,
                    color: WW.primaryDark,
                  }}
                >
                  What happened?
                </div>
              </div>

              {/* Dismiss */}
              <button
                onClick={() => window.history.back()}
                style={{
                  position: "absolute",
                  top: 14,
                  right: 14,
                  background: "none",
                  border: "none",
                  cursor: "pointer",
                  padding: 4,
                }}
              >
                <Icon name="x" size={18} color={WW.border} />
              </button>

              {/* Options or response */}
              <div
                style={{ flex: 1, overflowY: "auto", padding: "0 16px 16px" }}
              >
                {!active ? (
                  <div
                    style={{ display: "flex", flexDirection: "column", gap: 8 }}
                  >
                    {REASONS.map((r) => (
                      <button
                        key={r.id}
                        onClick={() => pickReason(r.id)}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 12,
                          padding: "14px",
                          background: WW.card,
                          borderRadius: 12,
                          border: `1px solid ${WW.border}`,
                          cursor: "pointer",
                          fontFamily: "inherit",
                          textAlign: "left",
                          width: "100%",
                        }}
                      >
                        <div
                          style={{
                            width: 36,
                            height: 36,
                            borderRadius: 10,
                            background: r.iconBg,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            flexShrink: 0,
                          }}
                        >
                          <Icon name={r.icon} size={18} color="#fff" />
                        </div>
                        <div style={{ flex: 1 }}>
                          <div
                            style={{
                              fontSize: 14,
                              fontWeight: 600,
                              color: WW.text,
                            }}
                          >
                            {r.label}
                          </div>
                          <div
                            style={{
                              fontSize: 11,
                              color: WW.textSec,
                              marginTop: 2,
                            }}
                          >
                            {r.sub}
                          </div>
                        </div>
                        <Icon
                          name="chevron-right"
                          size={14}
                          color={WW.border}
                        />
                      </button>
                    ))}
                  </div>
                ) : (
                  <ResponseCard id={active} />
                )}
              </div>
            </div>

            {/* Demo switcher */}
            <div style={{ marginTop: 14, textAlign: "center" }}>
              <div
                style={{
                  fontSize: 10,
                  color: "rgba(255,255,255,0.4)",
                  marginBottom: 6,
                }}
              >
                Demo: tap to preview each response
              </div>
              <div
                style={{
                  display: "flex",
                  gap: 6,
                  flexWrap: "wrap",
                  justifyContent: "center",
                }}
              >
                {DEMO_IDS.map((id, i) => (
                  <button
                    key={id}
                    onClick={() => pickDemo(id)}
                    style={{
                      padding: "4px 10px",
                      borderRadius: 12,
                      border: "none",
                      background: active === id ? WW.primary : "#2A2A3A",
                      color: active === id ? "#fff" : "rgba(255,255,255,0.6)",
                      fontSize: 11,
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                  >
                    {DEMO_LABELS[i]}
                  </button>
                ))}
                <button
                  onClick={goBackToChoices}
                  style={{
                    padding: "4px 10px",
                    borderRadius: 12,
                    border: "none",
                    background: "#2A2A3A",
                    color: "rgba(255,255,255,0.5)",
                    fontSize: 11,
                    cursor: "pointer",
                    fontFamily: "inherit",
                  }}
                >
                  Reset
                </button>
              </div>
            </div>

            {/* Compress mini-modal */}
            <div
              style={{
                position: "absolute",
                top: 0,
                left: 0,
                right: 0,
                bottom: 0,
                zIndex: 50,
                pointerEvents: showCompress ? "auto" : "none",
              }}
            >
              <div
                onClick={() => setShowCompress(false)}
                style={{
                  position: "absolute",
                  top: 0,
                  left: 0,
                  right: 0,
                  bottom: 0,
                  background: "rgba(26,26,26,0.5)",
                  opacity: showCompress ? 1 : 0,
                  transition: "opacity .3s",
                }}
              />
              <div
                style={{
                  position: "absolute",
                  bottom: 0,
                  left: 0,
                  right: 0,
                  background: WW.card,
                  borderRadius: "20px 20px 0 0",
                  transform: showCompress
                    ? "translateY(0)"
                    : "translateY(100%)",
                  transition: "transform .3s ease-out",
                  padding: "12px 20px 28px",
                }}
              >
                <div
                  style={{
                    width: 32,
                    height: 4,
                    borderRadius: 2,
                    background: "#E8EAF8",
                    margin: "0 auto 16px",
                  }}
                />
                <div
                  style={{
                    fontSize: 16,
                    fontWeight: 600,
                    color: WW.primaryDark,
                    marginBottom: 4,
                  }}
                >
                  Compress Workout
                </div>
                <div
                  style={{
                    fontSize: 13,
                    color: WW.textSec,
                    marginBottom: 16,
                    lineHeight: 1.4,
                  }}
                >
                  Removes 2 accessory exercises (Lateral Raise, Tricep Pushdown)
                  to save ~12 minutes.
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button
                    onClick={() => setShowCompress(false)}
                    style={{
                      flex: 1,
                      height: 48,
                      borderRadius: 12,
                      border: `1.5px solid ${WW.primary}`,
                      background: "transparent",
                      color: WW.primary,
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                  >
                    Cancel
                  </button>
                  <button
                    onClick={() => {
                      setShowCompress(false);
                      showToastMsg("Session compressed — 2 exercises removed.");
                    }}
                    style={{
                      flex: 1,
                      height: 48,
                      borderRadius: 12,
                      border: "none",
                      background: WW.primary,
                      color: "#fff",
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                  >
                    Confirm
                  </button>
                </div>
              </div>
            </div>

            {/* Break mini-modal */}
            <div
              style={{
                position: "absolute",
                top: 0,
                left: 0,
                right: 0,
                bottom: 0,
                zIndex: 50,
                pointerEvents: showBreak ? "auto" : "none",
              }}
            >
              <div
                onClick={() => setShowBreak(false)}
                style={{
                  position: "absolute",
                  top: 0,
                  left: 0,
                  right: 0,
                  bottom: 0,
                  background: "rgba(26,26,26,0.5)",
                  opacity: showBreak ? 1 : 0,
                  transition: "opacity .3s",
                }}
              />
              <div
                style={{
                  position: "absolute",
                  bottom: 0,
                  left: 0,
                  right: 0,
                  background: WW.card,
                  borderRadius: "20px 20px 0 0",
                  transform: showBreak ? "translateY(0)" : "translateY(100%)",
                  transition: "transform .3s ease-out",
                  padding: "12px 20px 28px",
                }}
              >
                <div
                  style={{
                    width: 32,
                    height: 4,
                    borderRadius: 2,
                    background: "#E8EAF8",
                    margin: "0 auto 16px",
                  }}
                />
                <div
                  style={{
                    fontSize: 16,
                    fontWeight: 600,
                    color: WW.primaryDark,
                    marginBottom: 4,
                  }}
                >
                  Start Break Mode
                </div>
                <div
                  style={{
                    fontSize: 13,
                    color: WW.textSec,
                    marginBottom: 16,
                    lineHeight: 1.4,
                  }}
                >
                  Pause your plan for 1–14 days. Progress is saved and
                  notifications pause.
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button
                    onClick={() => setShowBreak(false)}
                    style={{
                      flex: 1,
                      height: 48,
                      borderRadius: 12,
                      border: `1.5px solid ${WW.lavender}`,
                      background: "transparent",
                      color: WW.lavender,
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                  >
                    Cancel
                  </button>
                  <button
                    onClick={() => {
                      setShowBreak(false);
                      showToastMsg("Break Mode active. Plan paused.");
                    }}
                    style={{
                      flex: 1,
                      height: 48,
                      borderRadius: 12,
                      border: "none",
                      background: WW.lavender,
                      color: "#fff",
                      fontSize: 14,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                  >
                    Start Break
                  </button>
                </div>
              </div>
            </div>

            {/* Toast */}
            {toast && (
              <div
                style={{
                  position: "absolute",
                  bottom: 140,
                  left: "50%",
                  transform: "translateX(-50%)",
                  background: "#1C1C2E",
                  color: "#fff",
                  padding: "10px 16px",
                  borderRadius: 20,
                  fontSize: 13,
                  fontWeight: 500,
                  whiteSpace: "nowrap",
                  zIndex: 80,
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                  animation: "toastIn .3s ease",
                }}
              >
                <Icon name="check-circle" size={14} color="#22C55E" />
                {toast}
              </div>
            )}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
