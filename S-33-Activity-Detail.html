<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiseWorkout · S-33 Activity Detail</title>
<style>
  :root{color-scheme:light}html,body{margin:0;padding:0;background:#EDEEF5;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px}
  .label{font-size:12px;color:#6B6B80;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
  .phone-shell{width:390px;height:844px;border-radius:52px;background:#0A0A12;padding:5px;box-shadow:0 30px 70px rgba(20,25,60,.20),0 0 0 1px rgba(0,0,0,.12);position:relative;box-sizing:content-box}
  .phone-inner{width:390px;height:844px;border-radius:47px;overflow:hidden;background:#F7F8FF;position:relative}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:33px;border-radius:20px;background:#000;z-index:60;pointer-events:none}
  .tweaks-panel{position:fixed;bottom:20px;right:20px;width:240px;background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 10px 40px rgba(20,25,60,.18),0 0 0 .5px rgba(0,0,0,.08);color:#3D3D5C;display:none;z-index:100}
  .tweaks-panel.open{display:block}.tweaks-panel h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#8A8A9E}
  .tweak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:10px}
  .tweak-row label{font-size:13px;color:#3D3D5C;flex:1}.tweak-row input[type="checkbox"]{accent-color:#6C7EE8}
</style>
</head><body>
<div class="stage">
  <div class="label">S-33 · Activity Detail</div>
  <div class="phone-shell"><div class="island"></div><div class="phone-inner" id="app"></div></div>
</div>
<div class="tweaks-panel" id="tweaks">
  <h3>State</h3>
  <div class="tweak-row"><label>Gym session (vs Cardio)</label><input type="checkbox" id="tw-gym"/></div>
  <div class="tweak-row"><label>Outdoor (GPS map)</label><input type="checkbox" id="tw-outdoor" checked/></div>
  <div class="tweak-row"><label>Manually logged</label><input type="checkbox" id="tw-manual"/></div>
</div>
<button onclick="document.getElementById('tweaks').classList.toggle('open')" style="position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;background:#6C7EE8;color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(108,126,232,.4);z-index:200">⚙</button>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const WW={bg:'#F7F8FF',card:'#FFFFFF',elevated:'#EEF0FB',primary:'#6C7EE8',primaryDark:'#2D3A8C',lavender:'#9B84E8',lavenderBg:'#F0EEFE',teal:'#4BB8CC',tealBg:'#E0F4F8',text:'#3D3D5C',textSec:'#8A8A9E',border:'#C8C8D8',chipBg:'#E6EAFE',gold:'#F59E0B',shadow:'0 2px 8px rgba(45,58,140,.06)'};

function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}

const SPLITS=[
  {km:1,pace:'5:12'},{km:2,pace:'5:08'},{km:3,pace:'5:20'},{km:4,pace:'5:05'},{km:5,pace:'5:18'},
  {km:6,pace:'5:02'},{km:7,pace:'5:15'},{km:8,pace:'4:58'},
];
const HR_PTS=[128,135,142,148,155,152,158,161,155,149,142,138,145,150,158,162,155,148,140,135];
const HR_ZONES=[{top:170,bot:155,color:'#EF4444'},{top:155,bot:135,color:'#F59E0B'},{top:135,bot:115,color:'#10B981'}];

const GYM_EXERCISES=[
  {name:'Bench Press',muscle:'Chest',sets:[{w:60,r:12,done:true},{w:70,r:10,done:true},{w:75,r:8,done:true},{w:75,r:7,done:true}],isPB:true},
  {name:'Overhead Press',muscle:'Shoulders',sets:[{w:45,r:10,done:true},{w:50,r:8,done:true},{w:50,r:8,done:true}],isPB:false},
  {name:'Tricep Pushdown',muscle:'Triceps',sets:[{w:25,r:15,done:true},{w:25,r:12,done:true},{w:30,r:10,done:true}],isPB:false},
  {name:'Lateral Raise',muscle:'Shoulders',sets:[{w:12,r:15,done:true},{w:12,r:14,done:true},{w:12,r:12,done:true}],isPB:false},
];

function HRGraph({height=80}){
  const min=110,max=175;
  const w=320,h=height;
  const pts=HR_PTS.map((v,i)=>({x:i*(w/(HR_PTS.length-1)),y:h-((v-min)/(max-min)*h)}));
  const path=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const fill=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ')+`L${pts[pts.length-1].x},${h} L0,${h} Z`;
  return(
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{height}}>
      {HR_ZONES.map((z,i)=><rect key={i} x={0} y={h-((z.top-min)/(max-min)*h)} width={w} height={((z.top-z.bot)/(max-min)*h)} fill={z.color} opacity=".15"/>)}
      <path d={fill} fill={WW.primary} opacity=".1"/>
      <path d={path} stroke={WW.primary} strokeWidth="2" fill="none" strokeLinejoin="round"/>
    </svg>
  );
}

function CardBlock({children,style={}}){
  return <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,padding:'14px 16px',marginBottom:12,boxShadow:WW.shadow,...style}}>{children}</div>;
}

function SectionTitle({children}){
  return <div style={{fontSize:13,fontWeight:700,color:WW.primaryDark,marginBottom:10}}>{children}</div>;
}

function App(){
  const [isGym,setIsGym]=React.useState(false);
  const [isOutdoor,setIsOutdoor]=React.useState(true);
  const [isManual,setIsManual]=React.useState(false);
  const [wiseOpen,setWiseOpen]=React.useState(false);
  const [deleteModal,setDeleteModal]=React.useState(false);

  React.useEffect(()=>{
    const cb=()=>{
      setIsGym(document.getElementById('tw-gym')?.checked??false);
      setIsOutdoor(document.getElementById('tw-outdoor')?.checked??true);
      setIsManual(document.getElementById('tw-manual')?.checked??false);
    };
    document.querySelectorAll('#tweaks input').forEach(el=>el.addEventListener('change',cb));
    cb();
  },[]);

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:WW.bg,position:'relative'}}>
      <StatusBar/>

      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',padding:'10px 18px 14px',background:WW.card,borderBottom:'0.5px solid #E8EAF8',gap:12,flexShrink:0}}>
        <a href="S-32-Progress-Tab.html" style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,borderRadius:10,background:WW.elevated,textDecoration:'none',flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={WW.primaryDark} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </a>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:800,color:WW.primaryDark}}>{isGym?'Upper Body Push':'Morning Run'}</div>
          <div style={{fontSize:12,color:WW.textSec}}>Sunday, 11 May 2026</div>
        </div>
        {isManual&&<span style={{background:'#F2F2F7',color:WW.textSec,fontSize:11,fontWeight:700,padding:'4px 8px',borderRadius:8}}>Manual</span>}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 18px 20px'}}>

        {/* ---- CARDIO VIEW ---- */}
        {!isGym&&(
          <>
            {/* Route map card — outdoor only */}
            {isOutdoor&&(
              <CardBlock style={{padding:0,overflow:'hidden'}}>
                <svg width="100%" height="140" viewBox="0 0 354 140" style={{display:'block',background:'#E8EDF0'}}>
                  {/* Grid */}
                  {[28,56,84,112].map(y=><line key={y} x1={0} y1={y} x2={354} y2={y} stroke="#D8E2E8" strokeWidth=".5"/>)}
                  {[70,140,210,280].map(x=><line key={x} x1={x} y1={0} x2={x} y2={140} stroke="#D8E2E8" strokeWidth=".5"/>)}
                  {/* Roads */}
                  <path d="M20,70 Q80,50 140,70 Q200,90 260,60 Q310,40 340,70" stroke="#C8D4DA" strokeWidth="8" fill="none" strokeLinecap="round"/>
                  <path d="M70,20 Q90,70 80,120" stroke="#C8D4DA" strokeWidth="6" fill="none" strokeLinecap="round"/>
                  {/* Route */}
                  <path d="M60,90 Q100,60 150,75 Q200,90 240,55 Q275,30 310,60 Q330,75 320,100 Q300,120 260,115 Q200,110 150,120 Q100,125 60,90" stroke={WW.primary} strokeWidth="3" fill="none" strokeLinejoin="round"/>
                  {/* Start/end */}
                  <circle cx="60" cy="90" r="6" fill="#10B981"/>
                  <circle cx="60" cy="90" r="3" fill="#fff"/>
                  <circle cx="320" cy="100" r="6" fill={WW.primary}/>
                  <circle cx="320" cy="100" r="3" fill="#fff"/>
                </svg>
              </CardBlock>
            )}

            {/* Stat row */}
            <CardBlock>
              <div style={{display:'flex',gap:0}}>
                {[{l:'Distance',v:'8.1 km'},{l:'Duration',v:'44:12'},{l:'Avg Pace',v:"5'28\"/km"},{l:'Calories',v:'480 kcal'}].map((s,i,arr)=>(
                  <div key={s.l} style={{flex:1,textAlign:'center',borderRight:i<arr.length-1?`0.5px solid ${WW.border}`:'none',paddingRight:i<arr.length-1?8:0,paddingLeft:i>0?8:0}}>
                    <div style={{fontSize:16,fontWeight:800,color:WW.primaryDark}}>{s.v}</div>
                    <div style={{fontSize:10,color:WW.textSec,marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </CardBlock>

            {/* Elevation — outdoor only */}
            {isOutdoor&&(
              <CardBlock>
                <SectionTitle>Elevation</SectionTitle>
                <div style={{display:'flex',gap:16}}>
                  <div><div style={{fontSize:18,fontWeight:800,color:'#10B981'}}>↑ 124 m</div><div style={{fontSize:11,color:WW.textSec}}>Gain</div></div>
                  <div><div style={{fontSize:18,fontWeight:800,color:'#EF4444'}}>↓ 98 m</div><div style={{fontSize:11,color:WW.textSec}}>Loss</div></div>
                  <div><div style={{fontSize:18,fontWeight:800,color:WW.text}}>26 m</div><div style={{fontSize:11,color:WW.textSec}}>Net gain</div></div>
                </div>
              </CardBlock>
            )}

            {/* Splits — outdoor only */}
            {isOutdoor&&(
              <CardBlock>
                <SectionTitle>Split Pace per km</SectionTitle>
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  <div style={{display:'flex',padding:'4px 0',borderBottom:`0.5px solid ${WW.border}`}}>
                    <span style={{flex:1,fontSize:11,fontWeight:700,color:WW.textSec}}>KM</span>
                    <span style={{flex:2,fontSize:11,fontWeight:700,color:WW.textSec}}>Pace</span>
                    <span style={{flex:3,fontSize:11,fontWeight:700,color:WW.textSec}}>Bar</span>
                  </div>
                  {SPLITS.map((s,i)=>{
                    const paceS=parseInt(s.pace.split(':')[0])*60+parseInt(s.pace.split(':')[1]);
                    const fastest=288,slowest=320;
                    const pct=Math.max(0,Math.min(100,100-(paceS-fastest)/(slowest-fastest)*100));
                    return(
                      <div key={i} style={{display:'flex',alignItems:'center',padding:'5px 0',borderBottom:i<SPLITS.length-1?`0.5px solid ${WW.border}`:'none'}}>
                        <span style={{flex:1,fontSize:12,fontWeight:700,color:WW.text}}>{s.km}</span>
                        <span style={{flex:2,fontSize:12,fontWeight:700,color:WW.primaryDark}}>{s.pace}</span>
                        <div style={{flex:3}}>
                          <div style={{height:6,borderRadius:3,background:WW.elevated,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${pct}%`,borderRadius:3,background:pct>75?WW.teal:pct>40?WW.primary:WW.lavender}}/>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </CardBlock>
            )}

            {/* HR Graph */}
            <CardBlock>
              <SectionTitle>Heart Rate</SectionTitle>
              <HRGraph height={70}/>
              <div style={{display:'flex',gap:12,marginTop:8}}>
                {[{c:'#EF4444',l:'High 155+'},{c:'#F59E0B',l:'Mod 135–155'},{c:'#10B981',l:'Low <135'}].map(b=>(
                  <div key={b.l} style={{display:'flex',alignItems:'center',gap:4}}>
                    <div style={{width:8,height:8,borderRadius:4,background:b.c}}/>
                    <span style={{fontSize:9,color:WW.textSec}}>{b.l}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:16,marginTop:10}}>
                {[{l:'Avg HR',v:'148 bpm'},{l:'Max HR',v:'162 bpm'},{l:'Min HR',v:'128 bpm'}].map(s=>(
                  <div key={s.l}><div style={{fontSize:14,fontWeight:800,color:WW.primaryDark}}>{s.v}</div><div style={{fontSize:10,color:WW.textSec}}>{s.l}</div></div>
                ))}
              </div>
            </CardBlock>
          </>
        )}

        {/* ---- GYM VIEW ---- */}
        {isGym&&(
          <>
            {/* Stat row */}
            <CardBlock>
              <div style={{display:'flex',gap:0}}>
                {[{l:'Duration',v:'52 min'},{l:'Sets',v:'16'},{l:'Volume',v:'5,400 kg'},{l:'Calories',v:'380 kcal'}].map((s,i,arr)=>(
                  <div key={s.l} style={{flex:1,textAlign:'center',borderRight:i<arr.length-1?`0.5px solid ${WW.border}`:'none',paddingRight:i<arr.length-1?6:0,paddingLeft:i>0?6:0}}>
                    <div style={{fontSize:14,fontWeight:800,color:WW.primaryDark}}>{s.v}</div>
                    <div style={{fontSize:10,color:WW.textSec,marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </CardBlock>

            {/* Muscles worked */}
            <CardBlock>
              <SectionTitle>Muscles Worked</SectionTitle>
              <div style={{display:'flex',alignItems:'center',gap:16}}>
                <svg width="70" height="120" viewBox="0 0 70 120">
                  <ellipse cx="35" cy="30" rx="20" ry="26" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  <rect x="15" y="56" width="40" height="40" rx="8" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  <rect x="0" y="56" width="14" height="35" rx="6" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  <rect x="56" y="56" width="14" height="35" rx="6" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  <rect x="15" y="96" width="16" height="22" rx="6" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  <rect x="39" y="96" width="16" height="22" rx="6" fill="#EEF0FB" stroke={WW.border} strokeWidth="1"/>
                  {/* Highlighted muscles */}
                  <rect x="16" y="57" width="38" height="18" rx="5" fill={WW.primary} opacity=".6"/>
                  <rect x="0" y="57" width="14" height="22" rx="6" fill={WW.lavender} opacity=".6"/>
                  <rect x="56" y="57" width="14" height="22" rx="6" fill={WW.lavender} opacity=".6"/>
                </svg>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                    <div style={{width:12,height:12,borderRadius:3,background:WW.primary}}/>
                    <span style={{fontSize:12,fontWeight:700,color:WW.text}}>Primary — Chest</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                    <div style={{width:12,height:12,borderRadius:3,background:WW.lavender}}/>
                    <span style={{fontSize:12,fontWeight:700,color:WW.text}}>Secondary — Shoulders, Triceps</span>
                  </div>
                </div>
              </div>
            </CardBlock>

            {/* Exercises */}
            <CardBlock>
              <SectionTitle>Exercises</SectionTitle>
              {GYM_EXERCISES.map((ex,ei)=>(
                <div key={ei} style={{marginBottom:ei<GYM_EXERCISES.length-1?16:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <div style={{fontSize:13,fontWeight:800,color:WW.primaryDark,flex:1}}>{ex.name}</div>
                    <span style={{fontSize:11,background:WW.elevated,color:WW.textSec,padding:'2px 8px',borderRadius:8}}>{ex.muscle}</span>
                    {ex.isPB&&<span style={{fontSize:11,background:'#FEF3C7',color:'#92400E',padding:'2px 8px',borderRadius:8,fontWeight:700}}>🥇 PB</span>}
                  </div>
                  <div style={{display:'flex',gap:0,marginBottom:4}}>
                    {['Set','kg','Reps'].map(h=><div key={h} style={{flex:1,fontSize:10,fontWeight:700,color:WW.textSec}}>{h}</div>)}
                  </div>
                  {ex.sets.map((s,si)=>(
                    <div key={si} style={{display:'flex',gap:0,padding:'3px 0',borderTop:`0.5px solid ${WW.border}`}}>
                      <div style={{flex:1,fontSize:12,fontWeight:600,color:WW.textSec}}>{si+1}</div>
                      <div style={{flex:1,fontSize:12,fontWeight:700,color:WW.text}}>{s.w}</div>
                      <div style={{flex:1,fontSize:12,fontWeight:700,color:WW.text}}>{s.r}</div>
                    </div>
                  ))}
                </div>
              ))}
            </CardBlock>

            {/* PBs */}
            <CardBlock style={{background:'#FEF9E7',borderColor:'rgba(245,158,11,.2)'}}>
              <SectionTitle>Personal Bests 🥇</SectionTitle>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:24}}>🏋️</span>
                <div>
                  <div style={{fontSize:14,fontWeight:800,color:'#92400E'}}>Bench Press — 75 kg × 8 reps</div>
                  <div style={{fontSize:11,color:'#A16207'}}>New record! Previous: 70 kg × 8 reps</div>
                </div>
              </div>
            </CardBlock>
          </>
        )}

        {/* Badges + XP — both */}
        <CardBlock>
          <SectionTitle>Rewards</SectionTitle>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:10}}>
            {['🏃','⚡','🔥'].map((b,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:44,height:44,borderRadius:22,background:WW.chipBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{b}</div>
                <span style={{fontSize:9,color:WW.textSec}}>Badge</span>
              </div>
            ))}
          </div>
          <div style={{background:WW.chipBg,borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:13,fontWeight:700,color:WW.text}}>XP earned</span>
            <span style={{fontSize:16,fontWeight:800,color:WW.primary}}>+{isGym?120:200} XP</span>
          </div>
        </CardBlock>

        {/* WiseCoach summary — collapsible */}
        <div style={{background:WW.lavenderBg,borderRadius:16,border:'0.5px solid rgba(155,132,232,.2)',padding:'12px 14px',marginBottom:12,borderLeft:`3px solid ${WW.lavender}`}}>
          <button onClick={()=>setWiseOpen(p=>!p)} style={{width:'100%',background:'none',border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:28,height:28,borderRadius:14,background:WW.lavender,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill="#fff"/></svg>
            </div>
            <span style={{fontSize:11,fontWeight:700,color:'#7B5CB8',textTransform:'uppercase',letterSpacing:.5,flex:1,textAlign:'left'}}>WiseCoach Summary</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{transform:wiseOpen?'rotate(180deg)':'none',transition:'transform .2s'}}><path d="M6 9l6 6 6-6" stroke="#7B5CB8" strokeWidth="1.8" strokeLinecap="round"/></svg>
          </button>
          {wiseOpen&&(
            <div style={{fontSize:13,color:'#5B3F9E',lineHeight:1.7,marginTop:10}}>
              {isGym?'Great upper body session! You hit a new bench press personal best. Your chest volume was 18% higher than your average. Consider adding one more set of triceps isolation next session for balance.':'Strong run today! Your pace for km 6–8 was your fastest split of the week. Heart rate stayed mostly in the moderate zone. Try a recovery walk tomorrow before your next hard effort.'}
            </div>
          )}
        </div>

        {/* Edit / Delete — manual only */}
        {isManual&&(
          <div style={{display:'flex',gap:10,marginBottom:8}}>
            <button style={{flex:1,height:44,borderRadius:12,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:14,fontWeight:700,cursor:'pointer'}}>Edit</button>
            <button onClick={()=>setDeleteModal(true)} style={{flex:1,height:44,borderRadius:12,background:'#FEE2E2',color:'#DC2626',border:'none',fontSize:14,fontWeight:700,cursor:'pointer'}}>Delete</button>
          </div>
        )}
      </div>

      {/* Delete confirmation */}
      {deleteModal&&(
        <div style={{position:'absolute',inset:0,background:'rgba(10,10,18,.5)',zIndex:50,display:'flex',alignItems:'flex-end'}}>
          <div style={{width:'100%',background:WW.card,borderRadius:'22px 22px 0 0',padding:'20px 20px 40px',boxShadow:'0 -8px 40px rgba(20,25,60,.2)'}}>
            <div style={{width:36,height:4,borderRadius:2,background:WW.border,margin:'0 auto 20px'}}/>
            <div style={{fontSize:18,fontWeight:800,color:WW.primaryDark,marginBottom:8}}>Delete activity?</div>
            <div style={{fontSize:14,color:WW.textSec,lineHeight:1.5,marginBottom:20}}>This will permanently remove this manually logged activity and its XP. This cannot be undone.</div>
            <button onClick={()=>{setDeleteModal(false);window.location.href='S-32-Progress-Tab.html';}} style={{width:'100%',height:50,borderRadius:14,background:'#FEE2E2',color:'#DC2626',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:10}}>Delete activity</button>
            <button onClick={()=>setDeleteModal(false)} style={{width:'100%',height:50,borderRadius:14,background:WW.elevated,color:WW.text,border:`1.5px solid ${WW.border}`,fontSize:15,fontWeight:700,cursor:'pointer'}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
