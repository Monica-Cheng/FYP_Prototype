/* ─── Icons ─────────────────────────────────────────────── */

/* ─── Questions ─────────────────────────────────────────── */
const QUESTIONS = [
  {

    question: "What's your primary goal?",
    subtitle: "We'll build your entire plan around this.",
    type: 'card2col',
    options: [
      { id:'lose_weight', title:'Lose Weight', desc:'Burn fat and get leaner', iconBg:'#FFF3E0', icon:<FlameIcon/> },
      { id:'build_muscle', title:'Build Muscle', desc:'Gain size and definition', iconBg:WW.chipBg, icon:<DumbbellIcon/> },
      { id:'build_strength', title:'Build Strength', desc:'Lift heavier, get stronger', iconBg:'#F0EEFE', icon:<LightningIcon/> },
      { id:'get_fitter', title:'Get Fitter', desc:'Boost cardio and endurance', iconBg:'#FFF0F0', icon:<HeartIcon/> },
      { id:'train_race', title:'Train for a Race', desc:'5K to marathon ready', iconBg:WW.tealBg, icon:<RunnerIcon/> },
      { id:'flexibility', title:'Stay Flexible', desc:'Move better, prevent injury', iconBg:'#F0FFF4', icon:<StretchIcon/> },
    ],
  },
  {
    id: 'training',
    question: 'What types of training do you enjoy?',
    subtitle: 'Select all that apply — we support mixed programmes.',
    type: 'multicard',
    options: [
      { id:'gym', title:'Gym', desc:'Weights, machines and resistance training', iconBg:WW.chipBg, icon:<DumbbellIcon/> },
      { id:'running', title:'Running', desc:'Outdoor runs, treadmill and track sessions', iconBg:WW.tealBg, icon:<RunnerIcon/> },
      { id:'outdoor', title:'Outdoor / Sport', desc:'Cycling, swimming, hiking and sport', iconBg:'#F0FFF4', icon:<OutdoorIcon/> },
    ],
  },
  {
    id: 'experience',
    question: "What's your training experience?",
    subtitle: "Be honest — your plan will be calibrated to match.",
    type: 'card',
    options: [
      { id:'beginner', title:'Beginner', desc:'New to regular structured training', iconBg:WW.tealBg, icon:<HomeIcon/> },
      { id:'intermediate', title:'Intermediate', desc:'Training a few times a week consistently', iconBg:WW.chipBg, icon:<BarsIcon/> },
      { id:'advanced', title:'Advanced', desc:'Experienced with a structured programme', iconBg:'#FFF3E0', icon:<StarIcon/> },
    ],
  },
  {
    id: 'equipment',
    question: 'What equipment do you have?',
    subtitle: "Select all that apply — we'll only programme what you have.",
    type: 'chips',
    options: [
      { id:'full_gym', label:'Full Gym' },
      { id:'home_gym', label:'Home Gym' },
      { id:'dumbbells', label:'Dumbbells' },
      { id:'barbells', label:'Barbells' },
      { id:'bands', label:'Resistance Bands' },
      { id:'cable', label:'Cable Machine' },
      { id:'bodyweight', label:'Bodyweight Only' },
      { id:'no_equipment', label:'No Equipment' },
    ],
  },
  {
    id: 'days',
    question: 'How many days per week?',
    subtitle: "Pick what's realistic — consistency beats intensity.",
    type: 'pills',
    options: [
      { id:2, label:'2', desc:'Light', detail:'2 sessions: perfect for getting started without burning out.' },
      { id:3, label:'3', desc:'Moderate', detail:'3 sessions: the sweet spot for steady, sustainable progress.' },
      { id:4, label:'4', desc:'Active', detail:'4 sessions: solid training volume with good recovery built in.' },
      { id:5, label:'5', desc:'Dedicated', detail:'5 sessions: suits dedicated athletes ready to push limits.' },
      { id:6, label:'6', desc:'Intensive', detail:'6 sessions: intensive schedule for peak performance goals.' },
    ],
  },
  {
    id: 'duration',
    question: 'How long are your sessions?',
    subtitle: "Shorter and focused often beats long and inconsistent.",
    type: 'card2col',
    options: [
      { id:'20', title:'20–30 min', desc:'Quick & focused', iconBg:WW.tealBg, icon:<ClockIcon color={WW.teal}/> },
      { id:'30', title:'30–45 min', desc:'Efficient & balanced', iconBg:WW.chipBg, icon:<ClockIcon/> },
      { id:'45', title:'45–60 min', desc:'Well-rounded sessions', iconBg:'#F0EEFE', icon:<ClockIcon color={WW.lavender}/> },
      { id:'60', title:'60+ min', desc:'All in, no rush', iconBg:'#FFF3E0', icon:<ClockIcon color="#F97316"/> },
    ],
  },
  {
    id: 'race_type',
    question: 'Do you have a race coming up?',
    subtitle: "We'll add a race-specific block to your plan.",
    type: 'card2col',
    conditional: (ans) => ans.training && ans.training.includes('running'),
    options: [
      { id:'5k', title:'5K', desc:'Up to ~30 min', iconBg:WW.tealBg, icon:<FlagIcon/> },
      { id:'10k', title:'10K', desc:'Up to ~60 min', iconBg:'#E0F4F8', icon:<FlagIcon color={WW.teal}/> },
      { id:'half', title:'Half Marathon', desc:'21.1 km', iconBg:WW.chipBg, icon:<FlagIcon color={WW.primary}/> },
      { id:'marathon', title:'Marathon', desc:'42.2 km', iconBg:'#FFF3E0', icon:<FlagIcon color="#F97316"/> },
      { id:'no_race', title:'No Event', desc:"Just enjoying running", iconBg:WW.elevated, icon:<RunnerIcon color={WW.textSec}/> },
      { id:'other_race', title:'Other Event', desc:'Triathlon, OCR, etc.', iconBg:'#F0EEFE', icon:<StarIcon/> },
    ],
  },
  {
    id: 'race_date',
    question: 'When is your race?',
    subtitle: "We'll work backwards to build your training plan.",
    type: 'date',
    conditional: (ans) => ans.race_type && ans.race_type !== 'no_race',
  },
];

/* ─── Loading screen ─────────────────────────────────────── */
function LoadingScreen() {
  const [progress, setProgress] = React.useState(0);

  React.useEffect(() => {
    const p = setInterval(() => setProgress(n => {
      if (n >= 100) { clearInterval(p); return 100; }
      return n + 2;
    }), 60);
    const nav = setTimeout(() => { window.location.href = 'S-07-Onboarding-Plan-Result.html'; }, 3200);
    return () => { clearInterval(p); clearTimeout(nav); };
  }, []);

  const steps = [
    { label:'Analysing your goals', threshold:25 },
    { label:'Matching training style', threshold:50 },
    { label:'Calculating weekly load', threshold:75 },
    { label:'Building your plan', threshold:100 },
  ];

  return (
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 36px',boxSizing:'border-box'}}>
      <div style={{position:'relative',width:104,height:104,marginBottom:28}}>
        <svg width="104" height="104" viewBox="0 0 104 104" style={{transform:'rotate(-90deg)'}}>
          <circle cx="52" cy="52" r="44" fill="none" stroke={WW.elevated} strokeWidth="8"/>
          <circle cx="52" cy="52" r="44" fill="none" stroke={WW.primary} strokeWidth="8"
            strokeDasharray={`${2*Math.PI*44}`}
            strokeDashoffset={`${2*Math.PI*44*(1-progress/100)}`}
            strokeLinecap="round"
            style={{transition:'stroke-dashoffset 0.12s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:22,fontWeight:800,color:WW.primaryDark}}>{progress}%</div>
        </div>
      </div>
      <div style={{fontSize:22,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.5px',marginBottom:8,textAlign:'center'}}>
        Building your plan…
      </div>
      <div style={{fontSize:14,color:WW.textSec,marginBottom:32,textAlign:'center',lineHeight:1.6}}>
        Personalising WiseWorkout just for you
      </div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:14}}>
        {steps.map((s, i) => {
          const done = progress >= s.threshold;
          const visible = progress >= (i > 0 ? steps[i-1].threshold - 10 : 0);
          return (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,opacity:visible?1:0.25,transition:'opacity 0.4s'}}>
              <div style={{width:24,height:24,borderRadius:12,flexShrink:0,background:done?WW.teal:WW.elevated,display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.3s'}}>
                {done
                  ? <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  : <div style={{width:6,height:6,borderRadius:3,background:WW.border}}/>}
              </div>
              <div style={{fontSize:14,fontWeight:done?600:500,color:done?WW.text:WW.textSec,transition:'color 0.3s'}}>{s.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── Status Bar ─────────────────────────────────────────── */
function StatusBar() {
  return (
    <div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}>
      <div style={{paddingTop:10}}>9:41</div>
      <div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}>
        <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx="0.6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx="0.6" fill={WW.text}/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill={WW.text} opacity="0.4"/></svg>
      </div>
    </div>
  );
}

/* ─── Question Screen ────────────────────────────────────── */
function QuestionScreen({q, answer, onAnswer, onNext, onBack, onSkip, stepNum, totalSteps, animKey}) {
  const isMulti = q.type === 'multicard' || q.type === 'chips';
  const canAdvance = isMulti ? (answer && answer.length > 0) : (q.type === 'date' ? true : answer != null);
  const progress = stepNum / 8;

  const toggleMulti = (id) => {
    const cur = answer || [];
    const next = cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id];
    onAnswer(next);
  };

  const renderOptions = () => {
    if (q.type === 'card' || q.type === 'multicard') {
      const multi = q.type === 'multicard';
      return (
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
          {q.options.map(opt => {
            const sel = multi ? (answer||[]).includes(opt.id) : answer === opt.id;
            return (
              <button key={opt.id} onClick={()=> multi ? toggleMulti(opt.id) : onAnswer(opt.id)} style={{
                width:'100%',padding:'13px 16px',borderRadius:16,
                border:`1.5px solid ${sel?WW.primary:WW.border}`,
                background:sel?WW.chipBg:WW.card,
                boxShadow:sel?`0 0 0 1px ${WW.primary}22,${WW.shadow}`:WW.shadow,
                display:'flex',alignItems:'center',gap:14,cursor:'pointer',
                transition:'all 0.15s',textAlign:'left',
              }}>
                <div style={{width:48,height:48,borderRadius:13,flexShrink:0,background:sel?WW.primary+'22':opt.iconBg,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {opt.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:sel?WW.primary:WW.text,marginBottom:2}}>{opt.title}</div>
                  <div style={{fontSize:12,color:WW.textSec,lineHeight:1.4}}>{opt.desc}</div>
                </div>
                {multi ? (
                  <div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`1.5px solid ${sel?WW.primary:WW.border}`,background:sel?WW.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {sel && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                ) : sel ? (
                  <div style={{width:22,height:22,borderRadius:11,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                ) : null}
              </button>
            );
          })}
        </div>
      );
    }

    if (q.type === 'card2col') {
      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
          {q.options.map(opt => {
            const sel = answer === opt.id;
            return (
              <button key={opt.id} onClick={()=>onAnswer(opt.id)} style={{
                padding:'14px 12px',borderRadius:16,textAlign:'left',cursor:'pointer',
                border:`1.5px solid ${sel?WW.primary:WW.border}`,
                background:sel?WW.chipBg:WW.card,
                boxShadow:sel?`0 0 0 1px ${WW.primary}22,${WW.shadow}`:WW.shadow,
                transition:'all 0.15s',
              }}>
                <div style={{width:40,height:40,borderRadius:11,background:sel?WW.primary+'22':opt.iconBg,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}>
                  {opt.icon}
                </div>
                <div style={{fontSize:13,fontWeight:700,color:sel?WW.primary:WW.text,marginBottom:2}}>{opt.title}</div>
                <div style={{fontSize:11,color:WW.textSec,lineHeight:1.4}}>{opt.desc}</div>
              </button>
            );
          })}
        </div>
      );
    }

    if (q.type === 'chips') {
      const selArr = answer || [];
      return (
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
          {q.options.map(opt => {
            const sel = selArr.includes(opt.id);
            return (
              <button key={opt.id} onClick={()=>toggleMulti(opt.id)} style={{
                padding:'10px 18px',borderRadius:22,fontSize:14,fontWeight:600,cursor:'pointer',
                background:sel?WW.primary:WW.card,color:sel?'#fff':WW.text,
                border:`1.5px solid ${sel?WW.primary:WW.border}`,
                boxShadow:sel?'0 2px 8px rgba(108,126,232,0.25)':WW.shadow,
                transition:'all 0.15s',
              }}>
                {opt.label}
              </button>
            );
          })}
        </div>
      );
    }

    if (q.type === 'pills') {
      return (
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',gap:8,marginBottom:answer!=null?14:0}}>
            {q.options.map(opt => {
              const sel = answer === opt.id;
              return (
                <button key={opt.id} onClick={()=>onAnswer(opt.id)} style={{
                  flex:1,height:64,borderRadius:14,cursor:'pointer',
                  border:`1.5px solid ${sel?WW.primary:WW.border}`,
                  background:sel?WW.chipBg:WW.card,
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,
                  boxShadow:sel?`0 0 0 1px ${WW.primary}22`:WW.shadow,
                  transition:'all 0.15s',
                }}>
                  <div style={{fontSize:22,fontWeight:800,color:sel?WW.primary:WW.text}}>{opt.label}</div>
                  <div style={{fontSize:10,fontWeight:600,color:sel?WW.primary:WW.textSec,letterSpacing:'0.2px'}}>{opt.desc}</div>
                </button>
              );
            })}
          </div>
          {answer != null && (() => {
            const info = q.options.find(o => o.id === answer);
            return info ? (
              <div style={{padding:'12px 14px',background:WW.chipBg,borderRadius:12,border:`0.5px solid ${WW.primary}33`}}>
                <div style={{fontSize:13,fontWeight:700,color:WW.primaryDark,marginBottom:3}}>{answer} days / week — {info.desc.toLowerCase()}</div>
                <div style={{fontSize:12,color:WW.textSec,lineHeight:1.5}}>{info.detail}</div>
              </div>
            ) : null;
          })()}
        </div>
      );
    }

    if (q.type === 'date') {
      const today = new Date().toISOString().split('T')[0];
      const daysUntil = answer ? Math.round((new Date(answer) - new Date()) / 86400000) : null;
      return (
        <div style={{marginBottom:20}}>
          <input type="date" min={today} value={answer||''} onChange={e=>onAnswer(e.target.value)}
            style={{width:'100%',height:52,borderRadius:12,border:`1px solid ${WW.border}`,background:WW.card,fontSize:16,color:WW.text,padding:'0 14px',boxSizing:'border-box',outline:'none',fontFamily:'inherit',marginBottom:12}}/>
          {daysUntil != null && daysUntil > 0 && (
            <div style={{padding:'12px 14px',background:WW.tealBg,borderRadius:12,border:`0.5px solid ${WW.teal}44`}}>
              <div style={{fontSize:13,fontWeight:700,color:'#1A7A8C',marginBottom:2}}>{daysUntil} days to race day</div>
              <div style={{fontSize:12,color:WW.textSec}}>We'll structure your plan around this date.</div>
            </div>
          )}
        </div>
      );
    }

    return null;
  };

  return (
    <div key={animKey} style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',animation:'fadeSlideIn 0.28s ease both'}}>
      <StatusBar/>

      {/* Step header */}
      <div style={{padding:'0 24px 12px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {stepNum > 1 && (
              <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:'2px 4px',color:WW.textSec,display:'flex',alignItems:'center'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            )}
            <div style={{fontSize:12,fontWeight:700,color:WW.textSec,letterSpacing:'.3px'}}>Step 2 of 3 · Q{stepNum}/{totalSteps}</div>
          </div>
          <button onClick={onSkip} style={{fontSize:13,fontWeight:600,color:WW.textSec,background:'none',border:'none',cursor:'pointer',padding:0}}>Skip</button>
        </div>
        <div style={{height:5,borderRadius:2.5,background:WW.elevated,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progress*100}%`,borderRadius:2.5,background:WW.primary,transition:'width 0.35s ease'}}/>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',padding:'4px 24px 0'}}>
        <div style={{fontSize:24,fontWeight:800,color:WW.primaryDark,letterSpacing:'-0.5px',marginBottom:4}}>{q.question}</div>
        <div style={{fontSize:14,color:WW.textSec,marginBottom:18,lineHeight:1.5}}>{q.subtitle}</div>

        {renderOptions()}

        <button onClick={onNext} disabled={!canAdvance} style={{
          width:'100%',height:52,borderRadius:14,
          background:canAdvance?WW.primary:'#C8C8D8',
          color:canAdvance?'#fff':'#8A8A9E',
          fontSize:16,fontWeight:700,border:'none',
          cursor:canAdvance?'pointer':'default',
          boxShadow:canAdvance?'0 4px 14px rgba(108,126,232,0.35)':'none',
          marginBottom:36,transition:'all 0.2s',
        }}>
          {stepNum < totalSteps ? 'Next →' : 'Build my plan →'}
        </button>
      </div>
    </div>
  );
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [answers, setAnswers] = React.useState({});
  const [stepIdx, setStepIdx] = React.useState(0);
  const [loading, setLoading] = React.useState(false);
  const [animKey, setAnimKey] = React.useState(0);

  const visibleQs = QUESTIONS.filter(q => !q.conditional || q.conditional(answers));
  const totalSteps = visibleQs.length;
  const q = visibleQs[stepIdx];

  const handleAnswer = (val) => setAnswers(a => ({...a, [q.id]: val}));

  const advance = () => {
    const newVisible = QUESTIONS.filter(qq => !qq.conditional || qq.conditional(answers));
    if (stepIdx < newVisible.length - 1) {
      setStepIdx(s => s + 1);
      setAnimKey(k => k + 1);
    } else {
      setLoading(true);
    }
  };

  const goBack = () => {
    if (stepIdx > 0) {
      setStepIdx(s => s - 1);
      setAnimKey(k => k + 1);
    }
  };

  const skip = () => {
    const newVisible = QUESTIONS.filter(qq => !qq.conditional || qq.conditional(answers));
    if (stepIdx < newVisible.length - 1) {
      setStepIdx(s => s + 1);
      setAnimKey(k => k + 1);
    } else {
      setLoading(true);
    }
  };

  if (loading) return <LoadingScreen/>;
  if (!q) return null;

  return (
    <QuestionScreen
      q={q}
      answer={answers[q.id]}
      onAnswer={handleAnswer}
      onNext={advance}
      onBack={goBack}
      onSkip={skip}
      stepNum={stepIdx + 1}
      totalSteps={totalSteps}
      animKey={animKey}
    />
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body></html>
