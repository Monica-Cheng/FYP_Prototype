  plans:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="20" y="10" width="3.5" height="7" rx="1" fill={c}/><rect x="6.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="17.5" y="11.5" width="2" height="4" rx=".5" fill={c}/><rect x="8.5" y="12" width="9" height="3" rx=".8" fill={c}/></svg>,
  coach:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/></svg>,
  club:c=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke={c} strokeWidth="1.5"/><circle cx="17" cy="10" r="2.2" stroke={c} strokeWidth="1.5"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M17.5 14c2.2.5 4 2.2 4 4.5" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,

const NAV=[{id:'home',label:'Home',icon:Ico.home,href:'S-09-Home.html'},{id:'plans',label:'Plans',icon:Ico.plans,href:'S-10-Plans-Hub.html'},{id:'coach',label:'Coach',icon:Ico.coach,href:'S-25-Coach-Chat.html'},{id:'club',label:'Club',icon:Ico.club,href:'S-28-Club-Tab.html'},{id:'progress',label:'Progress',icon:Ico.progress,href:'S-32-Progress-Tab.html'}];
function StatusBar(){return(<div style={{height:47,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',fontSize:15,fontWeight:600,color:WW.text,flexShrink:0}}><div style={{paddingTop:10}}>9:41</div><div style={{display:'flex',gap:6,alignItems:'center',paddingTop:10}}><svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6" fill={WW.text}/><rect x="4.5" y="5" width="3" height="6" rx=".6" fill={WW.text}/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill={WW.text}/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill={WW.text}/></svg><svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="3" stroke={WW.text} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill={WW.text}/><rect x="21" y="3.5" width="1.5" height="4" rx=".5" fill={WW.text} opacity=".4"/></svg></div></div>);}
function BottomNav({active}){return(<div style={{position:'absolute',bottom:0,left:0,right:0,height:84,background:WW.card,borderTop:'0.5px solid #E8EAF8',display:'flex',zIndex:30}}>{NAV.map(n=>{const a=n.id===active,c=a?WW.primary:WW.textSec;return(<a key={n.id} href={n.href} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,textDecoration:'none',paddingBottom:8}}>{n.icon(c)}<span style={{fontSize:10,fontWeight:600,color:c}}>{n.label}</span></a>);})}</div>);}

const BADGE_GRADIENTS={
  steps:'linear-gradient(145deg,#1A6B7C 0%,#4BB8CC 100%)',
  run:'linear-gradient(145deg,#166534 0%,#22C55E 100%)',
  gym:'linear-gradient(145deg,#2D3A8C 0%,#6C7EE8 100%)',
  trophy:'linear-gradient(145deg,#92400E 0%,#F59E0B 100%)',
  flame:'linear-gradient(145deg,#9A3412 0%,#F97316 100%)',
};

function HexBadge({type,size=64,whiteIcon=false}){
  const s=size;
  const cx=s/2,cy=s/2,r=s/2*0.88;
  const pts=Array.from({length:6},(_,i)=>{const a=(i*60-90)*Math.PI/180;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
  const ic=whiteIcon?'#fff':'rgba(255,255,255,0.9)';
  const icons={
    steps:<svg width={s*.35} height={s*.35} viewBox="0 0 24 24" fill="none"><path d="M7 17l4-10 3 4 3-7" stroke={ic} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="17" cy="7" r="2" fill={ic}/></svg>,
    run:<svg width={s*.35} height={s*.35} viewBox="0 0 24 24" fill="none"><circle cx="14" cy="5" r="2" fill={ic}/><path d="M10 9l2 4 3-2 2 5M7 14l2-4" stroke={ic} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    gym:<svg width={s*.35} height={s*.35} viewBox="0 0 24 24" fill="none"><rect x="7" y="10" width="10" height="4" rx="2" fill="rgba(255,255,255,0.25)" stroke={ic} strokeWidth="1.5"/><rect x="3" y="8" width="4" height="8" rx="2" stroke={ic} strokeWidth="1.5"/><rect x="17" y="8" width="4" height="8" rx="2" stroke={ic} strokeWidth="1.5"/></svg>,
    trophy:<svg width={s*.35} height={s*.35} viewBox="0 0 24 24" fill="none"><path d="M8 4h8v9a4 4 0 01-8 0V4z" stroke={ic} strokeWidth="1.5"/><path d="M8 8H5a2 2 0 000 4h3M16 8h3a2 2 0 010 4h-3M12 17v3M9 20h6" stroke={ic} strokeWidth="1.5" strokeLinecap="round"/></svg>,
    flame:<svg width={s*.35} height={s*.35} viewBox="0 0 24 24" fill="none"><path d="M12 2c0 0 4 4 4 9a4 4 0 01-8 0c0-1.5.5-3 1-4-1 2-2 4-1 6a4 4 0 004 0c1-1 1.5-3 0-5z" fill={ic}/></svg>,
  };
  return(
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>
      <polygon points={pts} fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"/>
      <foreignObject x={(s-(s*.35))/2} y={(s-(s*.35))/2} width={s*.35} height={s*.35}>
        <div xmlns="http://www.w3.org/1999/xhtml" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
          {icons[type]||icons.trophy}
        </div>
      </foreignObject>
    </svg>
  );
}

const MY_CHALLENGES=[

  {rank:2,initials:'M',color:'#6C7EE8',name:'Marcus (You)',xp:2620,isMe:true},

  {rank:4,initials:'SL',color:'#9B84E8',name:'Sarah Lim',xp:1780,isMe:false},

  {id:2,initials:'JT',color:'#4BB8CC',name:'Jamie Tan',status:'2 workouts this week',active:true},

              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:10,color:'rgba(255,255,255,0.7)',fontWeight:600}}>ends</div>

              </div>
            </div>
            {/* Progress */}
            <div style={{padding:'10px 14px 12px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>

                <div style={{fontSize:11,fontWeight:700,color:WW.text}}>{c.myProgress}% complete</div>
              </div>
              <div style={{height:6,borderRadius:3,background:WW.elevated,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${c.myProgress}%`,borderRadius:3,background:c.gradient}}/>
              </div>
            </div>
          </div>
        </a>
      ))}

          <div key={c.id} style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden',marginBottom:12}}>
            {/* Hero badge area */}
            <div style={{background:c.gradient,padding:'22px 16px 18px',display:'flex',flexDirection:'column',alignItems:'center',gap:10,position:'relative'}}>
              {/* XP pill top-right */}
              <div style={{position:'absolute',top:10,right:12,background:'rgba(255,255,255,0.2)',borderRadius:20,padding:'3px 9px',display:'flex',alignItems:'center',gap:4}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6.2 4.5 2.4 7.2L12 16.5l-6.2 4.4 2.4-7.2L2 9.2h7.6L12 2z" fill="#fff"/></svg>
                <span style={{fontSize:11,fontWeight:800,color:'#fff'}}>{c.xp} XP</span>
              </div>
              <HexBadge type={c.badge} size={76} whiteIcon/>
              <div style={{fontSize:17,fontWeight:900,color:'#fff',textAlign:'center',letterSpacing:'-0.3px'}}>{c.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.8)',textAlign:'center'}}>{c.goal}</div>

            {/* Stats + action */}

                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke={WW.textSec} strokeWidth="1.5"/><path d="M3 9h18M8 2v4M16 2v4" stroke={WW.textSec} strokeWidth="1.5" strokeLinecap="round"/></svg>

function LeaderboardTab({empty}){
  if(empty) return(

        </a>
      ))}
    </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:WW.textSec,letterSpacing:.4,textTransform:'uppercase'}}>Friends ({FRIENDS.length})</div>
        <a href="S-29-Add-Friends.html" style={{fontSize:12,fontWeight:700,color:WW.primary,textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke={WW.primary} strokeWidth="1.5"/><path d="M3 21c0-3.9 2.7-7 6-7" stroke={WW.primary} strokeWidth="1.5" strokeLinecap="round"/><path d="M16 11v6m-3-3h6" stroke={WW.primary} strokeWidth="1.8" strokeLinecap="round"/></svg>
          Add Friends
        </a>
      </div>
      <div style={{background:WW.card,borderRadius:16,border:`0.5px solid ${WW.border}`,boxShadow:WW.shadow,overflow:'hidden',marginBottom:14}}>
        {FRIENDS.map((f,i)=>(
          <div key={f.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderBottom:i<FRIENDS.length-1?`0.5px solid ${WW.border}`:'none'}}>
            <div style={{position:'relative'}}>
              <div style={{width:42,height:42,borderRadius:21,background:f.color,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:15,fontWeight:800,color:'#fff'}}>{f.initials}</span>
              </div>
              {f.active&&<div style={{position:'absolute',bottom:0,right:0,width:11,height:11,borderRadius:6,background:'#22C55E',border:'2px solid #fff'}}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,color:WW.text}}>{f.name}</div>
              <div style={{fontSize:11,color:WW.textSec}}>{f.status}</div>
            </div>
            <div style={{padding:'5px 11px',borderRadius:8,background:WW.chipBg,fontSize:11,fontWeight:700,color:WW.primary,cursor:'pointer'}}>Challenge</div>
          </div>
        ))}
      </div>
      <a href="S-29-Add-Friends.html" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,height:44,borderRadius:12,border:`1.5px dashed ${WW.primary}`,color:WW.primary,fontSize:13,fontWeight:700,textDecoration:'none'}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={WW.primary} strokeWidth="2.2" strokeLinecap="round"/></svg>
        Find More Friends
      </a>
    </div>
  );
}

function App(){
  const [tab,setTab]=React.useState('challenges');
  const [empty,setEmpty]=React.useState(false);

  React.useEffect(()=>{
    const el=document.getElementById('tw-empty');
    if(el)el.addEventListener('change',e=>setEmpty(e.target.checked));
    const panel=document.getElementById('tweaks');
    if(panel)panel.style.display='none';
    const btn=document.createElement('button');
    btn.textContent='⚙';btn.style.cssText='position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:22px;background:#6C7EE8;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 12px rgba(108,126,232,.4)';
    btn.onclick=()=>panel?.classList.toggle('open');document.body.appendChild(btn);
  },[]);

  const TABS=[
    {id:'challenges',label:'Challenges'},
    {id:'leaderboard',label:'Leaderboard'},
    {id:'friends',label:'Friends'},
  ];

  return(
    <div style={{width:'100%',height:'100%',background:WW.bg,display:'flex',flexDirection:'column',position:'relative'}}>
      <StatusBar/>
      {/* Top bar */}
      <div style={{padding:'2px 16px 0',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{fontSize:22,fontWeight:800,color:WW.primaryDark}}>Club</div>
        <a href="S-34-Profile.html?ref=S-28-Club-Tab.html" style={{width:36,height:36,borderRadius:18,background:WW.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',textDecoration:'none',boxShadow:'0 2px 8px rgba(108,126,232,0.3)'}}>M</a>
      </div>

      {/* 3-pill sub-tabs */}
      <div style={{padding:'10px 16px 0',flexShrink:0}}>
        <div style={{display:'flex',background:WW.elevated,borderRadius:12,padding:3,gap:3}}>
          {TABS.map(t=>{
            const active=tab===t.id;
            return(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'8px 0',borderRadius:9,background:active?WW.card:'transparent',border:'none',color:active?WW.primaryDark:WW.textSec,fontSize:13,fontWeight:active?800:600,cursor:'pointer',boxShadow:active?'0 1px 4px rgba(45,58,140,.12)':'none',transition:'all .15s'}}>
                {t.label}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 16px',paddingBottom:100}}>
        {tab==='challenges'&&<ChallengesTab/>}
        {tab==='leaderboard'&&<LeaderboardTab empty={empty}/>}
        {tab==='friends'&&<FriendsTab/>}
      </div>

      <BottomNav active="club"/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
